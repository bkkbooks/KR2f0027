  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0027_WYG_004-1a, image: WYG0429/WYG0429-0502a.png}
body:
  text: 南宫奏稿卷四明夏言撰一乞憐查照舊規以蘇民困以安地方疏主客清吏司案呈奉本部送禮科抄出巡撫貴州等處地方兼理軍務都察院右副都御史劉士元題據貴州布政司呈奉巡撫貴州地方都御史劉士元批據撫理凱里地方舍人楊張呈稱近䝉奏授安撫職事莫大之恩但所管苗民只知有糧馬之說而不知進貢表箋之意今受天恩若不補報恐有不忠之罪若照各司大例於各寨起𣲖前項貢賦恐苗人又言卑舍才得官印就行科害近查得施南宣撫司亦無進貢表箋乞要查照量為處分等情奉批仰布政司議報此繳奉此又䝉巡按貴州監察御史郭𢎞化批據本舍呈同前事䝉批布政司查勘應否呈奪䝉此隨於本司慶賀卷內查得所屬思南等八府安順等六州貴州宣慰司金筑安撫司每年各進萬夀聖節表文一通合用黃絹袱一箇冬至正旦每各進表箋五通合用紅絹袱一箇黃絹布袱各二箇并隨表箋紙劄籠銷等項思南安順等府州每起水腳白銀各二兩五錢宣慰安撫二司俱無水腳銀兩宣慰司亦無紙劄籠銷金筑安撫司每遇朝覲之年又進馬四匹變賣白銀四十兩貯庫各緣由在卷今奉前因議照表文馬匹昭臣子忠敬之心五品衙門有先期舉行之例人當自盡何事呈詳今楊張初授安撫職銜世轄凱里地土雖竭㳙埃之報莫酬浩蕩之恩况盛服拜表儀衛聳衆目之觀瞻舞蹈嵩呼禮文起一方之景仰丕變夷俗此其首圖楊張何不深思妄引施南事例而乞求分豁也及照該司官品實與金筑相同每遇朝覲之年應有進貢之馬但訪得本舍家道貧難衙門新造舊官初復苗民才附難以全禮責成相應量為寬恕合無呈詳允日備行凱里比照宣慰金筑二司每年止進聖節表一通黃絹袱一箇冬至正旦各表四通箋一通紅絹袱一箇黃絹布袱各二箇及撰寫工食合令楊張自行備辦或覔人謄寫俱從其便不許指此科斂苗民致生嗟怨其紙劄籠銷并水腳銀兩俱與除豁免其徴解仍候地方事妥給領憑印冠帶之日為始方才舉行毋再揑文申擾自惹罪究但進貢馬匹原係土官衙門舊規難擅停止如䝉體念轉為㑹奏請賜蠲免以示寬恤之意等因到臣查得接管卷內為解釋紛爭以安地方事該提督雲南貴州四川湖廣等處軍務兵部尚書伍文定㑹同川貴鎮巡等官議將四川凱里建設安撫司衙門楊張擬授土官安撫職事改𨽻貴州㑹本具題該兵部覆議題奉欽依降給印信文憑收候在官備行川貴委官知府崔允等將勘處過起苗撥寨事情回報前來臣因事體重大未經布按二司官覆勘有礙具奏又經備行分守右參議柴經親詣彼中核實未報間隨據楊張呈為乞憐查照舊規以蘇民困以安地方事批行布政司議呈前因臣又看得逺人敬上之誠在儀而不在物朝廷柔逺之道有義而亦有恩合進表文批仰該司備行安撫楊張遵照工食費少不必𣲖擾苗民其進馬一事仍候㑹奏施行去後續據右參議柴經呈稱核勘過起苗撥寨事情委俱停當别無窒礙等因除將印信文憑給付楊張到任管事外臣㑹同巡按貴州監察御史郭𢎞化議照得進貢馬匹在土官固有彛禮在盛朝原有定制禮不可廢制莫敢違而安撫楊張既得附籍受官正宜效忠納欵雖渥駒千里宛馬十乘之獻尚不足以效芹曝之忱于萬一顧乃預為之辭雖三尺之童亦知其不可然臣等嘗察其情而得其故矣自昔楊友楊張父子與楊愛楊斌楊相等讎殺數十年招聚流苗占據田業日事爭鬬性習凶頑喑嗚則彎弓睚眦則挺劍馭之寡恩即反面忘主自相噬齧其禍有不可勝言者今雖仰仗朝廷恩威消數十年之變于一旦然地方之雲擾方戢人心之波搖未定流苗雖以起發而土苗故態猶存似難以禮法驅迫況有土人向為亂兵所逐者始得招回資計甚微䝉化日淺編茅結庋不避寒暑扶攜聚落靡有生計若楊張復以貢馬之故而有科差之擾是不察其疲羸之瘡瘠匪值其勢弗堪而其情亦可隱者也伏望皇上俯念凱里為新造之域凱苗皆新附之民止令照例進表以嚴天冠地履之分免其進貢馬匹以示海涵春育之仁庶俾國體民情兩無所失惟復仍照招撫流民事例姑待五七年之後生意漸復事體漸安官有固志民有定業然後與各土官衙門一體進貢均乞聖明裁處等因隨該巡按貴州監察御史郭𢎞化題同前事俱奉聖㫖該部知道欽此欽遵通抄送司查得貴州四川等處土官衙門其宣慰使司每年慶賀萬夀聖節嵗貢及三年朝覲俱進有馬匹不等其金筑等安撫司遇三年朝覲亦該進有馬匹俱經本布政司變賣價銀貯庫今該前因通查案呈到部看得貴州巡撫都御史劉士元巡按御史郭𢎞化㑹奏要將凱里地方新設安撫司嵗貢馬匹准令免進或待數年之後生業漸復仍照舊例進貢一節臣等切惟旅獒之貢載之周書元龜之賂咏於魯頌古先哲王非徒務勤逺略實以風示外夷也我祖宗以來伐叛柔服四夷咸賔一切珍異多見拒却獨於各夷常貢馬匹特容進獻下至盔甲刀劍之微亦復收納其所貢馬匹或存留在邊給軍騎操或變銀貯庫用備買馬差來到京人役務加重賞以酬其值計其所貢常微所賞常厚而不惜者蓋不但嘉其來王之誠亦所以示無藏甲之意也百餘年來各夷遵守不廢今若因凱里新立遽免進貢馬匹不惟舊規有礙亦恐諸夷效尤但流離以勞來為本新附以撫綏為先所據凱里地方逋叛甫平土官新設事缺綜理民無定業既輸貢賦同於編氓若復責備一時不無動其攜離之志各官㑹奏前來足見體悉夷情顧惜國體相應議處合無候命下行移貴州撫按等官省諭安撫楊張見得朝廷柔逺固不在物逺人朝貢貴在輸誠所據舊規似難停免但念凱里地方苗夷初附瘡痍未平所宜矜恤其嵗進馬匹暫且停止待五七年之後事有定緒民有定業仍照各土官衙門一體進貢如此則新附苗民不致科擾鄰方諸夷自難效尤庶於事體兩便惟復别有定奪均乞聖明裁處緣係乞憐查照舊規以蘇民困以安地方及奉欽依該部知道事理未敢擅便謹題請㫖嘉靖十年十月初九日具題本月十一日奉聖㫖這安撫司既係新設嵗進馬匹暫且停止待七年後照例進貢欽此一西海遣人求貢納欵疏主客清吏司案呈嘉靖十一年三月十六日准兵部咨該巡撫甘肅等處地方兼管屯政都察院右僉都御史等官趙載等㑹題議照闕族類竊據西海二十餘年騷擾邊境耕作失時兵馬調發倉廩空虛地方疲憊今乃傾心求貢近過鎮羌永昌遄往不擾過肅州境外聲言報功及稱續差通事趙真等隨帶賞賜假布前去各夷居聚處所審探見聞之實差來夷人供報懇求之詞效順之迹似為不虛雖方來永保無虞未可逆料觀目前輸誠欵附似難拒絶一節為照前項西邊進貢買賣結親納欵及遣子入質授官降印建衛羈縻如曲先罕東等衛事情先該鎮巡官㑹題乞要廷臣㑹議已該本部題奉前項聖㫖通行訪探議處去後未報案候間今鎮巡官又奏前因照得延綏地方北邊侵犯總制尚書唐龍躬臨調度地方隔逺期㑹難料若待㑹同勘議則此等在邊觀望日久生變招釁誠如鎮巡等官所慮合無除遣子入質授官降印建衛羈縻事情候總制等衙門㑹議停當至日另行奏請定奪其所奏進貢買賣結親納欵等項事該禮部掌行相應早為議處等因奉聖㫖禮部便㑹多官議了來說欽此欽遵備咨前來案呈到部臣等看得闕原係小王子部落先年因小十王據其女子戮其黨衆搆兵讎殺力不能支乃逺竄西海蟠據有年搶掠甘肅地方殘破沿邊屬番為中國肘腋之害久矣今據邊臣奏稱一旦傾心向化圗卜特穆爾等屬畨前來求稱納欵聲言為邊立功就欲許其入貢買賣結親和好又欲建衛質子授官降印等項事情重大關係安危計議應否正係兵部職掌為照本部主客一司專掌四夷進貢但係祖宗以來例該入貢之國凡事照常奉行蓋赴京自有常期夷使自有常數貢獻自有常物賞賜自有常格館待自有常禮一應題請事宜俱𨽻本部今西海闕竊據我土原非祖宗以來入貢之國甘肅地方逺通西域原非北人入貢之路況講和結親之說情形叵測通貢納欵之舉事體極重非臣等所敢擅議且今樞管大臣先嘗經略兩土人情邊務聞見必真執政諸臣尤多陛下簡拔一時人望忠誠謀國必有逺猷所據前事乞敕兵部㑹集廷臣從長議處臣等亦不敢不參與末議緣係西海遣人前來求貢納欵事理未敢擅便謹題請㫖嘉靖十一年三月十七日具題二十日奉聖㫖已别有㫖了欽此一逺夷進貢疏主客清吏司案呈奉本部送禮科抄出欽差總制陜西三邊地方軍務兵部尚書兼都察院右都御史唐龍題准巡撫甘肅右僉都御史趙載咨據陜西行都司呈奉本職㑹案前事備仰本司㑹同兵守官將土魯番等地面番王蘇勒坦莽蘇爾等差來進貢使人逐一詳審分别存留起送姓名數目并所進馬駝方物查驗的確照依往年事例造册責差的當官通伴送赴京領賞具由回報施行奉此行間續奉本院㑹案准總制陜西三邊地方軍務兵部尚書唐龍咨准禮部咨亦為前事備仰本司照依咨案備呈該部題奉欽依內事理即便㑹同兵守官將今次各國使人作急查照舊規及近年題准事例應該起送者照例起送具起送存留數目開報其額濟格依呼遜原非入貢番夷從長議處應否星速通行呈報以憑㑹議奏請定奪奉此案查先據肅州衛起送土魯番賽瑪爾堪天方國哈密額濟格依地面使人瑪哈瑪特和里鼐翁等到司查驗間今奉前因依奉行該本司掌印都指揮同知徐威㑹同肅州兵備副使粟登分守右參將都指揮楊佑議令甘州撫夷百戶沙文通事馬榮議審得呼遜王差來正副使和卓伯哩等供稱我們原係賽瑪爾堪人分在北山地名額濟格依寄住賽瑪爾堪二十日逺的路有番王呼遜管束裏頭順山住的人都像闕模樣不通進貢正德十三年有呼遜王因土魯番犯邊差著我哥哥都爾蘇等一十名隨帶方物前來甘肅州通路奏報邊情赴京進貢拿去的賞賜錢糧都交付呼遜王收了前年有呼遜王并大小頭目說先前差著都爾蘇通路進貢去了這幾年不曽差人去衆頭目寫了番本差著我和卓伯哩帶領五十八箇人進著馬駝方物到了哈密遇和里鼐翁進貢回來他們說且不要去我把賞賜送饋蘇勒坦王等我回來一答裏去我們在那裏住了一年把進貢的馬駝偷的偷了死的死了舊年十月和里鼐翁領著各國土人都來進貢我們一答裏才來到了肅州有撫夷百戶陳剛通事馬驥審驗我們把額濟格依寄住賽瑪爾堪的話不曽說只照呼遜王番本起送甘州令撫夷官通審出前情等因得此案查正德十三年八月內據肅州衛驗放賽瑪爾堪北山寄住瑪哈瑪特呼遜王差使臣都爾蘇等十名隨帶方物前來奏報邊情起送赴京貢回是的卷查今次呼遜王畨本內云稱有舊例差著使臣去來朝廷恩顧賞著各樣的賞賜打發回來等情一節為照原來各起使人數多言貌相類無從辨驗審究欲將和卓伯哩等以額濟格依地面不准進貢以禮阻回但各人供報在額濟格依地名寄住先次畨人都爾蘇等則稱北山王今稱額濟格依原非一起合無將和卓伯哩等照依土魯番事例量起送數名其餘存留在邊候呈詳允日照例起送惟復將驗過給軍馬匹量給官價以禮遣回通乞議處除將土魯番等國土夷使查照舊規照例起送外為此今將議審過前項緣由理合具呈伏乞照詳施行等因到職案查嘉靖十年十二月二十五日准參將楊佑手本開稱據使人瑪哈瑪特和里鼐翁等遞到番文一百八十七紙內有印一百七十六紙無印一十一紙發肅州衛督同撫夷千百戶陳剛等令通事馬驥等眼同譯字畨人雅克哈雅議得土魯番蘇勒坦莽蘇爾等番文七十五紙差正副使瑪哈穆特和里鼐翁等一百四十九名天方國蘇勒坦扎拉鼎等番文二十七紙正副使和卓阿克力等五十四名賽瑪爾堪蘇勒阿卜協等番文五十三紙正副使和卓瑪哈瑪特等一百六名額濟格依呼遜等番文二十九紙正副使和卓伯哩等五十八名哈密衛襲職都督穆爾瑪哈穆特等番文三紙夷使們拉伊斯瑪音等四十七名等因開報前來已經備由㑹本具題并開具揭帖送部查照及行該司將各畨詳審分别存留起送數目并所進馬駝方物查驗明白起送續准總制陜西三邊地方軍務兵部尚書唐龍咨准禮部咨准職揭帖前事又經㑹行該司查照舊規起送及㑹同兵守官從長議處通行呈報去後今據前因㑹同鎮守太監陳浩總兵官都督同知姜奭議照西域諸部其名號不係我朝封爵先年入貢止據哈密忠順王開奏某處某起人數今忠順王年久缺封哈密止照伴送之例遇夷使到日差人伴送雖哈密之人知亦未真今據行都司㑹審夷使和卓伯哩等供稱呼遜王等原在賽瑪爾堪北山額濟格依地面居住且言半是闕先年差使臣都爾蘇等進貢卷查相同則今日呼遜即前日呼遜彼時稱北山則方隅今稱額濟格依則地名耳但彼處逺方既無可稽供報詞語又隔譯審委難取實及照先年呼遜已經進貢今次來使似宜俯從如䝉乞敕該部計議合無念彼逺夷其名稱言詞不必深較准令照依賽瑪爾堪等事例量與來使之中起送數名以寓柔來逺人之意若以名稱尚殊詐冒難免亦行鎮巡官以禮遣回給過軍人馬匹仍要兩平償其價值酌於彼情參以事例通行奏請取自聖裁等因奉聖㫖該部知道欽此欽遵抄出送司案查嘉靖十一年四月內該巡撫甘肅等處地方都察院右僉都御史趙載揭帖開稱土魯番蘇勒坦莽蘇爾等差正副使瑪哈瑪特和里鼐翁等天方國蘇勒坦扎拉鼎等差正副使和卓阿克力等賽瑪爾堪蘇勒坦阿卜協等差正副使瑪哈瑪特額濟格依呼遜差正副使和卓伯哩等哈密衛襲職都督們拉瑪哈瑪特等差使臣們拉伊斯瑪音等五起番夷各進貢緣由到部行據本館通事王鳳查稱額濟格依呼遜係徼外回夷素未入貢今亦差來使臣五十八名想是土魯番部落假稱國王名色冒貢圖賞設謀詭祕亦未可知合行總制都御史㑹同巡撫官從長議處應否奏請定奪等因奉聖㫖是欽此欽遵外又查得正德十三年七月內禮科譯出瑪哈瑪特呼遜王等高昌話回回字奏文三道上天恩命大位洪福大明皇帝前瑪哈瑪特呼遜王頂上具奏因路途遙逺弟兄㑹不齊的上不曽差人進貢中間不曽有使臣往來近日間有弟兄們每㑹在一處了有約策旺要我與他做頭領那一件事我全依從了有察哈台王衆人會同要蘇勒坦莽蘇爾王做了王子其餘有名王子都歸順了他蘇勒坦莽蘇爾王我兩箇要親厚的上說要相換兒女這箇約㑹定了我來行察哈台王子的禮既來的近了就來問安兒女上相應用的稀罕的物件王子家裏應用的家火來朝廷前奏討我這裏平安奏報朝廷有朝廷的安示將來進貢西馬四匹達馬九匹専差使臣瑪哈穆特達爾罕做使臣該用的求討的快些打發回來等因該本部議看得前項求討等項番文不開是何地方及查無繳到前項番王進貢抄冊有礙查題合連送該司仰行大通事督同該管通事譯審前項求討番文是何地方番王所差進貢使臣瑪哈穆特達爾罕等見在何處有無到京其前項番文本使在於何處地方何衙門封進逐一譯審明白開報行准鴻臚寺等衙門大通事右少卿等官舍誠等手本據該管回回通事劉泰等拘集土魯番地面使臣和卓瑪哈瑪特人衆等審問前項禮科譯出瑪哈瑪特呼遜王等高昌話回回字奏文是何地方何衙門投進使臣瑪哈穆特達爾罕等有無見在到京有使臣和卓瑪哈瑪特人衆等說稱我們不知前項番文何處封進番王亦不知何地方番王差來使臣也不認得等語據審得此看得近年以來在邊遞到番文俱是鎮巡等官差人進送待該邊奏報本冊到部方可明白己將前抄案侯外續止據陜西行都司指揮使司起送哈密衛都督恩克保喇等差使臣呼遜等赴京進貢謝恩備查竝無呼遜王差使臣都爾蘇開通入貢緣由今該前因通查案呈到部看總制都御史唐龍題覆逺人通貢一節先該巡撫甘肅都御史趙載揭稱額濟格依呼遜入貢欲行照例起送該本部查得本呼遜色不載舊典原非通貢之國奏行總制㑹同彼處鎮巡等官從長議處應否奏請定奪去後今總制都御史唐龍題稱據甘肅撫夷百户沙文等譯審得呼遜王差來正副使和卓伯哩等供稱本畨原係賽瑪爾堪地面人分在北山地名額濟格依寄住正德十三年呼遜王曽差使臣都爾蘇通貢一次意欲查照鎮巡官趙載等所議准令照依賽瑪爾堪事例量行起送臣等檢閲堂稿當年禮科譯出瑪哈瑪特呼遜王高昌回回奏文三道內開差使臣瑪哈穆特達爾罕入貢該本部看得前項求討番文未見明白又無繳到抄冊仰該管通事譯審前項求討番文是何地方所差進貢使臣瑪哈穆特逹爾罕見在何處有無到京番文係何衙門封進後據大通事劉泰等回稱拘集土魯番使臣譯審都云不知前項緣由本部己行案候續止據哈密衛差來使臣呼遜等赴京進貢謝恩而前項番文所稱呼遜王差來使臣都爾蘇等實未嘗到京今據其詞未可輕信若許其入貢則賽瑪爾堪載在㑹典見今己行照例起送畨使和卓瑪哈瑪特等在途并存留男婦共一百六名口豈有一國而二王一次而兩起進貢之理况既譯審係賽瑪爾堪地面人分在北山寄住緣何不將賽瑪爾堪進貢使臣對審明白既稱寄住北山則即賽瑪爾堪部落豈可擅自稱王擅求入貢倘因容貢之後他日與賽瑪爾堪抗衡爭長兵連禍結責將誰歸但係該邊守臣失於稽查覺察遂將所進馬匹已行給軍騎操今守候日久似難遣回合候命下本部移咨兵部馬上差人齎文前去總制都御史唐龍轉行甘肅鎮巡官趙載等從長酌議若事理可行保無後患依擬將額濟格依呼遜差來使臣和卓伯哩等暫照賽瑪爾堪事例量行起送數人赴京其餘存留在邊聽候給賞以全朝廷柔逺之道往後入貢年分止許附搭賽瑪爾堪同來不許别稱王爵自分國土有違國典惟復償其馬價以禮遣回未敢擅便均乞聖裁再照鎮巡等官先因諸畨入貢名種殊常番文繁疊便當詳加譯審研究來歷備稽國典遵照事例處分為是今既失䇿於前事遂難處於後既不能深察彼情又不肯力扶國體則邊方重寄所賴何人合行鎮巡官今後務要慎重邊防保全大體毋或好大喜功召侮啓釁斯為禦戎上䇿但朝貢之禮事屬本部體統名分不敢不嚴其守邊馭逺之道責在邊臣非臣等所能知也仍乞天語丁寧申敕總制官重加省諭庶人知警飭事出萬全遐荒畏服而中國常尊矣緣係逺人進貢事理未敢擅便謹題請㫖嘉靖十一年十月初十日具題本月十三日奉聖㫖這使人既守候日久今次暫准照例量起數人入貢以後只著附搭賽瑪爾堪進貢不許别稱王爵有違國典還說與總制并鎮巡官員今後遇有諸畨入貢務要詳加譯審遵照事例處分勿得輕易許納致虧國體欽此一欽奉宣諭夷情疏主客清吏司案呈奉本部送准兵部咨該本部題為三衛外兵入境搶虜人畜官軍對陳得獲馬匹器械等事看得密雲地方大水谷關等處被諾延等衛外兵入境殺死官軍夜不收掠去人口喪失器械等項一節為照三衛夷人素稱恭順為我朝藩籬每年許其入貢二次恩典優厚比與諸夷不同乃敢一面伴送入貢一面乘機搶掠原情可惡論法該當執留貢使追究首倡為惡者聲罪致討以彰我中國之威但入境搶掠不知何衛部落未經譯審有礙議處及照邊鎮都御史總兵官調度軍馬處置錢糧保障地方責任甚重故凡遷轉去官俱係交代方許離任此自來舊規近該先任薊州總兵官楊鎮被劾革任不候交代輒自回衛當時關防旗牌符驗等項干繫至重不知何官擅自接受今都御史王大用被劾奉㫖回籍聽候本部懲楊鎮擅自離任之弊隨查前例移咨本官暫管巡撫責任聽候交代實為邊方長慮却顧今乃移咨回避先去揆之事體未宜且勘官行事應查應審人卷各自幹理亦不相妨即今該鎮地方多事一時新任巡撫總兵俱未到鎮若從其去邊方調度實為缺人再照鎮城東西參將周璿蕭升周良臣袁繼勳遊擊九聚等設官分職統兵防禦是乃職任乃敢偷安玩敵以致節次侵入一犯建昌營水谷泉墩再犯太平寨擦崖子關三犯大喜峯口關四犯密雲大水谷關所據各官先時不能設䇿防禦臨敵又不能協力追剿論法本當提解重治但地方多事緊急用人之際通合議處候命下之日移咨禮部查照先年省諭舊規令大通事將三衛見在進貢夷使責問犯邊緣由及宣布朝廷恩威殺伐利害令其悔悟懾服以弭後患等因奉聖㫖王大用著照前㫖回籍聽候這地方既夷情緊急你部裏便於各衙門相應官員選差一人暫去代管毛伯溫再著馬上差人催取前來其餘依擬欽此欽遵咨部送司於嘉靖十一年十二月二十五日拘喚見在進貢三衛夷人頭目棟阿等到部當堂令該管通事昌孝等宣布朝廷恩威殺伐利害令其悔悟及責問各夷犯邊緣由說稱作歹的人我來了不知道我既在關作歹我們也不敢來進貢才省諭的話我們回去說與都督喀喇台等知道如查有作歹的人送來邊上等語看得泰寧諾延福餘三衛祖宗建立為中國藩籬自來效順比與諸夷不同今纍次犯邊再三責問答以不知且要回去告稟在衛都督追尋犯邊之人送邊懲治觀其情狀似與無干但夷情叵測難以遽處合將各夷省令回還外再照國家制馭邊方之道貴在恩威竝用法守不失我祖宗設立三衛夷人一年兩貢恪有定例館穀之厚賜豫之繁恩至渥矣以故夷人畏威向化稱臣欵塞不敢驕背但邇年以來巡撫總兵不得其人怯懦蓄縮茍且姑息既不能振揚武略以致夷人跋扈全無忌憚謀國之臣又不能循守祖宗舊制濫容進貢冒與官職以致夷人父兄子姪爭肆求討茍不如志輒來犯邊甚則邊臣受其賄賂譯使與之交通啓釁挑禍懷奸蓄患要非一日況此敵患切門庭癰藏肘腋其於國家之事可憂方大不但損威傷體而已合候命下之日移咨兵部轉行彼處巡撫并今次差去科道查勘等官從實察訪犯邊夷人是何酋首屬何部落其陽為進貢隂肆侵犯竟出何謀根極貢使犯順之情追究邊臣失守之故徑自奏請定奪伏望皇上留情邊事振厲國威文武得人紀綱申飭則裔夷自服中國自尊邊境肅清而宗社永安矣所有奉㫖宣諭夷人文字開坐進呈瀆塵聖覽緣係欽奉宣諭夷情事理未敢擅便謹題請㫖嘉靖十一年十二月二十六日具題本月二十八日奉聖㫖知道了便行巡撫及差去科道官著從實查訪犯邊夷人是何酋首部落明白來說欽此一夷情疏主客清吏司案呈奉本部送該通政使司連狀送據土魯番夷使瑪哈瑪特和里鼐翁等告稱我們是嘉靖十年十一月有蘇勒坦莽蘇爾王差我們謝恩進貢來到肅州東關寺裏安住本月內有陳太監差家人王洪問我們要去好馬伍箇薩哈廉一箇玉石三塊留下好的一塊重三斤退回兩塊捨力孫皮三十箇鐡角皮三十條西羊布二匹銀鼠皮一百八十箇大葡萄六斗小葡萄五斗有我們衆人來京進本了也不見下落今我們去禮部去告賞行到兵部前正撞見陳太監的家人王洪拿我們的東西本人來了才得明白是我們拿去禮部告了别的要了東西的都這箇人來了我們的都明白如蒙乞送禮部憐憫逺夷有此具告等因到部送司及據陳太監家人王洪口供於嘉靖十年八月內夷人奶翁等在肅州地面與軍民人等交易是陳太監分付與伊買馬等項委果得過馬五匹并玉石一塊不知斤兩鐡角皮二十張捨力孫皮二十張銀鼠皮一百二十張鎖袱一段薩哈廉一段鎖子葡萄大小共四斗西羊布一匹說到甘州與伊價銀後洪只在肅州居住不知陳太監到甘州曽否還伊銀價據此除將王洪責令中兵馬司牢固監候并願與同監夷使二名呼爾班逹巴巴薩哩俱取收管外案呈到部看得夷使瑪哈瑪特和里鼐翁等所告前情既經奏行兵部題奉欽依轉行陜西巡按御史查勘去訖今本夷又於兵部衙門外將奏本人役扯拿到部告出前情其怨懟不平驕悍無忌甚是有傷國體但前項馬匹玉石等物審據太監陳浩家人王洪所供得過銀鼠皮等物數目多寡與和里鼐翁原奏大略相同則夷人所告不虛事為有據為照中夏之待外夷界限貴嚴所以古者大夫無境外之交本朝法例有索取之禁所據前項夷人到邊凡我守疆之臣一言不可與之潛通一錢不可與之私易況賈胡尚利易啓戎心今太監陳浩受朝廷邊方重寄乃敢違法貪黷至此不惟取侮外夷抑已敢犯重憲若是果的實情罪非輕但本夷輒擅拿人全無畏忌王洪應口供認無復辨詞中間或有隱情未可逆測但裔夷訟中國事關大體合當從重明白議處既不可墮外夷之計以損國威亦不可失逺人之心以召邊釁又不可縱邊臣之貪以屈國法且據通事人員譯知和里鼐翁等口稱欲聲寃闕廷要求明白恐亦未可諉之查勘可以杜結況此夷今在輦轂之下尚爾跋扈憑陵若回至甘肅地方事情不明夷心不服則二三邊臣豈能控制驅遣況已被夷人訴訟跡涉嫌疑勢難壓服搆禍生事理所必至臣等以為此事在朝廷當大有處分方保不害治體如䝉乞賜宸斷敕差法司錦衣衛堂上官各一員給事中一員前往甘肅地方㑹同總制官巡按御史作急勘問若夷使奶翁等所奏俱實將各官所得夷人原物盡行追給明白仍量調人馬將一行進貢夷人防送先行督令出關務在起程回國去訖勘事官方許回京具奏請㫖然後將有罪人員從重處治如此庶夷情早得明白發遣不致逗留縱肆而朝廷令嚴法重亦足以服逺夷之心矣臣等愚見區區伏乞聖明留神緣係夷情事理未敢擅便謹題請㫖嘉靖十二年二月十八日具題二十日奉聖㫖這夷情便差法司錦衣衛堂上官并給事中各一員押帶王洪及夷使前往甘肅㑹同總制尚書唐龍及巡按御史查提應審人犯逐一從公勘問明白具奏定奪各寫敕與他其餘依擬行欽此一夷情疏主客清吏司案呈嘉靖十一年十一月該陜西行都司都指揮同知徐威等起送土魯番并天方國等地面蘇勒坦莽蘇爾王等差來夷使瑪哈瑪特和里鼐翁等赴京進貢該本部將各夷使進到方物驗收及將各番王求討事情俱經具題給賞外即今差官督發各夷起程查得今次土魯番入關進貢共二百九十名天方國一百三十七名緣舊例各夷入貢十人內准與起送一人其土魯番等處來貢止許與哈密依時同來竝不許過十人後為寬禁例以舒夷情事又准每十人起送二人其土魯番天方國兩處先年赴京人數多不過二十餘人惟是今次到京人數倍多且開列地面王號動致數十以致求討之文不勝其繁不惟違越舊規抑亦非以小事大之體若不及今區處將來踵襲故常於賞賜則難於應付於體統則難以制馭恐非善後永久之圖等因案呈到部看得西域諸國載在㑹典惟是土魯番天方國賽瑪爾堪等乃其國號其稱王者亦止是一人前此求討番文除國王外多者不過十餘紙大抵皆稱王母王弟王子頭項其餘部落地面類稱頭目名色惟是今次土魯番開稱王號者七十五人天方國稱王號者二十七人不别孰為國主孰為部領今次敕書回賜之間若一槩具答如其所稱則是所開地面皆係入貢之國而彼國亦無復君臣之辨矣此等事體大有關係廟堂之上宜有處分一以尊中國之體一以折外夷之奸況其稱號名目既多則貢物雖微自當如例給賞求討相同自當逐項回答且一次准許日後遂為成例將來不副其無厭之求則執詞啓釁未必不由於此宋人嵗幣之事蓋可鑒已所以富弼當國家事勢逼迫之時猶力爭獻納二字古人慎重事體如此逺人豈得不畏我朝以堂堂一統國勢尊强非前代比況列聖相承神威聖武四夷震疊泰山之勢何所不壓而蕞爾小夷乃或肆其狡詐槩稱王號僭瀆天朝揆諸國無二主之義責之以小事大之道彼將何詞為此臣等議得今次回賜敕書除各國國王一人宜從本等稱號其餘恐未可類以王號回答合無請自聖裁敕下內閣輔臣從長議處撰敕一道發明華夷君臣大義備述祖宗相待外夷恩威並用舊規丁寧天語示以畫一之令責付進貢夷使齎還本國宣示國王俾知遵守庶懷柔之道制馭之方各得其宜斯為聖王禦戎之上䇿矣臣等膚淺之見未知逺猷伏惟聖明裁擇緣係夷情事理未敢擅便謹題請㫖嘉靖十二年四月十三日具題本月十五日奉聖㫖依擬欽此一夷情疏禮科抄出少傅兼太子太師吏部尚書華蓋殿大學士張孚敬等題今該禮部手本開稱今次進貢夷人土魯番稱王號者七十五人天方國稱王號者二十七人欲將敕書除國王一人宜從本等封號其餘未可類以王號回答合無請自聖裁敕下內閣輔臣從長議處撰敕一道責付夷使齎還本國宣示國王俾知遵守等因奉聖㫖依擬欽此欽遵臣等反覆思維看得西域諸國稱王數多恐是本國封授或伊部落自相稱呼皆未可知又查得先年土魯番等國進貢使臣多寡不同稱王者亦曽有三四十人俱以王號回答今次若不依來文止回答本國國王一人誠恐夷情不協執詞觖望合無仍敕禮兵二部再加從長議處停當奏請定奪務使國體尊嚴夷情懾服庶得禦戎之道矣等因奉聖㫖卿等以所議欲仍命禮兵二部從長計議亦是慎處之道其稱王還查舊文同否一併議來禮兵二部知道欽此抄出到部臣等議得土魯番天方國自𢎞治正德及嘉靖八年以前入貢屢次其赴京使臣求討物件稱呼名號竝未有如今次之多是以本部欲乞聖裁敕下內閣輔臣從長議處誠欲尊崇國勢節省國儲將以少效芹曝之愚也今內閣輔臣題稱前因復䝉陛下敕令禮兵二部從長議處是臣等初意欲伸中國之威而惜夫體輔臣之意恐召外夷之怨而啓乎釁皆以納忠於陛下非為身謀也但看得西域諸國稱王號者惟土魯番天方國賽瑪爾堪三國節年入貢其餘如日落等國國名尚多來朝絶少自與土魯番等國不相統屬查得土魯番自𢎞治正德以來入貢十三次天方國自正德以來入貢四次每次稱王號者多止一人或二人三人其餘多稱頭目親屬嘉靖二年八年天方國稱王號者始多至六七人土魯番稱王號者始多至十一二人而二年內賽瑪爾堪始稱王至二十七人內閣題稱先年亦曽有稱王至三四十人者蓋即嘉靖二年併三國而數之有此數也若今次土魯番則七十五王天方國則二十七王而近日續到賽瑪爾堪則五十三王併而數之則為百五六十王矣是前此來朝稱王竝未有如今次之甚其所稱王號查與舊文竝無相同即有同者地面又復不同及查先朝回賜敕書𢎞治以來或止回本國國王一人其餘頭目親屬即該載一敕之中或一地面幾處內一地面頭目幾名不拘多少賜敕一道或各照親屬名色如嘉靖八年每人賜敕一道今開列地面既多稱呼王號者尤多揆諸舊例殊為參差不一必欲依文回答如往年賽瑪爾堪例但恐彼時亦出於一時不審不及致詳之過恐未可遂以為例襲而行之也況賽瑪爾堪止因嘉靖二年添稱王號二十七人此其肇端今次遂致倍踰其數豈不可為鑒哉查得成化元年該禮部議稱土魯番等國今後來朝經由哈密地方者就彼聽候同來竝不許過十人及不得假作别番名目濫放入關此係著例可考者也𢎞治元年該甘肅鎮巡等官奏稱哈密地面同賽瑪爾堪天方國等處使臣六百一名土魯番三起男婦四百十四名口俱來進貢本部為照差人過多冒賞太濫議擬合於六百一名口內量准二百名其天方國果係原來夷人量准十數人起送來京其額外多餘并土魯番等三起合俱以禮阻回及請敕切責鎮巡官員今後務要照例驗放起送其守關原報官貟行巡按御史查提問罪此係禁例之嚴近在孝宗之朝非逺也則是前此國家之處三項夷人固嘗禁其不得假濫名目亦嘗節其起送人數至於土魯番三起男婦四百餘人又嘗盡數以禮阻回既而於鎮巡驗放官員則加切責於守關原報人員則行提問是皆老成謀國之臣其重體惜費伸威振法處置曲盡固未嘗慮有他患也臣等竊謂自古中國之於裔夷當其來朝入貢雖嘉其納欵之誠未嘗直與拒絶至於貢期方物未嘗不有體例為之節制其或名號僭差言詞侮慢未嘗不正以大義責其無禮必如此而後有內夏外夷之辨天冠地履之分庶幾德可逺施威可逺加而中國不失為中國矣今土魯番天方國稱王太多事關國家大體若謂其本國封授則前此舊文所無若謂其部落相呼則不當聞於闕下若止依來文回答則土魯番天方國皆一國也恐自此而為數十國矣若類以王號答稱人與敕書一道竊恐自今以後各項地面各執所得敕書率其部落任意加增將來無時入貢勢難阻絶貢使日增則道路有司供費日甚賞賜回答無有紀極以府庫有常之財似不足以充溪壑無涯之欲況臣等昨來親赴左順門看給回賜土魯番天方國所費禮物不資其織金蟒龍各樣鳥獸段匹俱係永樂年間織造之物顔色鮮明金縷緻密非近年織造者可及詢之管庫人員亦云見今積貯空虛後將難繼且夷人所貢鐡銼等件俱無用之物而竭我帑藏以應彼求討是敝中國而事外夷恐非計之得者也臣等愚議合無查照纍朝舊規成化𢎞治年間事例今次回賜敕書除本國國王一人應從原來稱號其餘止宜照依原來各項地面名目直書不用王字不拘地面多少給賜一道不必人與一敕於本國國王敕內伸重天語少加詰責今後不許濫稱别項地面王號止照先年頭目名色入貢使知國無二王大義仍乞定以貢期限以人數不許其來朝無時如此庶幾正名定分謹始防微伸中國之威懾外夷之心禦戎之䇿斯為得矣臣等管見區區如此若夫長慮熟計𢎞見達識為國家建千百年久逺之謀實惟密勿元臣職掌絲綸之事伏乞聖明仍敕輔臣參酌臣等查議稽按纍朝舊章應否從長處分使國體尊安惟復依文回答使夷情順悅臣等擅難定擬伏乞聖裁緣係夷情及奉欽依卿等以所議欲仍命禮兵二部從長計議亦是慎處之道其稱王還查舊文同否一併議來禮兵二部知道事理未敢擅便謹題請㫖嘉靖十二年四月二十九日具題五月初四日奉聖㫖是這各夷敕書每國稱王只准一人餘俱作頭目字樣欽此一請給敕書疏主客清吏司案呈先該本部等衙門㑹議得今次回賜土魯番等國敕書除本國國王一人應從原來稱號其餘止宜照依原來各項地面名目直書不用王字不拘地面多少給賜一道不必人與一敕等因㑹題奉聖㫖是這各夷敕書每國稱王只准一人餘俱作頭目字樣欽此除備行翰林院撰給去後節該內閣退出手本稱說每國地面人名數多回賜并求討物件尤多若共載一敕紙張短窄難以該載等因案呈到部看得臣等原議大略惜王號之答無非尊崇國體之意伏奉欽依仍足正名定分伸威正法可為萬世遵守者也其回賜敕書臣等原議不必人與一敕良以王言如絲其出如綸故議欲少賜裁抑以慎重綸綍亦使不為異日藉口沿襲得以加增入貢將無紀極況訪得各夷每次回賜敕書人齎一道每敕用馬二匹用跟隨人夫二名騷擾地方陵虐驛遞皆以敕書為詞但前此賜敕數少驛遞猶可支持若今次土魯番天方國共百有二人若賜敕一百二道其勢益盛其為地方之擾驛遞之害何可勝言聖王之政惠近以及逺春秋之法詳內而略外此臣等所以有前議也今因內閣說稱前因連日差官請敕議擬未定各夷羈住日久專待敕書啓行為此臣等今日親赴內閣㑹同輔臣面議委的人數太多紙幅短窄不能共載一敕及議得各地面夷人頭目既已更易名稱須更人與一道使知朝廷回答恩典正名大義似亦穩便況止是回賜禮物之文與詔諭國王敕書不同合無伏候聖裁俯從臣等㑹同內閣今議其求討夷人宜照依原來番文頭項人與一紙候寫完之日總封完固共為一通責付夷使瑪哈瑪特和里鼐翁和卓阿克力二人各齎回本國國王照名給散庶朝廷之體統外夷之觀聽驛遞之便益無不於此得矣緣係請給敕書事理未敢擅便謹題請㫖嘉靖十二年五月十六日具題本月十八日奉聖㫖依擬欽此一雩壇禮儀疏祠祭清吏司案呈該本部題伏覩崇雩壇告成除祭器樂舞舞衣等項一應事宜先已具題奉有欽依行移各該衙門欽遵外所有儀注先該本部參酌欽定祈穀儀注議擬上請迄今未䝉欽定發下及樂章未經翰林院撰擬臣等仰惟皇上敬天勤民稽古建事比嵗肇建雩壇於圓丘之旁以祀天禱雨為民祈福誠帝王之重務子育元元之盛心也竊惟本壇儀注樂章係出肇創初制必須預為酌定演習熟間庶修舉雩祀之時禮備樂和可以宣達隂陽感通上下且當著之祀典永示遵守所據本壇告成日久其儀注樂章俱未經擬定目今天時亢暵臣等欲恭請聖駕出郊致禱但裁擬未定未可舉行相應具請伏望皇上念兹雩祀重事聖朝特典萬幾之暇將前次進呈儀注俯垂睿覽早賜聖裁仍特命翰林院撰擬樂章祀文發下本部及所司遵奉施行遂令載諸祀典以昭一代之休臣等幸甚天下幸甚等因題奉聖㫖這雩祀樂舞禮儀你每考議一帖來看欽此欽遵臣等謹按古者大雩之祀命樂正習盛樂舞皇舞夫凡祭非不用樂也獨雩祀用盛樂凡樂必備歌工舞士獨雩祀重舞蓋樂舞者無非假聲容之和以宣暢隂陽之氣詔告天地之間以達神明之情耳而雨者乃天地之施必隂陽和而始降也此神理感通不過如此然上世之禮無所於考而後代之制不能皆同亦未能盡合先王之禮臣等請參酌古今為之㑹通除一切奠獻樂歌禮節具如常儀外惟盛樂皇舞之說宜稍依據古人創為聖朝之制臣等請三獻禮成之後九奏樂止之時燎揚將舉贊者宜贊樂奏雲門之舞樂舉乃贊禮畢仍命儒臣檃括雲漢詩詞别製雲門一曲使文舞士武舞士竝舞而合歌之雲門者乃周官大司樂以祀天神之舞取其雲出天氣雨出地氣也堯取以名樂亦本此耳仍於正樂之外神樂觀增設鼓吹數番選教舞童百人青衣執羽繞壇周旋歌雲門之曲而舞曲凡九成而始奏禮畢其舞節樂數合候命下行太常寺少卿張鶚逐一議擬㑹同本部參酌停當伏請聖裁所據前項加增樂舞及先經進呈儀注謹參録一通開坐上請伏乞聖明特賜裁正頒下遵奉施行臣等不勝幸甚緣奉欽依這雩祀樂舞禮儀你每考議一帖來看事理未敢擅便謹題請㫖嘉靖十二年五月初十日題十四日奉聖㫖是依擬行欽此計開大雩乃祀天禱雨之祭如遇一嵗天氣亢暵則于季春之末禮部具奏請行雩禮得㫖行欽天監擇仲夏吉日具奏舉行一前期五日太常寺奏請欽命文武大臣每日視牲一次日太常寺奏祭祀如常儀一前期三日告請太祖配神于太廟行一獻禮一前期二日太常卿同光祿卿面奏省牲如常儀一正祭前期太常寺陳設如儀是日早免朝錦衣衛備法駕設板輿于奉天門正中上常服乘輿至南郊由西天門歷昭亨門降輿過門升輿至崇雩壇之西降輿禮部太常官導上由東左門入正南靈星左門入壇由中陛左升至壇恭視神位畢出至神庫視籩豆至神厨視牲畢導駕官導上至幕次具祭服出導駕官導上由左門入內壝靈星左門入壇典儀唱樂舞生就位執事官各司其事內贊奏就位上就御拜位典儀唱迎神奏樂樂止內贊奏四拜上四拜平身傳贊百官同典儀唱奠玉帛奏樂內贊奏升壇上升至上帝前奏跪搢圭上跪搢圭司香官捧香跪進于上左奏上香上三上香訖捧玉帛官以玉帛跪進于上右上受玉帛奠訖奏出圭導至太祖前儀同進香并帛俱右奏復位樂止典儀唱進俎奏樂齊郎舁饌至內贊奏升壇上升至上帝前奏搢圭進俎出圭導至太祖前儀同奏復位樂止典儀唱行初獻禮奏樂內贊奏升壇上升至上帝前奏搢圭捧爵官以爵跪進于上右上受爵獻爵上獻訖奏出圭奏詣讀祝位奏跪上至讀祝位跪傳贊百官皆跪樂暫止內贊贊讀祝讀祝官跪讀訖樂復作內贊奏俯伏興平身傳贊百官同導至太祖前儀同前奏復位樂止典儀唱行亞獻禮奏樂儀同初獻惟不讀祝樂止典儀唱行終獻禮奏樂儀同亞獻樂止太常卿進立于壇前東向立唱賜福胙內贊奏詣飲福位上升至飲福位奏跪奏搢圭光祿卿捧福酒跪于上左內贊奏飲福酒上飲訖光祿官捧福胙跪于上左內贊奏受胙上受訖奏出圭俯伏興平身奏復位上復位內贊奏四拜上四拜平身傳贊百官同典儀唱徹饌奏樂執事官徹饌訖樂止典儀唱送神奏樂內贊奏四拜上四拜平身傳贊百官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各詣燎位上退拜位之東立典儀唱望燎奏樂樂奏雲門之曲內贊奏禮畢導駕官導上至幕次易祭服畢還宫壇上樂舞不止九成乃止一雨澤疏祠祭清吏司案呈該本部題奉本部送據順天府呈先奉禮部劄付該本部題奉欽依仰本府率屬祈禱雨澤等因到府率領僚屬官吏人等擇日齊戒於各廟䖍誠祈禱除本年五月十三日節降微雨未遍不開外至十九日申時分天降雨澤至酉時止普沛肆野入土約有三寸理合呈報施行等因到部送司案查先該本部題稱今春徂夏亢暵不雨今照例行順天府率屬祈禱奉聖㫖依擬欽此續該司禮監太監戴永傳奉聖㫖今春徂夏雨澤愆期農事可憂朕心怵惕你部裏已奏令順天府率屬祈禱了今自明日始朕與爾文武羣工各修省齊心滌慮以俟甘澤青衣朝參辦事雨降後如故禮部知道欽此又該司禮監太監韋霦傳奉聖諭朕惟時雨未降麥苗稿矣昨有㫖令順天府率屬祈請久未感通今自本月二十九日始爾遣官各致齊三日於五月初二日卿言祭北極佑聖之神侍郎若水祭東嶽泰山之神春祭都城隍之神道瀛祭漢前將軍夀亭侯之神務秉潔誠以格神貺欽此傳奉到部節經通行欽遵外今該前因案呈到部臣等仰惟皇上憂切蒸黎慮深稼穡宸衷積念天意遽回移造化之𤣥功革隂陽之常數致兹甘雨尚及農時布護彌漫和氣同帝謨之廣運滂沱霑霈天澤與恩波而竝流肆野同歡玖農相慶天心默佑閭閻歌大有之年帝力何知海宇洽無為之化臣等謬司邦禮樂此歲功優渥均沾涓滴無補惟知慶忭百倍恆情所據向來陛下減損服御飲膳及臣下朝參服色并諸燕享之禮宜遵照先奉欽諭一切如故事事臣等未敢擅便謹題請㫖嘉靖十二年五月二十日具題二十二日奉聖㫖是亦有諭了欽此一修省疏祠祭清吏司案呈奉本部送禮科抄出少𫝊兼太子太師吏部尚書華蓋殿大學士張孚敬等題今日臣等趨朝忽見彗星復出於東北約在畢昴之間光芒稍見臣等竊惟變不虛生仰惟皇上聖德格天自足以弭變致祥但臣等奉職無狀祗懼之心不能自已除另行自陳外合無令該部具奏通加修省以回天意等因奉聖㫖彗星為異退而復見者四矣上天垂戒朕敢不祗懼卿等各思匡逮不必自疏便擇日朕於殿陛祭告爾文武羣工宜痛加省慎以贊朕不逮上回天意禮部知道欽此欽遵抄出送司案呈到部臣等仰惟陛下秉純聖之德勵精明之政兢兢業業欽崇天道顧畏民碞可謂至矣乃兹彗星之異三嵗四見至厪聖心祗懼卜日躬即殿陛行祭告之禮敕大小羣工痛加省慎重以贊朕不逮為言此實明王克謹天戒之心一念抑畏之誠固以感格於冲漠之表妖星之退天意之回必有響應者矣但揆厥所由實由臣等佐理無狀鰥曠廢職積愆稔戾之所致也除欽遵明命痛加省慎外仍通行榜示大小羣工一體欽遵以十二日為始青衣朝參辦事至祭告後三日而止仍乞天語丁寧申敕羣臣自今伊始凡一切用人行事務宜秉執公正絶去私邪勿飾虛文務宣實政庶幾仰承德意以上答天心實為宗社生靈幸甚緣節奉欽依禮部知道未敢擅便謹題請㫖嘉靖十二年六月十二日題本日奉聖㫖依擬爾文武羣工俱與有天工之責各宜痛滌乃心秉公持正以贊朕躬勿視為故事欽此一公務疏祠祭清吏司案呈奉本部送禮科抄出南京禮部等部右侍郎黃綰等題案照各准本部咨准工部該户部等衙門㑹題該欽差總督漕運兼巡撫鳯陽等處地方都察院右副都御司劉節題開地方應議事宜內一件建城垣據直𨽻鳯陽府申前事議照各府州縣俱有城池鳯陽府乃國家根本重地所設留守司并鳯陽府縣以及八衛一所獨無城池可為防守纍經建議拘於方向有礙年嵗荒歉既舉復輟合無再行南京禮工二部各委堂上官一員并欽天監熟知地理風水官員親詣鳯陽府精加相度如果便利無礙相應建築甎城就行定擬闊狹逺近并興造規模畫圖貼說仍計合用工料徑自奏請裁奪等因該戶部等衙門㑹議題奉欽依咨行工部看得所題建築甎城事宜相應勘處備咨到部轉委臣等親詣鳯陽府查照都御史劉節所議前項事宜逐一相度查處徑自奏請定奪隨該臣等行委南京欽天監冬官正許濟等并中都留守司署正留守孫璽等鳯陽府知府李瑜等各親誼相度隨據委官冬官正許濟等呈稱相看得鳯陽府治原無城垣止存土埂五十餘里中有皇城一座內包萬嵗山東西山勢相連皆拱對皇陵其萬嵗山正當前案自建皇陵到今土脉靈氣祕結年久誠恐建築城垣不免開壕動土關係匪輕今將相過緣由圖樣呈乞照驗等因又據該司府各回申亦稱風水有礙等因相同臣等又經親詣陵寢及府治處所逐一相度切照鳯陽府治所關固宜有城池以為保障都御史劉節之奏誠為地方急務但仰惟皇陵乃宗社萬年基本而鳯陽府治正在皇陵前面護砂明堂之中凡附近四圍山場地土纍朝以來例有重禁不許軍民砍伐樹株掘取土石開鑿窯井及皇城內外不許耕種近陵處所不許置設油榨恐有震驚況今欲築鑿城池大興工役山川風氣焉保無傷且皇城所包萬嵗山即皇陵案山所以聖祖當時建立皇城形如半月抱向皇陵其東西鐘鼓二樓并各城門臺基亦皆拱向又看得周圍城基止有萬嵗山後北門一段見存甎城數丈其餘俱是土牆亦無開鑿壕河及查中都志書亦云土牆無壕竊想聖祖建極開基三十餘年九州四海周思曲慮無有不至髙城深池隨處創建未嘗患財力之不足豈有龍飛故鄉之地慮猶未及而惜此數十里城池之費哉蓋有深意存乎其間而非今日所敢輕測也若欲於此建築城池決當審避以故前此纍經相勘人員不敢明言姑以年向不利地方荒歉為辭臣等親詣相度實見陵寢所關如此焉敢茍徇一方私見依違兩可不為陛下明言以致萬一之誤哉伏乞聖明留神睿斷庶於根本重地可保萬全而臣等叨䝉任使之責可無負矣等因奉聖㫖禮工二部看了來說欽此欽遵抄出送司案呈到部看得南京禮部等部右侍郎黃綰等題稱先該戶部等衙門㑹議備咨坐委臣等親詣直𨽻鳯陽府相度應否建置甎城事宜臣等看得本府在皇陵前面護砂明堂之中凡本陵附近四圍山場地土纍朝例有重禁不許伐木取土等項恐有震驚今欲築鑿城池大興工役有傷皇陵風氣決當審避一節為照鳯陽府治皇陵所在乃聖朝祖宗根本之地山川靈秀王氣所鍾不宜震驚騰泄誠如各官所議相應依擬合候命下二部行移彼處巡撫官及咨都察院轉行巡按御史并各該衙門一體遵守不須築城則皇陵永固而長保億萬年無疆之休矣緣奉欽依禮工二部看了來說事理未敢擅便謹題請㫖嘉靖十二年七月初九日具題十一日奉聖㫖是欽此一公務疏祠祭清吏司案呈奉本部送禮科抄出南京禮部等部右侍郎黃綰等題各准本部咨該戶部等衙門㑹議前事題奉欽依咨行到部坐委臣等親詣直𨽻鳯陽府地方精加相度應否建置甎城臣等到彼相度恭詣皇陵備審山川形勢有無妨礙因見寶山背面有孔數處似係狐狸所穿不勝駭愕切見凡人墳墓遇有此等孔穴皆知掩塞恐於氣脉有傷況皇陵靈氣所鍾乃宗社萬年根本萬一狐狸之類藏匿其中日積月纍往來穿穴為害匪輕乞敕該部詳議差官一員帶同諳曉風水員役親詣寶山處所看驗孔穴淺深如有狐狸等物在內務要設法驅除就將孔穴擇日填塞緣此舊無事例以故看守人員不知所處仍乞天語叮嚀奉侍內臣及奉祀官員自今以後皇陵周圍內外務要不時相看遇有前項孔穴即便奏聞掩塞毋令積久滋深等因奉聖㫖禮工二部看了來說欽此欽遵抄出送司案呈到部看得南京禮部等部右侍郎黃綰等題稱近因坐委臣等親詣鳯陽府相度應否建置甎城到彼恭詣皇陵審看有無妨礙因見寶山背面有孔數處似係狐狸所穿誠恐日積月纍為害匪輕乞要差官帶同諳曉風水員役看驗擇日填塞一節為照皇陵係聖朝祖宗神靈體魄妥藏之地其寶山背面又為切近𤣥宫處所豈宜狐狸得以穿穴誠宜急用填塞今該各官看驗具奏前來相應依擬合候命下禮工二部各差屬官一員帶同欽天監諳曉地理人役前去督同彼處府衛掌印官親詣皇陵寶山背面看驗孔穴即便如法填塞仍行翰林院撰告文太常寺關領香燭帛一并齎捧前去及行彼處撫按官著落有司備辦祭品擇日躬行祭告行事務要填補停當修築堅固事畢畫圖貼說具奏覆命緣奉欽依禮工二部看了來說事理未敢擅便謹題請㫖嘉靖十二年七月初九日具題十一日奉聖㫖是欽此一慶皇朝彰聖德以贊中興之世以昭治化之隆少攄圖報疏祠祭清吏司案呈奉本部送禮科抄出朝天宫道録司致仕左𤣥義張振通奏臣籍係閩之福安留江唐上柱國端國公之後葉也臣少游泮水蚤失父天户役交連官司逼迫臣𢎞治壬子赴京因風土不服疾患屢作藥石無功遂慿親禮部祠祭司郎中林壂保息本宫茍全性命故宗老氏之門頗識清微之㫖臣謬膺前職拙守山林晨夕焚香於蒼穹之下上祝皇圖日永聖夀天長國泰民安風調雨順海不揚波三邊息塵嘉靖五年正月初五日欽䝉聖恩命臣撰修道教清微典章臣恭奉德音敢不敬承節次書完進繳臣僻居無用之地至賤至愚不幸出五倫之外負愧負慚臣修道四十二年功無毫髮感聖皇莫大之恩慚無補報際中國文明之世形穢士風洪惟聖主陛下天縱英華光文協帝至仁育物勇智自天四海歸仁萬邦協慶大孝啓慈闈之下德音溥寬大之恩當河清海晏之時正君聖臣忠之日千祥至止萬國交歡相職隆燮調之寄文風當大振之時聖德日新經筵朝進學蓋羣英之表仁孚萬國之春招天地之至和慶君臣之同德萬邦獻頌千載難逢臣觀歷代聖王無如今日之盛矣臣於祝釐之餘徒抽黃而對白不知沿流以失源作國朝中興詩二十一首天降寶露詩一首白鵲呈祥詩一首白兔獻瑞詩一首金臺八景詩九首武夷九曲詩十一首皇陵八詠詩八首輔臣贊和詩一首共成一册謹録上進伏望皇上以天地為量矜其愚不録其咎當萬幾之暇曲垂采覽益加宸翰正之萬感賜臣前序臣不勝感戴天恩之至等因奉聖㫖禮部參看了來說欽此欽遵抄出送司案查左𤣥義張振通緣係先年乞升受職人數於正德十六年六月內奉詔裁革原非致仕案呈到部參看得革職左𤣥義張振通本以流俗微跡託身𤣥教先因夤緣冒濫升職後遇詔例裁革閒住正宜幽藏跧伏攻苦食淡以畢餘齡庶幾無玷清規茍全末路乃復假借儒墨杜撰瞽言雖皆歌咏聖德紀述禎祥之詞然鄙俚紕繆言不成章且古人里巷歌謠固未嘗禁其自為但不當猥以疵賤塵瀆宸嚴實為僭踰至欲請乞宸翰賜之序文尤屬狂悖之極究其用心無非呈技眩名希圖叙用據法所當究治合候命下之日將本道參送法司問擬應得罪名用懲不恪俾狂妄小人知有朝廷之尊而無忌憚者足警於將來矣緣奉欽依禮部參看了來說事理未敢擅便謹題請㫖嘉靖十二年八月十六日具題十八日奉聖㫖是張振通著法司提了問欽此一祭祀日期疏祠祭清吏司案呈該欽天監開送擇到嘉靖十三年分祭祀日期副本到司案查先該本部欽奉聖諭令該監官另具一副本來看了方著進正奏欽此今該前因案呈到部今將該監開到祭祀日期副本一本理合隨本先行進呈御覽請㫖發下其正本仍令該監於本月初八日早照例于奉天門設案由中路進奏緣係祭祀日期事理未敢擅便謹題請㫖嘉靖十二年八月二十六日具題二十八日奉聖㫖有諭卿言了欽此一陳情比例懇乞天恩賜復封號恭承祭祀慶賀以便稱呼以竭愚衷疏儀制清吏司案呈奉本部送內府抄出岷府冠帶管理府事彥汰奏切念臣猥以凡庸幸叨宗末每懷靡及補報無由臣於嘉靖四年按法規諫逆弟彥泥反纍革爵仰荷聖明在上公道昭彰該部詳議臣之奏詞果遭屈枉題奉明㫖復臣冠帶管理府事臣已感戴皇上曲賜生成之恩至矣盡矣臣時加悔悟自新勉圖報稱益當知操盈之戒豈敢興覬覦之私伏念臣管理府事恭承祭祀山川社稷慶賀聖夀等節且隨班行禮者則有各該郡王暨諸將軍以下宗室及官吏生員人等居臣之後臣居班首未䝉賜復封號稱呼誠為不便以故昧死懇乞天恩賜復舊封王號庶乎行禮之間祝讃有儀觀瞻不失臣查得石城端隱王子鎮國將軍宸浼子拱梴查比代府武邑王聰􅞜蜀府華陽王申鍷沒後俱得復奏緣由比奏隨該禮部議得宸浼既是查明止因迎父册而失拜君恩縱下人而誆騙民財比與聰􅞜申鍷打死人命敗壞祖宗神廟奸謀等事者尤為不同原情酌理相應追封祭葬又查得管理府事弋陽王拱匱首為伊祖奠壏先因訐奏寧靖王奠培革爵奏辨亦得追封臣因按法諫弟以致褫爵伏望皇上篤念親親一視同仁乞賜復臣封號俾臣得以竭誠慶祝祗承祭祀有便稱呼臣昧死投陳不勝懇切戰栗之至等因奉聖㫖禮部知道欽此欽遵抄出送司查得嘉靖十年十月內該敕賜攝理府事岷世子譽榮奏稱懇乞特賜綸音復父舊爵免其攝理一節該本部查例議擬具題看得庶人彥汰犯該荒淫敗度抗制擅權幽囚嫡母至於焚死親逼多官令其稱臣僭分千名不守國法其獲罪降革與見灂鍾鍑事體頗同今岷世子屢次奏乞辭免攝理以全子道情詞懇切義重天倫況彥汰降黜既久懲艾已深改過自新或能仰遵先前聖諭但爵位難以議覆合無准令岷世子辭免其庶人彥汰查照見灂鍾鍑事例授以冠帶令其管理府事惟復别有定奪恩典出自朝廷等因覆題奉聖㫖譽榮既纍次具奏情詞懇切你每又這等說彥汰與冠帶管理府事著務要敬遵祖訓改過自新如再不悛國典具在必不輕貸欽此欽遵外今奏前因案呈到部看得岷府冠帶管理府事彥汰奏乞比例賜復封號以便慶祝祗承祭祀稱呼一節參照彥汰先因幽囚嫡母致死逼令多官稱臣犯罪深重革爵降為庶人後因世子譽榮纍次奏乞辭免攝理府事以全子道情詞懇切該本部題奉欽依准令辭免彥汰授以冠帶令其管理府事恩至隆渥彥汰自宜恪遵成命安守常職勉圖後善以副朝廷篤厚親親之意却乃不能痛加悔艾輒又攀援覬覦煩瀆聖聽相應切責再照該府長史等官職專輔導不能以理匡諫致令任意奏擾各該官員據法亦應究治但恭遇嘉靖十二年八月二十五日恩詔所據該府官員相應免罪伏望皇上將彥汰嚴加戒諭務令遵守先奉明㫖用心管理府事不許似前奏擾若再不安分守法定行查照本部原日題奉欽依仍令世子譽榮管理府事仍舊革去冠帶庶幾法令嚴明恩威兼著而宗室知所警畏矣緣係陳情比例懇乞天恩賜復封號恭承祭祀慶賀祝讃以便稱呼以竭愚衷及奉欽依禮部知道事理未敢擅便謹題請㫖嘉靖十二年十月初三日題初五日奉聖㫖是彥汰著照舊冠帶管理府事不許再來奏擾如違定行處治不饒欽此南宫奏稿卷四
