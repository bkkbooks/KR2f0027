body:
  text: 南宫奏稿巻二明夏言撰一定擬郊廟粢盛疏該司禮監太監鮑忠題嘉靖十年二月二十六日奉聖㫖西苑等處但有空閒土地都要耕種五榖牛具種子并應用農器奏領銀錢買造使用欽此本月二十九日臣帶領本監右監丞宋興等并内官監太監温璽等及官匠人等親詣西苑等處逐一將空閒土地通行丈量過共七頃九十四畆五分畫圖貼説具奏節該奉聖㫖有㸃的都要宜時耕耘種五榖欽此欽遵有㸃的地計六頃三十七畆三分一釐内除建造帝社稷壇無逸殿豳風亭省耕亭恒裕倉省斂亭并御路稻池界境糧場及蠶宫各衙門直殿碾磨農夫農器房屋占用一頃二十畆一分七釐行間該戸部印信手本為快覩親耕陳愚見以禆化理事該順天府宛大二縣送到應用農夫牛具種子犁耙鍬鋤等器臣就㑹同戸部右侍郎張雲郎中張玩及府縣委官李僉等督率農夫於本年三月十一日起將堪種土地五頃十七畆一分四釐耕治播種五榖間續奉聖㫖先蠶壇着戸部栽培小様桑樹欽此臣又同右侍郎張雲并兩縣上林苑監委官侯璽魏夢吉等於先蠶壇西夾道栽植小様桑樹七百八十株完備訖臣仍督率播種既畢將牛具發出又買辦騾一十六頭西苑專力耕種責令老人孫泰等管領農夫孫得玉等將水旱田禾自春徂夏及秋沿段履畆耘耨澆灌三時既畢禾稼告成刈穫登場揚簸堅實除獻新進用留種并稭奏賜各衙門不開外謹將見在收過各色糧八百五十八石八斗二升七合於本年八月二十五日眼同右侍郎張雲郎中張玩等逐一盤量明白運輸恒裕倉管事奉御郭真等看守訖臣竊惟農桑王業之本小民之依古先哲王之所慎重者也但載諸典籍未有見諸行事今聖上定耕藉之儀立先蠶之制身先天下風動四方實千古而一見者也如䝉乞勑該部著為令典使歲有常規以供郊廟粢盛之用以昭聖上敬天勤民之意以立萬世永逺之規臣下情不勝忭躍快覩之至等因隨該戸部右侍郎張雲題同前事俱奉聖㫖是君后耕蠶以供郊廟粢盛衣服除親蠶已定有儀注了今將西苑隙地命内外官貟耕種五榖已經收穫藏貯恒裕倉内着禮部查照著在令甲毎歲定擬戸部官二員管領耕種各郊廟合用粢盛定擬數目支給其田地頃畆農夫牛具冊籍喂養等項一應事宜都立為一定規制以垂永逺庶稱朕敬天事神之意便開具来看欽此欽遵行據藉田祠祭署呈報常年郊廟合用粢盛等項數目前來案呈到部臣等竊惟古者天子躬耕以供粢盛是以有千畆之藉㳟惟皇上敬天勤民憲則古典耕藉之禮每歲舉行猶以郊坰遼逺不得時時觀省又即西苑之中以為農桑之所雖於農務有内外之分而恪共神祀之心則一也兹者農事告成御廩充實乃命有司定擬支給之常以供郊廟粢盛臣等查得舊規郊廟百神之祀所用粢盛以及葱韭芹菜醤醋之𩔖悉取給於神倉乃今西苑之獲固足以供一歲祭祀之用但藉田之舉皇上躬執三推而公卿共宣其力校之西苑為重西苑之事雖屬農官督理而皇上時省耕斂校之藉田特勤所據二倉之儲委當分屬兼支以供郊廟祭祀合無每歲將藉田之所出者藏之南郊圓廩方倉以供圜丘祈榖先農神祗壇厯代帝王長陵等陵以及百神之祀西苑之所出者藏之恒裕倉以供方澤朝日夕月太社稷帝社稷太廟世廟祫祭禘祭先蠶先師孔子之祀庶稱我皇上敬天禮神勤重至誠之意而内外倉廩之儲皆得以供明薦事體便而禮意周矣謹將查過每年該用粢盛等項數目開具揭帖隨本進呈乞惟聖明裁定嘉靖缺聖㫖是郊廟粢盛支給數目都依擬行其田畆農夫等項冊籍立為定規的還㑹同戸部擬議來説欽此一計處西苑事宜以重粢盛疏先該本部題該司禮監太監鮑忠題奉聖旨是君后耕蠶以供郊廟粢盛衣服除親蠶已定有儀注了今將西苑隙地命内外官員耕種五榖已經收穫藏貯恒裕倉内着禮部查照著在令甲每歲定擬戸部官二員管領耕種各郊廟合用粢盛定擬數目支給其田地頃畆農夫牛具冊籍喂養等項一應事宜都立為一定規制以垂永逺庶稱朕敬天事神之意便開具來看欽此欽遵該本部將粢盛數目議擬開具上請奉聖㫖是郊廟粢盛支給數目都依擬行其地畆農夫等項冊籍立為定規的還㑹同戸部擬議來說欽此欽遵臣等仰見陛下重神祀而勤民生拳拳於稼穡之務是以經畫􅅵畆優復丁夫㑹計穜稑之種樹藝之宜各有章程至於錢鎛芻牧之微亦皆揆䇿商訂著之典籍以為永圖陛下所其無逸之心真足以綿宗社無疆之福者也臣等欽遵明諭㑹同戸部尚書許讚等將田畆袤延之數農官督理之規饋餉耕夫之費畜牧種植之務一一籌計開立條件進呈御覽伏候命下行令各該衙門一體遵守紀之冊籍歲歲舉行以為定式仍行史館採録以彰昭代之良規以作則於萬世緣奉欽依還㑹同戸部擬議來説事理未敢擅便謹題請㫖計開一每年遵照欽依戸部侍郎一員雲南清吏司郎中一員於春作之時提督管理直至收穫仍不妨部務一耕熟地五頃十七畆一分四釐每年合用各項種子聴督理官於見收穫内照數支用一耕地騾頭共一十六頭每騾一頭日支草三束料一斗宛大二縣俱按月造冊赴部關領勘合赴御馬監倉場委官主事處放支一農夫五十名及管農老人四名養騾夫八名毎名日支口糧三升宛大二縣按月造冊赴部坐撥太倉糙粳米内支給仍免本身差役一恒裕倉看守人役遵奉欽依太倉取撥軍斗三十名應用一凡遇農忙時月或車水及㧞稻鋤地等項農夫應用不敷許令府縣委官於外雇進應用計日酌量輕重給與工食工畢即行退出一每年收成畢日内外提督官貟總將放過各項糧數備造文冊進呈一見今置備農器物件等項遇有損壊令内官監增修送用嘉靖十年十一月十九日題二十二日奉聖㫖這西苑田畆農具等項你每旣㑹議停當立為定規着各該衙門遵行還送史館纂輯欽此一時享太廟奉安神主疏該輔臣張孚敬李時翟鑾題稱孟夏時享太廟臣等俱係欽命捧主官員思得太廟先年祭祀止設衣冠行禮皇上改行出主誠為得禮之正又臣等恭覩皇上誠敬篤至徧詣各廟躬自啓納未免過勞臣等於心竊有未安臣等愚見合請今後太祖神主皇上躬自安設其各廟帝后神主各令内外捧主官員自行安設啓納等因奉聖㫖禮貴可乆依所言行欽此欽遵臣言承乏禮官備員捧主看得前者行禮專於㳟捧神主以奉陛下出納奉安至於啓匵又係内府近侍官員陛下毎廟躬行奉安出納備極㳟敬周旋甚勞誠如輔臣所請伏䝉陛下嘉允甚慰臣心但禮旣更正便合注為定儀所據捧主出至殿庭初事啓匵出主奉安及終事納主於匵非一人能兼必先有安置之處或增設佐佑之人方能成禮從事在即臣言未敢擅擬伏乞聖裁示下以便欽遵三月二十九日題本日奉聖㫖是捧帝主大臣以太常官佐之捧后主以神宫監内侍官佐之欽此欽遵今擬儀注一通伏乞裁定施行計開捧帝主大臣捧至神位前跪太常官跪取匵置神位御褥之左捧主大臣將神龕通授太常官跪捧大臣奉帝主出安奉於神座太常官以神龕置匵所仍以匵韜之退祭畢捧主大臣詣神位前跪太常官啓匵先捧龕跪大臣奉帝主納龕中太常官還授大臣仍取匵韜之大臣捧入寢殿奉安捧后主内臣捧至神位前跪内侍官跪取匵置神位御褥之右捧主内臣將神龕通授内侍官跪捧内臣奉后主出安奉於神座内侍官以神龕置匵所仍以匵韜之退祭畢捧后主内臣詣神位前跪内侍官啓匵先捧龕跪内臣奉后主納龕中内侍官還授内臣仍取匵韜之内臣捧入寢殿奉安嘉靖十一年四月初一日題本日奉聖㫖依擬欽此一定擬泰神殿禮儀疏本年九月二十日本部尚書兼翰林院學士臣夏言於重華殿面奉聖諭泰神殿石座既成朕當親徃奉安禮卿宜具儀来看欽此已經欽遵具儀呈覽於十月初九日欽奉聖諭神御版自奉天殿奉詣泰神殿仍朕親奠獻餘依擬欽此臣等隨詣泰神殿㳟視庭陛丈尺及陳設神案拜位之所其殿内除神御臺座之外僅足行禮加以正配位各設神案縱横聯屬隙地無幾皇上躬親奠獻請於正位三爵俱當自西面東而獻配位三爵俱當自南面北而獻庶便周旋又泰神殿南向石陛原遵奉欽定五級每級髙可尺餘恐於登降未便合無行令工部㑹同内府衙門添造木陛展為九級臨期安設以便行禮臣等謹遵聖諭定擬儀注并將恭視過殿庭丈尺圖様一幅隨本進呈御覽候命下之日行令各該衙門一體遵奉施行計開一吉日行欽天監選擇一捧神主合用太常寺執事官十一貟行該寺定擬奏請一配殿合用分獻大臣二員臨期太常寺奏請一先期翰林院撰祝文太常寺備脯醢酒果制帛香燭錦衣衛備隨駕儀仗一前一日上行告廟禮畢太常寺設神輿香案於奉天殿設神案貳於泰神殿神案貳於東西配殿各設祭品如常儀香案壹於丹墀正中司設等監設上拜位於香案之南讀祝位於正位神案之南大次於圜丘左門外一是日質明上具常服詣奉天殿行上香一拜三叩頭禮畢退立於殿東西向執事官捧昊天上帝神主次捧太祖髙皇帝神主又次捧從位神主各奉安輿中訖錦衣衞舉輿由殿中門出大明門正陽門入昭亨門歴圜丘至泰神殿門外正位配位神輿舁入停於殿外丹墀從位神輿停於殿門外兩傍先是百官俱常服於南郊迎候上乗輅由大明門正陽門西天門入至昭亨門外偏西降輅禮部太常寺堂上官各二貟導上由圜丘外内壝靈星左門入繞圜丘東至泰神殿丹墀内執事官就神輿中捧昊天上帝神主由中道至殿中陞石座奉安於龕中次捧太祖髙皇帝神主次捧配殿從位神主各奉安訖典儀唱執事官各司其事内賛奏就位典儀唱迎神内贊導上詣香案前奏跪奏上香司香官以香跪進於上左上三上香訖奏復位奏鞠躬四拜典儀唱奠帛行初獻禮内贊導上升殿詣上帝神位前奏奠帛捧帛官以帛跪進於上右上受帛奠訖奏獻爵捧爵官以爵跪進於上右上受爵獻訖導上詣讀祝位奏跪贊讀祝讀祝官跪讀訖奏俯伏興平身導上詣太祖神位前儀同奏復位分獻官各詣配殿行奠帛獻爵禮典儀唱行亞終獻禮如前儀唯不讀祝分獻官儀同上復位内贊奏鞠躬四拜典儀唱讀祝官捧祝進帛官捧帛各詣燎位上退立于拜位之東内贊奏禮畢導引官導上出至大次陞座鴻臚寺引導駕執事等官贊行一拜三叩頭禮次引百官儀同畢上乗輅還宫一禮部堂上充請神導引官太常寺堂屬充捧神位官先期具名題請欽定禮部官一員上香行禮一前一日太常寺設香案於泰神殿丹墀正中一將事之夕三更一㸃導引捧神位等官詣泰神殿行上香一拜三叩頭禮畢太常寺官九員分詣東西配殿陞石座各請從位神牌出龕先雷師次風伯次雨師次雲師次周天星辰次二十八宿次五星次夜明次大明捧降丹墀東西向立太常寺官一員詣配位石座請太祖主出龕本寺少卿一員捧降至殿中西向立本寺官二員詣正位石座分立左右請上帝神版出龕本寺卿一員捧降至殿中南向立禮部堂上官導引出殿先上帝次太祖次大明次夜明次五星次二十八宿次周天星辰次雲師次雨師次風伯次雷師由圜丘北門陞壇先正位次配位次從位各依原序先後奉安於神座訖候上至大次率各官上香官致詞復命叩頭出祭畢如前儀捧主官仍依次奉神版神牌神主禮部官導引入殿以次納於龕中奉安訖各官仍行一拜三叩頭禮出一遣官代祀奏定禮儀䟽該内閣輔臣宣示臣言欽奉聖諭朕面生癬痒别無他恙待二三日必消暫免視事用示卿等及轉示禮卿言知之欽此欽遵臣等切惟今歳天氣亢旱鬱熱早發陛下偶生面癬正緣感熱所致照得本年五月十一日夏至陛下將躬祀皇地祗於方澤臣等仰惟今春聖體違和祈榖上帝之禮已嘗遣官代行天相聖明茂綏多福固已倍萬康寧但即今四月中旬尚爾燠熱比及夏至煩溽必甚况恒𤾉已久暑氣驟酷北郊在安定門外比之南郊稍逺陛下躬冒炎鬰逺即郊野萬一衝冒暑雨臣等實甚不安合無不為常例今歲北郊特免躬祀暫遣大臣一員㳟詣行禮陛下齋居九重精意潛達亦足以展祗肅神祗之敬待明歲夏至氣候清和照舊舉行似為便益臣等再惟陛下奉天法古啓建郊壇去歲禮成之初陛下㳟行祀事春朝禮日秋夕禮月穆穆皇皇對越顒若固足以展肇稱之敬而立萬世之規矣臣等仰惟陛下父天母地毎歲宜躬承祀典其朝日夕月遣官行禮朝日則遣文職大臣夕月則遣武職大臣著為常典其於郊祀隆殺之義聖躬保䕶之道似為兩盡亦不為越禮臣等無任區區伏惟聖明裁擇嘉靖十一年四月二十一日具題二十四日奉聖㫖是今春祈榖祀天朕以疾未躬行北郊依擬暫命大臣行禮朝日壇間歲一親祀以甲丙戊庚壬年行事夕月并神祗壇毎三歲一親祭以丑辰未戌年行事著為令典又該本部題稱本年五月初十日夏至大祭地於方澤合無不為常例今歲北郊特免躬祀暫遣大臣一員行禮等因節奉聖㫖是北郊依擬暫命大臣行禮欽此欽遵臣等竊惟前項郊祀之禮雖經奉有欽定儀注止是皇上躬祀之儀其暫行遣官儀注未經裁定及查得大明集禮内有遣官奏告圜丘方澤儀注其行禮之節甚為周悉臣等竊惟禮以定上下别嫌疑而郊祀又禮之重且大者其遣官行禮儀注若不預為詳定未免涉於僭儗非所以明等威一觀聴也臣等謹將欽定儀注及大明集禮逐一參詳撰為遣官行禮儀注一通開坐上請伏乞聖明裁定計開一祭祀前期太常寺具本上請欽定遣官職名遣官受命報名謝恩齋宿如常儀先一日遣官及分獻陪祀官各致齋於祭所一是日先期太常寺陳設如圖儀設遣官拜位於壇下内壝正中設遣官讀祝位於壇上避御拜位近北陛設典儀贊引官位於遣官拜位之南贊引引遣官分獻陪祀官各服法服候於壇壝外南向立典儀唱樂舞生就位執事官各司其事贊引引遣官由内壝右靈星門入贊就位典儀唱瘞毛血唱迎神奏樂樂止贊四拜遣官及衆官各四拜平身典儀唱奠玉帛奏樂贊陞壇遣官由壇西陛陞至皇祗香案前贊跪搢笏遣官跪搢笏司香官捧香跪于遣官右贊上香遣官三上香訖捧玉帛官以玉帛跪於遣官右遣官受玉帛奠訖贊出笏贊引引至太祖前儀同贊復位樂止典儀唱進俎奏樂齋郎舁饌至贊引贊陞壇遣官復由壇西陛陞至皇祗前贊搢笏進俎出引至太祖前儀同贊復位樂止典儀唱行初獻禮奏樂贊陞壇遣官由壇西陛陞至皇祗前贊搢笏捧爵官以爵跪於遣官右遣官受爵贊獻爵遣官獻訖贊出笏贊詣讀祝位遣官退至讀祝位贊跪遣官及衆官皆跪樂暫止贊讀祝讀祝官跪讀訖樂復作贊俯伏興平身遣官及衆官皆俯伏興平身引至太祖前贊搢笏捧爵官以爵跪於遣官右遣官受爵贊獻爵遣官獻訖贊出笏贊復位樂止典儀唱行亞獻禮奏樂儀同初獻惟不讀祝樂止典儀唱行終獻禮奏樂儀同亞獻樂止贊引贊復位遣官復位贊四拜遣官及衆官四拜平身典儀唱徹奏樂樂止唱送神奏樂贊四拜遣官及衆官四拜平身樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各詣瘞位奏樂贊禮畢樂止贊引引遣官及衆官以次出太常寺具福胙於神所禮成奏進宫嘉靖十一年五月初三日題初五日奉聖㫖是依擬行欽此一議處雩壇事宜疏竊惟大雩之祭乃古先帝王為民切至之心葢以建巳之月萬物始生故請命上帝以祈膏雨其與祈榖之祭意義本同慨自秦漢以來正雩禮廢顧兹茂典有待而行仰惟皇上敬天勤民稽古善治斷自淵𠂻特下勑㫖令臣等㳟建雩壇於南郊天神降休臣民丕應固將成之不日永奠萬年臣等行與駿奔豈勝慶幸所據祭器樂舞等項必須斟酌古今以成一代鴻章鉅制庶幾仰稱皇上祈天保民之盛心臣等謹逐一議擬開坐前件請自聖明裁處計開一祭器臣等仰惟雩壇之制雖與圜丘不同而大雩之祭比之祈糓實𩔖其玉帛邊豆醴齊牲牢等件俱合照祈糓品數伏乞聖裁一爐鼎照得雩壇止去地一級其四圍合用爐鼎四箇壇面合用爐鼎二箇比之圜丘所用合稍减四分之一庶規制相等欲候命下轉行内府鑄造一燎壇按陳氏禮書曰雩祀既祀上帝必升烟後世謂用火不可以祈水而為坎瘞殊非古禮今照雩壇焚帛合用燎壇一座其髙廣規制乞命工所内外官㑹議建造相擇吉地畫圖上請惟復止用燎爐俱乞聖裁一樂舞謹按月令仲夏命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調笙竽竾簧飭鍾磬柷敔大雩帝用盛樂而杜氏通典亦曰雩五方上帝命樂正習盛樂舞皇舞葢雩祀之禮所以祈雨澤必備極聲容之盛以詔告於天地之間而宣達隂陽之氣故郊以禮為重雩以樂為主今照雩祀在近雖杜氏五精之帝其說近誣而四時成嵗之功所據雩祀上帝合照圜丘樂舞之數以四方之色成造樂舞之服務極鮮明令彩色錯然舞歌間作足以達宣和氣庶稱古人盛樂皇舞之制一樂章合用迎神奠帛進俎獻爵徹饌送神等曲乞命翰林院撰擬請自聖明裁定嘉靖十一年三月十三日題十九日奉聖㫖准用燎壇着工所㑹議畫圖来看樂舞服色還查議停當具儀依擬欽此一懲邪説以正典禮疏該直𨽻廣平府儒學教授張時亨建言明倫大典節目未盡本原未究乞要更議以覺羣疑一節臣等仰惟陛下大孝之志通於神明上聖之資總兼述作即位以來既追尊皇考位號又㳟建世廟以崇萬世之祀閟宫有侐祀事孔明在列聖既無統序之嫌於皇考已極尊崇之實愛親敬祖偹制盡倫本之聖心播之天下傳之後世已無纎毫可議今張時亨乃謂向年皇考之喪禮制未備乞行追補廟號未稱乞行更定及欲刻懸皇考聖像奉以歲時及請聖母衣帝服正位内庭請陛下執皇太子禮關决政事又欲自皇上誕生之日以至即位之年追改鍾祥年號等事則其誕謾無稽􅎩惑觀聴狎侮朝廷全無忌憚其罪有不可勝言者夫自皇考升遐之日迄今閱有歲年一旦輒廢吉禮更從㓙制言之不祥孰大於此且皇考享世廟特祀之尊為百世不遷之主以奉天子禮樂顧不足以盡聖人無窮之孝而乃欲下倣匹夫之行為刻木奉祀之禮哉况皇考隆名徽號尊上有年𫝊之天下萬世簡册昭明彼一介小人乃敢擅擬廟號且杜撰俚言全於諡法無據聖母徳擬姜莘譽齊任姒閨門之化直與二南同風乃欲躬被帝服與政外庭陛下光臨大寳乆握乾綱大君天下十有一年於兹乃欲重屈萬乗之尊俛執青宫之禮不惟瀆䙝慈元上戾祖訓抑且冒干宸極潛抑主威據法誅心罪在不赦况陛下誕生之歲乃武宗皇帝在御之辰豈可盡削編年預承國統所據狂悖之言有干憲典之重事關國體漸不可長參照張時亨本以市井庸流狎邪無恥昔年叨冒甲科因選期不及輒投赴金水河陳訴則其决性命以饕富貴之心已見於筮仕出身之日今復厭薄卑官妄生邪説假以上書希求進用且時亨以進表來京事完日久乃敢潛住京師妄行奏擾事屬欺慢在法難容再照近日有等無知小人不事本等職業専務窺伺風㫖摭拾狂言逞奸飾詐連章累奏妄議朝廷典禮究其所自𩔖皆不識一丁徃徃假手奸人與之代筆抑或在位不才臣僚諷使狂愚以覘探上意非惟輕瀆聖聴抑且有乖政體若不痛懲一二無以警戒將来如䝉乞勑錦衣衞將張時亨拿送都察院查照律例從重問擬請自上裁仍乞特降嚴㫖出榜禁約今後但有無知小人假以建言擅議宗廟及干涉宫闈指斥乗輿者治以重罪使知國法嚴明不容輕犯而爵賞至重難以妄干庶奸邪屏息而治道光矣嘉靖十一年三月十一日題十三日奉聖㫖尊崇大禮朝廷已有定典張時亨假以建言為由輒敢妄議意在希圖進用又潛住京師日久依擬着法司提了問欽此一酌古典舉望祀以祈聖嗣疏先該大學士李時等題竊惟皇嗣者天子之儲貳宗廟社稷萬民之所係屬在今日所最重而至急者伏望皇上於新春之首親製祝文分遣廷臣齎捧香帛前徃各該嶽鎮地方竭誠祈禱等因奉聖㫖朕思日前卿等此奏出於忠懇至誠不當已者但遣使逺出未免擾吾百姓今一面分遣道士齎捧香帛幡祝去令彼處官員竭䖍行禮一面就於今建地祗壇卿等徃詣祈告仍行卜筮於太廟禮部㑹翰林院議具奏来欽此欽遵㑹同大學士李時等謹議仰惟皇上因輔臣之請軫祚𦙍之懐將禱祠山川以祈鍚羡然不欲分使逺出重煩百姓陛下一念惻隱之仁已足以覆宇内而育羣生矧於𦙍嗣之祥寧不足以塞本支百世之盛乎臣等聞虞書云望秩於山川周禮男巫掌望祀望衍說者謂衍進也葢山川在逺不能一一就祭故延進其神遥望而秩祭之也乃者皇上兆建祗壇以崇隂祀自嶽鎮海瀆以及逺近名山大川莫不懐柔即此而行祈禱之禮適合古人望秩望衍之義但古者望祀之禮山川並行而兹者輔臣之請止於嶽鎮臣愚以為海瀆山川之神其含英畜萃以發祥効靈者與嶽鎮同功况基運翔聖神烈天夀純徳諸山又為祖考妥靈之地猶之木本水源枝流所賴以逺茂者祈禱之禮似不可缺但欲逐位遣官奠獻誠恐壇面窄隘不便周旋合無毎壇簡命大臣一員主行奠獻之禮其五府九卿并勲戚重臣俱令一體陪祀以同致感格之誠所據祈告之禮誠今日所當舉行者也但陛下欲於太廟之中仍行卜筮此固陛下尊祖敬神之盛心但太卜筮人之書今不可考而世之所𫝊又皆末技淺數與古不同况天子所用龜必千歲而蓍長九尺乃為靈異即今卒未易得似難舉事秪修望秩之祀以竭祈禱之誠則百神效靈黙翊皇祚重光繼明之慶當不占有孚矣臣等欽遵聖諭考據古典并撰擬儀注一通上呈御覽㳟候聖明詳定欽奉施行計開一吉日行欽天監擇取一祝文行翰林院撰擬一祭七壇牲牢品物行太常寺備辦前期陳設如常儀禮神制帛青紅黄白𤣥共二十七段一主行奠獻文武大臣共七員臨期禮部疏名上請以候欽命典儀贊引執事等官俱於太常寺屬官内差委一前期三日分祭及執事者俱於本衙門齋戒如常儀一是日質明分祭官各具祭服登壇典儀唱執事官各司其事贊引贊就位各官俱就位典儀唱迎神贊引導各官各詣香案前贊跪贊搢笏贊上香司香者各以香進各官俱三上香訖贊出笏贊復位贊鞠躬四拜典儀唱奠帛行初獻禮贊引導各官詣神案前贊搢笏贊奠帛捧帛者各以帛進各官俱以帛奠訖贊獻爵捧爵者各以爵進各官俱受爵獻訖贊出笏導各官詣讀祝位贊跪贊讀祝讀祝者跪讀訖贊俯伏興平身典儀唱行亞終獻禮如前儀惟不讀祝各官復位贊鞠躬四拜典儀唱讀祝官捧祝進帛官捧帛各詣瘞位贊引贊禮畢各官降壇次日早於奉天門復命嘉靖十一年二月十八日題二十日奉聖㫖是都依擬行欽此一専祀先賢以崇功徳䟽該巡按直𨽻監察御史施山等題稱大名府古有名宦狄仁傑冦凖鄉賢劉安世祠宇書院二宦一賢功徳顯著乞要專祭一節為照狄仁傑仕唐位至司空薦賢為國廷爭面折忠扶唐室竟成夾日之功奏毁淫祠大著闢邪之力故其生有國老之稱而死䝉文惠之諡冦凖仕宋官拜平章秉道嫉邪忘身狥國澶淵之役旋乾轉坤雷陽之貶秋霜烈日相才致同列之推感竹遺邦人之愛若狄與冦功業俊偉增光青史真無愧於所謂名宦者也安世挺生元祐師事司馬得盡心行已之要而用功於自不妄語遭炎海瘴嶺之行而勵節於略不動色在人目為鐵漢自許欲為完人其為諫官有殿虎之號若元城者道誼髙明皦如白日真無愧於所謂鄉賢者也所據三賢之在大名雖有祠祀未列國典委宜專祭庶稱褒崇既該巡按監察御史施山具奏前來相應依擬合候命下之日行移翰林院撰祭文仍照例定與祭品行大名府轉行該縣於每年春秋仲月就遣本縣掌印官致祭如此則報功崇徳之典大備於今日風化美而政教章矣嘉靖十一年十月二十三日具題二十九日奉聖㫖是這名宦鄉賢都准收入祀典着有司專祭欽此一從實修省以弭星變疏嘉靖十一年八月初六日於内閣捧出聖諭朕聞彗星再見於井宿之間夫斯變也未及二歲凡三見焉乃朕所召卿等即刻𫝊朕意於禮卿言生辰慶賀俱令免行自明日不必吉服只如常服視事以承天意欽此欽遵節該本部題稱萬夀聖節非尋常慶賀可比乞要俯狥輿情照常舉行其應天弭變之實俟禮成之後通行諸司痛加修省仍各條列具聞等因奉聖㫖是應天必以實兹不過變其服色暫輟禮儀耳依擬照舊行待禮畢各務要實加修省以弭變異欽此欽遵備付到司案呈到部臣等竊惟和氣致祥乖氣致異人事失於下天象見於上應之以實則變異自消忽而不戒則渝怒滋甚感應之機捷於影響天道神明誠有不可誣者仰惟皇上尊天敬地稽聖法祖凡所以修已安民真徳實意朝夕惕勵罔敢怠遑者葢一紀于兹矣以皇上之天徳純一治理休明宜乎禎祥疊見而災異不作也乃二歲之間妖彗三見此實變之大者陛下一聞占史之言特降宸諭引咎責躬慶賀大禮即欲輟免臣等仰見陛下克謹天戒之心雖成湯之六事自責宣王之側身修行殆不是過矣臣等䝉昧㒺測幽𤣥但聞之𫝊曰彗者除舊布新之象齊晏子曰天之有彗也所以除穢也變不虛生有所由召人無釁焉妖不妄作今日之異乃皇天眷佑陛下丁寧反覆以致告戒之意曩者陛下雖嘗降㫖令大小臣工痛加修省以答天譴矣然卒未有革心勵行以仰體陛下之心者今兹變異之來不職之罪又將安所迯哉雖然是在陛下以至誠之意正厥事以應之耳昔宋公一言而妖星退舍大戊桑榖共生於朝而反化為祥陛下寅畏天戒必行應天之實臣等將見百祥來止而太平之業不難致矣伏望皇上仰承天意益加祗懼先勑下各該衙門大小臣工務要洗心滌行省愆思過勉修職業毋或怙終以干邦憲自本月十四日為始其如故事各青衣角帶朝叅辦事三日仍通行九卿衙門六科十三道各條列時政得失以聞臣等尤願陛下上念天地祖宗付託丕基之重下思子孫黎庶倚賴鴻庥之逺超然廣覽毅然英斷進君子退小人開衆正塞羣枉以安危責大臣以是非責言路庶幾振起治功同底於道如是而天心不格休徵不應無是理也臣等奉職無狀感召災變實為諸司之首謹跧伏屏息以俟天威重加誅譴臣等無任恐懼隕越之至嘉靖十一年八月十二日題奉聖㫖彗星三見為妖必有其由上天垂愛朕敢不祗承夙夜思省未自逸寧卿等文武羣工皆有輔贊之責可不痛思省改匡朕一人十四日起本是因事輟朝不可又説是修省自本月二十一日始終三日淺衣辦事九卿衙門官還各着自陳以聴裁處其餘依擬務要思忠論實不許挾持泛引假公報私欽此一恤邊難立義塜以廣仁恩疏該巡按直𨽻監察御史徐汝圭題稱㓂兵由黄木山孤店兒東堂坡一路直至大同教塲退囬至大同迤南十里地名寺村兒安營向南由艾家莊袁家莊龍堂兒大河等處因見古定橋邊設有伏兵隨即由應州迤西邊腰堡流胡堡張家堡小石堡東馬堡西馬堡朱家堡又南過懐仁迤南振子上堡灰泉堡水口堡東言莊西言莊石家莊堡王家堡毛家堡小橋堡厮唎堡又復徃北大同迤西八里莊出大邊去訖凡經過地方皆被荼毒前項等堡居民多有横罹鋒刃者實所當恤又聞陜西及延綏等處地方重被災傷多有輾轉而死者其與大同各堡遭酷於鋒刄者雖若有間然均之一死皆可痛心乞勑各處撫按官員毎村各立義塜以收埋屍骨仍為祭章俾各分祭等因奉聖㫖該部看了來説欽此隨該兵部題奉聖㫖是欽此欽遵移咨到部看得巡按直𨽻監察御史徐汝圭題稱大同地方冦兵入境陜西延綏地方重被災傷民多死亡乞各立義塜收埋屍骨仍為祭章分祭一節為照先王昭澤及枯骨之仁聖人垂掩骼埋胔之令矧其莩死於饑餓之餘喪首於鋒鏑之下者屍骸委棄無所收恤尤可憫怜是以征西陣亡之士藝祖以之興悲而青州流斃之民守臣為之立塜是皆前代之善政垂譽於無窮者也兹者擁衆入冦大同諸堡悉被殘毁延綏等處重被災傷一則殺戮徧於原野一則饑羸轉於溝壑是以沿邊諸郡白骨委積誠可傷心恭惟皇上先因廷臣之議降優恤軍士之㫖内帑賑濟之資其施恩於僅存之民可謂渥矣惟兹死亡幽滯之衆未䝉聖澤似為缺典所以本官具題前来相應依擬合候命下移咨都察院轉行三邊撫按衙門查照今擬事理于沿邊去處空閒地方各立義塜將陣亡及餓死并一應無主之屍著令所在官司加意收掩開穴叢葬務在得所乞勑翰林院為又一通賫捧前去仍令所司備物致祭以昭皇上仁覆閔下之恩不特澤及枯槁而且逮於幽冥矣縁奉欽依事理未敢擅便謹題請㫖嘉靖十一年正月初八日題二十六日奉聖㫖是依擬行欽此一重獻瑞兎乞免稱賀疏該欽差總理糧儲兼巡撫應天等府地方都察院右副都御史陳軾奏獻瑞兎等因奉聖㫖禮部知道兎留内欽此欽遵臣等仰惟皇上徳懋中和效臻位育大化達於兩間至仁浹於九有由是協氣充塞靈物滋蕃所以白鵲白兎白鹿之瑞接踵而至但前此四川貢至白兎已經呈獻太廟世廟呈覽兩宫皇太后文武百官上表稱賀今該巡撫應天等府地方右副都御史陳軾所進白兎雖産自東吳與西蜀所獻同一希珍瑰瑋所據一瑞再見尤足以表嘉祥駢集之休兹欲仍復舉行前典但恐事神則近於繁禮稱慶則嫌於同辭臣等雖欣躍倍常而不敢以彌文具請臣等竊惟自古符瑞並臻應徳而至陛下徳及太清道合無疆將来瑞應之見日月不絶載於史官將不勝紀臣等議得今後四方有所貢獻凡係創見特出之瑞俱當呈獻宗廟兩宫百官表賀以昭皇上聖徳格天之徵其係一物而再至屢至已行獻賀者俱合欽遵昨奉聖㫖進留内苑簡遴囿人珍重飼養以祗承天貺庶幽明上下之間天人感應之際禮文不瀆而驩欣交通矣伏乞聖裁著以為令俾有所遵承臣等不勝歡躍慶忭之至嘉靖十二年三月二十七日具題四月初一日奉聖㫖白鵲鹿兎已屢行獻賀之禮今後或有重至不必復舉你部裏還通行天下果非正瑞自至者勿報欽此一明設科條以處積弊疏該欽差刑科等衙門給事中等官傅學禮等題稱遵奉欽依查盤過太常寺一應錢糧物料其巻宗簿冊自相矛盾互有多寡及稱鹿隻尅減犧牛瘦小奸弊多端情法難恕乞要通行查究及議處弊端一節為照國家大事莫嚴於祭祀而鉅細品物實司於太常為該寺者誠宜精白一心恪㳟乃職以仰承陛下敬天禮神至意緣各項錢糧皆由本寺坐派支銷一向漫無稽考以致因襲之弊已非一日所以本部題奉欽依特差科道官查盤稽考今該查出前項弊端事皆據實出入之數既有不明侵漁之情難保無有所據該寺并犧牲所官員均屬不職法難輕貸委應通行查究庶足以懲不恪合候命下本部移咨法司將該寺首領官吏并一應經該人役及犧牲所官通行提問将各項欠少錢糧逐一查究明白奏請發落其該寺堂上官并丁憂去任典簿趙澍應否一體追問本部未敢擅擬伏乞聖明定奪但臣等看得該寺前項弊端俱係未經查理之前一應錢糧品物紀載出納全無簿籍文案可以稽考法制不備人人可緣為奸若遽繩之以法彼或各執一詞所據已徃之愆合無量從曲宥今既經查理之後所當懲弊立法明設科條務俾經久通行庶免將來無弊所有前項香燭果品鹿兎等項俱係供祀應用不可缺者合無本部行令太常寺將年例一應祭祀該用香燭果品等項若干大約每年報祭若干備細開報本部行移内府并順天府各該衙門照數徑自支發應用仍置立文簿二扇送部用印鈐記一扇存留本部一扇發寺收掌每遇年終明白開詿支銷數目送部查考著為令典永示遵守其犧牲騐收之時各該委官務要選擇大様純色肥腯者方許發所存牧如該所委官不行如法喂養以致瘠損及有通同抵換情弊俱聽緝事衙門訪拿并本部委官查出呈部叅究庶法令嚴明弊端可杜而典祀之官可以寡過矣所以科道等官傅學禮等請陛下寧過宥其無知之罪毋寧失今不為之處是亦情法兩盡嚴恕得宜之論也臣等未敢定擬伏乞聖裁嘉靖十一年十二月二十八日具題三十日奉聖㫖該寺首領官吏并一應經該人員都着法司提了問堂上官并去任的待問明了一併来説其餘依擬欽此一乞宥言官以勵臣節疏先該福建道監察御史喻希禮題為溥恩宥過以迓天休以彰聖徳事奉聖㫖這本所説意以為祈嗣不在修醮在於求下臣得罪於君本其自取非其君之弗仁此説謂朕罪責他毎以致遲嗣此理有無人則知之果若是亦朕自取該衙門參看了來説不許黨護欽此又該浙江道監察御史石金題為崇聖徳廣聖嗣𢎞聖恩以凝天眷事奉聖㫖這所言一併看來欽此欽遵參看得御史喻希禮奏乞聖恩曲宥逺戍諸臣為足以招祥致和石金奏乞皇上凝神端拱不必勞以萬幾一節為照肆赦宥罪乃朝廷不測之恩勤身勵精實帝王至要之務今喻希禮等職居言路論事乖踈乃謂宥罪即可迓天休狃於常情福利之説謂養心遂不當勤政是啟人君以怠逸之歸且與祈嗣之禮不相干涉所以聖明精鑒責以理道罪實難辭但二臣識見蹇淺自坐迂愚不善開陳詞涉支蔓原其本意似亦無他伏望皇上俯垂慈貸曲示優容或量加罰治以懲其狂率或特賜戒飭以開其愚䝉則聖徳容物適足以示無我之公而小臣省愆將益勵不欺之節矣嘉靖缺一慎重恩典以杜濫請疏先該都察院右副都御史王應鵬等題稱看得巡按福建監察御史蘇信奏勘過已故左布政使查約右參議楊瑀都指揮僉事王翺經厯周煥各前項被殺事情委可矜憫乞要褒録一節相應議處以昭激勸等因奉聖㫖禮部詳議了來説欽此又該禮科給事中薛宗鎧題為明賞罰以定國是事奉聖㫖這本説的是禮部一併看了来説欽此欽遵臣等看得人臣之死事變以節義為難朝廷之加䘏恩以功徳為重故士貴處死古人有鴻毛泰山之喻所以國家於死難之臣必責以義理之正有關激勸而后褒崇之典行焉上不濫予下無虚冒庶幾名實相副足以風厲海内禮典所在關係非輕今照左布政使查約右參議楊瑀都指揮僉事王翺經厯周煥偶以公事㑹集適遭重囚反獄挺兵突至事出倉卒横罹鋒刃死極慘毒委可哀憫但臣等切詳前項罪囚反獄弄兵自求脱命乗勢肆毒何暇擇人而查約等適相遭值變出不虞遁身無從駢首遇害比與孫燧許逵等抗節不屈以身殉國周憲等臨陣奮勇以死勤事者大有不同所據乞要比照孫燧等死節恩典事例一體褒録臣等輒難輕議今給事中薛宗鎧具奏前因葢本官彼時居閩屬邑中間事體顛末聞見尤真無非公是非慎賞罰之意與本部查議相同今該巡按福建監察御史蘇信查勘各官被殺事情及該院覆題前因委的詞多文飾義涉牽附殊非公論惟是各官不得其死原情雖足哀矜然無禆於公安所議其褒録况先年已經奉有欽依量賜各官營葬䘏典所加已足酬死所據該院請乞表彰褒録俱難准行且各該地方官員平時不能禁奸倉卒不能禦亂以致方面守臣分閫帥職當白晝大逵之中憲司公署之地以數輩么麽囹圄之羈囚而操刃一呼𨽻卒潰散衣冠竄伏肝腦塗地為國大辱漸不可長而當事執法之臣不能彰明憲典以正生者之罪誠有如給事中薛宗鎧所論者但查得前事先年已經都察院行勘參題奉有欽依各該失事官員俱已罰治外事屬已徃亦難再議但再看得給事中薛宗鎧奏内所言罪囚林汝美等應决而久不决不錮之臬司而置之於縣獄徃來易通之地是示之以無生之路而與之以可乗之機此實本官嘗為有司目擊時弊反獄殺官之禍本原在此葢在外衙門問刑不審輕易入人死罪徃徃獄成而事在矜疑以致難於處决後官拘於成案避嫌畏事莫肯平反以致重囚淹禁經年老於囹圄及在外各按察司官徃徃移囚府縣以預防反獄之事罪不及已殊不計州縣衙門獄戸垣墉卑隘監守人卒寡少易於反獄而按察司在省城之中狴犴牢固可以防禦今欲覬免已之罪而不顧貽地方之禍是何心哉合候命下移咨都察院通行天下今後凡係死罪重囚俱解送按察司監錮不許寄監府縣如係應禁按察司罪囚而移監府州縣反獄者罪坐按察司掌印及該道分巡官如係應决罪囚不决而淹禁反獄者罪坐本年巡按御史著為定例則反獄之禍可弭而地方不致有他變矣嘉靖十二年正月二十一日具題二十三日奉聖㫖是依擬行欽此一參懲詐冒以杜奸萌疏先該道録司僉書右至靈聶一然奏乞天恩自首改正以圖補報等情奉聖㫖禮部看了來説又該大徳顯靈宫敷教真人李雲嵱奏為乞恩休致老病以終殘喘等情奉聖㫖禮部知道又該大徳顯靈宫道士穆正增奏為乞恩分理等情奉聖㫖禮部知道欽此欽遵通抄送司隨行道録司散拘李雲嵱等到官審得穆正增即朱正増年五十六歲係順天府宛平縣民狀供正增與在官周一澋即周伴兒馬時明即馬福受真人李雲嵱即李躧住右至靈聶一然即聶道兒於成化𢎞治等年間俱各關給度牒出家於顯靈宫為道士各不合不守清規專一投托權貴正徳四五等年間正增不合夤緣已故權奸魏彬誘引進見先帝投充義子賜姓朱氏𫝊陞體道真人職事又不合將已伏誅劉瑾名下抄没入官田地房屋侵盗與人佃種賃住遞年共得利銀三千兩雜糧一千石入已李躧住不合依附已故權奸陳應循傳陞敷教真人職事正徳十六年四月㳟遇皇上御極將正增等真人職事俱各削除正增前項侵盗官物罪名亦䝉赦宥不合不行首正致被地方總甲具呈都察院委官喻御史行拘正增到官參送刑部四川清吏司審究明白問擬杖八十罪名比例奏請節奉聖㫖穆正增情罪深重難照常例發落追贜完日押發廣西奉儀衛充軍遇赦不宥欽此欽遵將正增監追贜銀尚未發遣正增不合遂將度牒隱匿嘉靖元年九月内例該秋報設醮李躧住不合營求管修串同周伴兒聶道兒各不合將欽賞各道士官銀侵分入已聶道兒得銀一十五兩周伴兒得銀六十一兩五錢李躧住得銀二十二兩紵絲絹各一十一疋馬福受揣知前情不合要向李躧住等挾分財物李躧住等不從馬福受將情具奏隨該刑部題奉欽依行拘李躧住等官審究明白將李躧住周伴兒聶道兒各問擬雜犯斬罪准徒五年馬福受問擬杖八十追出度牒照例還俗各發原籍當差李躧住等各不合仍在本宫潛住與正增等仍托權貴巧肆夤緣嘉靖二三等年間節該御用監太監黄錦傳奉聖㫖大徳顯靈宫方丈一所着革職真人李雲嵱住坐欽此又該司禮監太監張欽傳奉聖㫖原舊真人李雲嵱着在顯靈宫總領道衆􅃹理一應齋醮准復原職封號誥命印信照舊與他欽此李躧住係追去度牒人數不合不行奏明就任前職正增亦因贜銀未完不合飾詞具奏奉聖㫖穆正增本當重治姑從寛免追贜發遣放了欽此又該刑科都給事中劉濟參題欲要照舊發遣奉聖㫖穆正增已有㫖發落了不必再來説欽此比有陳應循明知聶一然係犯罪還俗人數却乃朦朧奏保欽陞道錄司僉書右至靈兼住靜虚觀聶一然不合不行首明就任前職嘉靖十年十月内聶一然與馬福受不知以致互相攻訐聶一然不合妄引自首免罪律文仍乞簪冠隨衆焚修奏奉聖㫖禮部㸔了來説欽此欽遵行間李躧住不合隱匿真情詐稱老疾乞要休致正增不合詐稱原有度牒在宫焚修等情各先後奏抄到部送司散拘穆正增等前來審究前情明白猶恐不的隨行刑部四川清吏司道録司各查勘無異將正增等取具確的供詞案呈到部參照得穆正增等本先朝宿蠧盛世遺奸始以鑽刺榮身繼以賄賕脱罪雖聖恩寛大曲賜優容而稔惡怙終㒺知懲戒穆正增罪犯已經斷結猶復私自簪冠李雲嵱聶一然度牒俱各追銷却仍冒濫名器是皆朦朧陳乞豈天聴之能周依附營求信國法之難宥以致神醜其行天奪其魄互相許告自觸刑章雲嵱却又隱匿真情詐充老疾正增私藏度牒遮飾詭詞聶一然妄引自首之律冀遂免罪之私馬時明周一灝先因行止有虧斷令還俗却乃逋逃租税潛跡𤣥門所據各犯論律雖有殊科原情皆為故犯不惟有傷聖化抑亦自玷宗風合無通行參送法司查照先今過惡比照律例定擬罪名奏請定奪惟復特賜聖斷將各犯徑加嚴譴以杜奸萌南宫奏稿巻二
