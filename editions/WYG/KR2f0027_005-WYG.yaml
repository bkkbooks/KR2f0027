義遂欲於祝文皆欲去圜丘方澤字様恐將來愈致訛舛合無今後冬至大報啓蟄祈穀祀天夏至祭地祝詞之文俱合稱圜丘方澤其省牲及壹應公務有事壇所俱稱天壇地壇不得瀆稱圜丘方澤候命下之日本部行移各該衙門永為定制庶名正言順而人知所遵守矣緣奉欽依是圜丘方澤今後稱天壇地壇禮部知道事理未敢擅便謹題請㫖嘉靖十三年二月十八日具題二十日奉聖㫖是欽此一正體統以尊朝廷疏主客清吏司案呈奉本部送禮科抄出鴻臚寺卿王道中等題前事近該禮部題稱看得朝鮮國凡遇萬壽聖節冬至令節差人奉表進賀所有馬匹方物咨行本部照驗方與奏進正以見逺方下國不敢自達於天子其尊上之禮有宜然者所據該國原咨正係送投本部文字不當進呈發科今該國使臣擅將咨文混送鴻臚寺鴻臚寺亦混與封進不惟與咨文不合殊失等威事屬差錯合無請自聖裁候命下之日俟今次該國使臣事畢回還本部移咨國王省諭自後進貢使臣合遵照咨文内事理先從本部投進以俟驗收明白轉與奏進庶文移之式不紊而尊卑之體自嚴其鴻臚寺前項差錯係承襲舛謬其來已久合免追究仍行該寺一體遵行今後該國咨文再不許擅受代與奏聞庶幾事體釐正使逺人知朝廷之上禮法所在有不可毫髮僭差者矣等因題奉聖㫖是欽此欽遵臣等查得朝鮮國咨文舊例俱由本寺進呈御前發下該科抄行禮部其原來咨文仍繳送内府收照自洪武永樂年間至今一百七十餘年遵守無失左順門收本文簿可以查考况我朝凡遇外國番文雖片紙隻字必須直至御前祖宗立法防微慎始之意至深且逺臣等章句腐儒不能深知亦豈敢擅為更變伏望皇上勅下司禮監查吊左順門收本文簿其朝鮮國原咨禮部文書是否直至御前之文其今次夷使蘇洗讓等齎捧咨文合無仍照累朝舊規徑由本寺進呈御前惟復照依禮部近題事理施行伏乞聖裁緣係正體統以尊朝廷事理未敢擅便等因奉聖㫖禮部看了來説欽此欽遵抄出送司先該本部具題照得朝鮮國王李懌毎嵗恭遇萬壽聖節冬至令節敬差陪臣吏曹等曹叅判等官齎捧表文赴京慶賀查得該國慶賀所有表文方物例有咨文開稱行移本部照驗轉與奏進不知起自何年該國使臣徑將咨文混送鴻臚寺鴻臚寺亦混與封進内府發出該科然後抄行本部始與進收揆諸事體殊為乖錯相應改正等因案呈到部看得朝鮮國凡遇萬壽聖節冬至令節差官奉表進賀所有馬匹方物咨行本部照驗方與奏進正以見逺方下國不敢自達於天子其尊上之禮有宜然者所據該國咨文正係送投本部文字不當進呈發科今該國使臣擅將咨文混送鴻臚寺鴻臚寺混與封進不惟與咨文不合殊失等威事屬差錯合無請自聖裁候命下之日俟今次該國使臣事畢回還本部移咨國王省諭自後進貢使臣合遵照咨文内事理先從本部投進以俟驗收明白轉與奏進庶文移之式不紊而尊卑之體自嚴其鴻臚寺前項差錯係承襲舛謬其來已久合免追究本部仍行劄付該寺俾令一體遵奉今後該國咨文再不許擅受代與奏聞庶幾事體釐正使逺人知朝廷之上禮法所在有不可毫髮僭差者矣緣係正體統以尊朝廷事理臣等未敢擅便嘉靖十二年十一月十七日太子太保尚書兼翰林院學士夏言等具題本月十九日奉聖㫖是欽此已經備咨該國及劄付該寺改正遵守去後今該前因案呈到部看得朝鮮國行移本部咨文節該鴻臚寺混與封進原屬差錯已經本部題請改正奉有前項欽依事理既明體統已正足以尊朝廷而服外夷矣今鴻臚寺卿王道中等復奏前因執稱舊例并欲查左順門收本文簿為據不知舊例差謬先該本部奏論巳悉其左順門收本文簿不過記載出入文書數目原非國家典章所在豈足為據至稱外國番文雖片紙隻字必須直至御前為祖宗立法防微慎始之意尤為無謂且朝鮮雖是外夷素知禮義其書與中國同文况行移本部咨文止是開載貢物及咨請照驗聞奏詞甚明白既非番文之比事非私隠又無可防之迹本部據咨具題上聞事正言順不知王道中等所謂慎始防微於義何居况查得該國毎次進賀例有咨行該國文書邊官亦止是據其咨文轉與奏進原移咨文未嘗必由該寺封進未嘗必繳送内府收照又朝鮮與琉球兩國事體相同琉球毎次進貢所移咨文例投本部即如該寺所言則祖宗立法何獨防本部而不防邊官獨防朝鮮而不防琉球引彼證此其説愈為不通為照本部先前具奏祗因該國咨文明開右咨禮部及至禮部開拆字様原非直達御前文字一向承襲差謬相應釐正無非欲重體統以尊朝廷不知該寺何故必欲抗違明㫖沮格部議妄肆侵越瀆擾所據奏詞事理乖剌難以别議伏乞聖明特賜聴斷明示戒飭候命下之日仍行鴻臚寺查照前㫖欽遵施行緣係正體統以尊朝廷及奉欽依禮部看了來説事理未敢擅便謹題請㫖嘉靖十三年閏二月初五日具題本月初七日奉聖㫖照前㫖行欽此一遵舊制以便出入疏主客清吏司案呈奉本部送提督㑹同館主事張鏊呈據朝鮮國使臣蘇洗讓等呈前事竊照本國粗識禮義至誠事大朝廷待遇有同内服凡本國使臣到京自行出入不見防範迤至于今百有餘年敬謹彌篤别無違異近年以來始加拘禁鎖閉館門遇有稟奉公幹只許通事一二員刻期出入著令館夫帶牌管押有礙舊式查得成化六年二月間本國陪臣權堿等赴京時分禮部發到榜文該奉聖㫖㑹同館安歇一應朝貢四夷使客出入舊有禁例今後不許無故往來街市該衙門知道欽此本月十一日武都督等到㑹同館宣諭聖㫖因通行禁錯將朝鮮使臣并禁今後依舊出入即令撤去榜文又該𢎞治十三年五月間有㑹同館安歇女直早哈殺死一般夷人兵部奉聖㫖備由出榜曉諭朝貢夷人著令在館不許出入并本國一體防禁禮部據主事劉綱陳言奏本查得先該本部見行事例朝鮮素守禮義敬事朝廷比與他夷不同進貢人員自行出入原無防禁近該兵部等衙門㑹議禁約將前項事例一槩革去以致提督官員嚴加拘禁不得出入合無仍照前項舊例朝鮮人員令其自行貨賣深為便益奉聖㫖是欽此本國使臣出入自由無有防禁在嘉靖初年主客孫郎中無緣拘禁不許出入至嘉靖四年八月内有陪臣鄭允謙等前赴京師將前項節奉欽依事理告要照舊自行出入䝉部准告查照舊例許令自行出入已經本館移文知㑹去後有提督陳主事執已不遵迫束愈嚴久莫申省貽此因循逺人慕義之望殊用缺然所以區區陳瀆不能自黙者豈是意在買賣以圖復舊哉其拘閉與否亦非有他虧益秪以一視之仁罔有内外使之觀游無間光瞻禮儀考質文物薰炙遷化大有開益此實敦懐柔之至徳奬事大之盡誠俾我遐服永荷寵靈綿厯萬世與之匹休爾在先本國使臣人等入貢到京常飭下人務令循度猶恐或有非違十分畏謹即日禁制嚴此比前尤甚在館防閑有似囚縶非唯有違舊行之規恐非累朝優待之意伏乞照依舊例許自出入以示聖朝優容之典不勝幸甚為此合行具呈等因申呈到職照得防閑出入乃累朝待夷之舊規遵奉已久今據使臣申呈前因情詞懇切相應轉呈施行等因呈部送司查得朝鮮國使臣素守禮義節年慶賀到京本部查照舊例待遇以禮於國子監等處聴令謁拜於一應貨買聴其自便近年以來止因逺方夷使跟隨人役多生事端該管官員始行一槩約束加嚴而使臣稍有不堪今既呈稱前因相應申明等因案呈到部看得朝鮮國使臣頗閑禮義委與他處夷使不同朝廷自來待遇以禮出入禁防具有舊例所據蘇洗讓等具呈前事相應議處其呈稱欲行觀游無間光瞻禮儀考質文物薰炙遷化固見其仰慕上國之誠但逺人言服既殊易罹國禁亦須曲為之處合候命下毎五日一次許令該國正使及書狀官人等出館於附近市衢觀游本部仍劄付空閒通事一員陪侍出入以示禮待防衛之意其隨從人役仍行照前拘禁不許擅自出入庶幾不拂逺人之情不廢中國之法矣緣係夷情事理未敢擅便謹題請㫖嘉靖十三年閏二月初九日具題本月十一日奉聖㫖是欽此一崇祀先賢以昭聖化以慰民心疏祠祭清吏司案奉本部送禮科抄出浙江嚴州府知府盛應陽奏臣聞聖王揚一善而天下勸激一不善而天下懲激揚之典固人主風化天下之大機也恭惟陛下聰明睿智超越百王聖徳神功比隆五帝臨御以來舉明黜幽凡為臣民者或勸或懲皆幡然其向風矣又於萬幾之暇親與股肱元良斟酌祀典正先師之號新啓聖之祠崇徳報功所以風化天下者益有至矣當此盛時而一郡之中有一二先賢未曽奏聞朝廷賜載祀典是誠有司罪也有司責也臣雖愚叨守兹土茍有所見敢不以聞臣竊見嚴州境中有釣臺祠以祀漢之嚴光有思范亭以祀宋之范仲淹此二祠者皆由嚴民追思先賢一建祠於釣臺一建祠於山麓自昔奉祀到今為有司者亦遂因而祀之俱未嘗奏聞朝廷載諸祀典者也臣常從而考之嚴陵者漢光之故人也堅逃寵命養志山林披褐富春不貪禄位客星應象上感動于天文桐江一絲迺繫漢之九鼎其清風髙節不獨照古映今誠能起頑立懦故嚴民追而祀之自漢迄今千有餘年相承不絶今嚴州猶以嚴為名者此其追思一驗也范仲淹者宋之名臣也嘗自天章閣出守嚴州興學校而作士𩔖明禮義以淑人心恤民隠而撫摩有道糾吏姦而百廢俱興他日竟登相位為宋朝第一流人物其碩徳重望昭著當時厚澤深恩漸漬百姓故嚴民追而祀之自宋迄今五百有餘載中間屢經兵火而一亭巍然獨存此其遺愛之在人心不忍泯没之一驗也臣自守土以來上仰聖化下體民心春秋兩祀已仍其舊而不敢廢又常隨宜修葺祠宇以推聖朝崇徳報功之意以為一郡士民勸矣但恐崇祀之禮出於有司未經奏聞朝廷賜載祀典厯年既久典籍無徴萬一廢墜不舉為有司者不得無罪伏望聖明特勅禮部再加詳議將此二賢之祀開載祀典行令翰林院撰給祭文各一通再行本布政司照依祀典事例派令里甲備辦祭品毎嵗春秋就令本府正官致祭仍於均徭内編僉門子各二名專一看守祠宗掃除門户著為定例永逺遵守如此庶幾崇報之典不獨下慰一郡之心亦可振動天下之風化臣愚不勝幸甚等因奉聖㫖禮部知道欽此欽遵抄出送司案呈到部看得浙江嚴州府知府盛應陽奏稱嚴州境中有釣臺祠以祀嚴光有思范亭以祀范仲淹乞要將此二賢之祀列在祀典行翰林院撰祭文各一通令本府正官春秋致祭并僉門子各二名專一看守祠宇一節為照施法勤民祀典有常禮賢崇節盛世所尚夷考嚴光東漢之真隠范仲淹有宋之名臣一則以髙尚之志逃名於漁一則以公輔之才肇迹於守即其遺祠猶在則於流澤可徵考徳論世二賢之在嚴州委不可無祀今既該知府盛應陽具奏前因相應依擬合候命下之日本部行移翰林院撰給祭文各一道仍行浙江布政司轉行該府縣備辦祭品於毎年春秋仲月就遣本府正官致祭及僉門子各二名專一看䕶祠宇以供灑掃永為定例實足以昭國家尚賢之典而於風化不為無補矣緣奉欽依禮部知道事理未敢擅便謹題請㫖嘉靖十三年閏二月二十一日具題二十四日奉聖㫖只著有司自行祭祀欽此一祭祀疏祠祭清吏司案呈奉本部送禮科抄出户科給事中張選題臣聞國之大事惟祀孝子為能饗親語曰吾不與祭如不祭𫝊曰神不享非𩔖宗廟之祭不可不躬不敬不誠也明矣前者正月初九日孟春特享太廟時享世廟適陛下聖體違和暫遣勲臣代祭内外臣民皆知陛下出於不得已耳非誠敬之不至也今者四月初一日孟夏又當祫享太廟時享世廟小大臣工咸謂邇來聖躬萬福必親行禮無疑昨鴻臚寺為禮儀事請於二十八日陞殿奉聖㫖是今早乃遇免朝萬一復如故事仍遣勲臣代祭則陛下不得致其如在之誠而異姓之臣氣脈不通祖宗在天之靈恐不來享雖陛下孝本天性饗親之誠無時不在倘不躬行大事則迹涉怠玩懼無以風四方而示來世也即如聖躬平復之初未任趨蹡拜跪之勞亦當明詔禮官先期告廟以陳其不得已之故陛下亦須靜處齋宫以通神明之況以俟竣事不可直謂遣某姓某官代祭而已也臣待罪言官遭逢聖明在上事有當言義不容黙謹昧死上陳臣無任兢惕祈望之至等因奉聖㫖時享命官一時權暫皆非無故是否朕偷安忽祀禮部看了來説欽此欽遵抄出到部查得本月二十八日本部於内閣抄捧節奉聖諭朕連日未出視事咳疾之患猶未盡除孟夏時祫享祖考暫命武定侯勛代之朕仍須靜適一二旬遇神氣和平之日間出視事卿等即録示禮官以共悉朕意欽此欽遵通送到司案呈到部臣等看得户科給事中張選所奏反覆數百言其大要不過引孔子曰吾不與祭如不祭及𫝊曰神不享非𩔖兩言藉此以為執禮進諫之忠然實不自知其言之悖於理也臣等忝列禮官聞聖賢之言久矣使陛下動或違禮豈敢引君非道取譏公議顧以啓言官之喙乎臣等請得以明辯之夫代祭之禮其來尚矣周官大宗伯之職曰若王不與祭則攝位凡大祭祀王后不與則攝而薦豆籩徹記曰君子之祭也必身親涖之有故則使人可也蓋代之雖在乎人使之則出乎君正謂是矣此三代聖王之所已行載之禮經昭然可述殆非後世人主之所起也今陛下以聖躬未康遣官代事乃禮之正何謂不可至謂孔子曰吾不與祭如不祭是言聖人之心亦曰因有故不得與祭而使他人代之故雖祭若未祭然就聖人不已之誠言也非謂雖疾必欲親祭而不復可使人代也所謂神不享非𩔖者蓋指立異姓以涖宗祀之謂非指代祭言也如以為他人代祀遂為非𩔖而神不享則周公孔子所為皆非與夫語曰子之所慎齋戰疾是疾之所當慎無以異於祭孟子論禮有時而輕於食是身固有重於禮今陛下致慎於疾所重者身是有得於孔子孟子之意况陛下一身乃天地神人之主慎疾謹身是乃所以致孝於鬼神也顧可不量其輕重而必於躬親乃為禮乎且攝祭係循古禮何假告廟之文享祀既非躬親安取齋居之義是選之言實異於周禮孔孟之訓矣叅照給事中張選官以諫名學未聞道不以保君身體為念而獨以嵗事常禮為拘君父之情不通臣子之心安在推原措意不過邀名遂致謬迷堕於誹訕相應重治用警將來臣等再照前此祭祀遇聖躬違和臣等嘗具請遣官代攝至再至三陛下未即賜允間嘗因疾暫輟朝叅必䝉聖諭諄復警勵百工各務修職是陛下孝先重祀勵精圖治之心越出千古中外臣民共所聞見兹者臣等方恐陛下切於孝敬至或强疾為禮凡抱忠愛罔不同情豈有無故而憚於勤勞哉選可謂不亮聖主之心矣但昨來先奉聖諭未能遍播廷臣選罔有聞知輕率發議伏望皇上少霽天威曲垂開赦臣等不勝戰兢隕越之至緣節奉欽依看了來説事理謹題請㫖嘉靖十三年三月三十日題初一日奉聖㫖你部裏既看得明白罪人自無可釋之理如何末復回䕶他知道了欽此南宫奏稿巻五
