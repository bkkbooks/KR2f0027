body:
  text: 南宫奏稿巻五明夏言撰一科舉疏儀制清吏司案呈照得嘉靖十三年例該天下開科取士欲預行浙江等布政司及順天應天二府各照前科事例依期開科鄉試及查得嘉靖六年九月内該都察院署掌院事兵部左侍郎兼翰林院學士張璁題為慎科目以風厲人材事節該奉聖㫖各省鄉試係有司職務考官雖出欽命但近來教官多不得人補偏救弊似亦相應况先年亦曽舉行待開科之前數月各布政司呈禮部亦㑹舉京官或進士毎處二員具奏馳驛前去主考監臨官不許干預内簾職事禮部仍作急先行各該衙門及各提學官知道欽此已經通行欽遵外案呈到部臣等照得嘉靖十三年例該兩京及浙江等布政司鄉試之期合行照例依期鄉試但各省開科名為鄉試本係有司職務實古人鄉舉里選之遺意近以京官主試委屬一時補偏救弊之法可偶一行之若遂踵為常規似乂不能無弊况上科差出考官與巡按御史毎因爭較禮節競生嫌隙以致妨誤試事其試録文字間有艱深奇僻不堪為式有壊文體一切事宜俱有未便其正文體一節合無查照本部上年題准事例申明通行移咨都察院轉行各該巡按衙門及令各省考官務要明經取士為文必合程式毋得崇尚奇詭如有不遵俟試録進呈到部之日摘其文疵叅究照例追奪聘幣其監臨提調監試等官亦要與考試官同心戮力以共成賓興重典毋或異同僨事重傷大體所據今次各省鄉試合無仍照上年事例㑹舉京官主試惟復止令各布政司遵照祖宗舊制舉行伏乞聖明定奪緣係科舉事理未敢擅便謹題請㫖嘉靖十二年十月初六日具題本月初九日奉聖㫖考官只用敎職京官不必差正文體依擬欽此一薨逝疏祠祭清吏司案呈該本部題嘉靖十二年十月十一日早該司禮監太監張欽𫝊奉聖㫖朕第一子本年十月初十日夜丑時以疾薨逝禮部知道欽此欽遵𫝊奉到部該本部查照成化八年皇太子薨逝事例議得皇長子誕生甫及三月雖已詔告天下尚未冊立所據合行禮儀似宜從殺惟復悉照以上舊儀舉行等因題奉聖㫖是朕長子既未冊封况聖母在上舊儀不宜用便酌擬來看欽此查得𢎞治九年二月二十日蔚悼王薨逝該本部照依憲廟皇子并忻穆王薨逝事例具題節奉孝宗皇帝聖㫖是輟朝二日祭祀壇數并出殯下葬禮儀俱照成化二年皇子喪禮行欽此欽遵外今奉前因臣等謹將皇長子合行禮儀叅酌議擬比照蔚悼王事例施行伏乞聖明裁定緣節奉欽依便酌擬來看事理未敢擅便謹題請㫖計開一嘉靖十二年十月十三日起至十四日止輟朝二日不鳴鐘鼓上位御奉天門淺淡服色視事文武百官青衣烏角帶朝叅一十月十三日文武百官具青衣烏角帶詣奉天門行奉慰禮一聞喪御祭一壇昭聖康惠慈壽皇太后御祭一壇章聖慈仁皇太后御祭一壇莊肅皇后祭一壇中宫祭一壇俱素羞遣内官行禮一朝夕設素饌于柩前一出殯設酒果素饌祭告遣内官行禮一發引御祭一壇昭聖康惠慈壽皇太后祭一壇章聖慈仁皇太后祭一壇莊肅皇后祭一壇中宫祭一壇俱素羞遣内官行禮一下葬御祭一壇俱素羞遣内官行禮一翰林院擬奏封號并撰祭文壙誌文一光禄寺備辦祭物一欽天監差官擇地并選出殯等項日期一工部差官一員料造墳塋享堂房屋等項一錦衣衛撥官旗校擺路一本部行令敎坊司撥樂人三百員名送至墳所一擡棺槨并執葬儀㝠器及拽方相等項合用旗軍一千六百名於五軍神機等營摘撥一破土并掩土祠后土祭祀二壇一百日周年二周年毎次御祭一壇憲廟皇妃祭一壇昭聖康惠慈壽皇太后祭一壇章聖慈仁皇太后祭一壇莊肅皇后祭一壇武廟皇妃祭一壇中宫祭一壇公主共祭一壇俱素羞遣内官行禮嘉靖十二年十月十一日具題本日奉聖㫖依擬封號應否再議來説欽此一薨逝疏祠祭清吏司案呈節該本部題稱皇長子誕生甫及三月雖巳詔告天下尚未冊立所據合行禮儀似宜從殺惟復悉照以上舊儀舉行題奉聖㫖是朕長子既未冊封况聖母在上舊儀不宜用便酌擬來看欽此隨該本部將皇長子合行禮儀合比照蔚悼王事例施行等因題奉聖㫖依擬封號應否再議來説欽此欽遵臣等查得𢎞治十一年九月十七日欽奉孝宗皇帝聖㫖皇女於𢎞治十一年九月十六日亥時薨逝賜號太康公主欽此又查得蔚悼王亦係皇子薨後賜以封號今皇長子生前雖未冊立然以詔告天下覃恩萬方陛下亦已錫名但未面命稽之國典宜有封號俾天下後世永有稱聞合候命下本部行移翰林院撰擬相應封號上請定奪緣節奉欽依封號應否再議來説事理未敢擅便謹題請㫖嘉靖十二年十月十二日具題本日奉聖㫖依擬行欽此嘉靖十二年十月十二日該太監戴永𫝊奉聖㫖皇長子生母麗嬪添祭二壇徳嬪等祭一壇禮部知道欽此通行各衙門欽遵外本日又奉聖㫖薨於十月十一日丑時都著改正欽此通行改正一親王至鎮欲要赴闕疏儀制清吏司案呈奉本部送禮科抄出欽差巡撫宣府等處地方都察院左僉都御史韓邦奇太監楊成總兵官劉淵題嘉靖十二年十月十一日午時有代府承奉吳聰齎王令帖到臣内開為叛逆軍人兇惡逼迫私出禁城親詣赴闕事嘉靖十二年十月初六日晚三更時分本爵在宫聞知城中放礮納喊差人門首打聴言説軍士燒毁總兵官都察院門及至天明將總兵官李瑾殺死將總兵官及都察院衣服等件盡行搶去又將各店房客貨亦行搶去有經過府門者言説要本爵與他做王於初七日申時分將各處脩邊按伏軍馬調入城中本爵慌懼引領承奉吳聰䙝衣小帽就混入於衆人之中從北門而出前至金谷莊潛伏一更時分將管莊人王宣帶領跟隨前至四家莊將管莊人宋景春亦隨前來至順聖川西城劉叅將容暫一宿初九日起身有總旗張文錦楊達因在東井村催糧亦隨前來等因到臣至本日未時臣謹迎王入至鎮城臣慰安及整備一切供用外看得大同軍變王因出至臣等鎮城實不得巳但要親詣赴闕未奉明㫖臣等啓王留住鎮城聴候明㫖以為進止等因奉聖㫖王只在本鎮暫住不必赴京禮部便差官安慰欽此欽遵抄出送司案呈到部臣等竊惟大同叛軍不靖數年之間兩行稱亂先次代懿王畏其迫脅潛至宣府地方後朝廷鑒其忠誠特遣光禄寺少卿蕭淮齎勅褒諭今次代王充燿因禍變方萌復能引避杜絶嫌微即其歸闕之誠固可嘉尚而遁身迫切之情尤宜矜體今該巡撫宣府都御史等官具奏前來奉有欽依免其來京差官安慰誠於事體穏便其差官安慰應降璽書勅文合候命下行移翰林院撰擬仍乞諭令宣府地方撫按等官即今代王暫住本鎮其廨宇供張務宜致敬盡禮仰體皇上軫愛宗親至意候逆徒授首地方寧輯之日另行具奏以聴朝廷處分所據領勅安慰官員合照前次事例於卿寺衙門差遣堂上官一員以示優重臣等擅難定擬伏乞聖裁緣係親王至鎮欲要赴闕及節奉欽依禮部便差官安慰事理謹題請㫖嘉靖十二年十月十六日題十九日奉聖㫖寫書與王差行人去欽此一禮儀疏祠祭清吏司案呈近該皇長子薨逝本部將合行禮儀於本年十月十一日具題節奉聖㫖依擬欽此欽遵除備咨工部差官料造墳塋享殿房屋等項去後臣等竊惟既有享殿必須安設神主于内以便嵗時祭祀合候命下本部行移内府該衙門預行如式製造仍乞欽定遣官一員臨期題主安奉未敢擅便謹題請㫖嘉靖十二年十月二十六日具題二十八日奉聖㫖是遣禮部尚書夏言題主奉安行禮欽此一欽奉聖諭疏祠祭清吏司案呈嘉靖十二年十一月二十四日欽奉聖諭今月二十七日冬至大祀天于圜丘自今日為始嚴齋三日朕偶微恙必目下可不敢自肆凡爾與事諸臣各勿生怠慢益加祗畏以匡祀事卿言便行示告知之欽此欽遵齎捧到部臣等竊惟郊祀之期近在旦夕雖天佑聖躬計必茂綏多福然病謹小愈未宜遽厯煩勞况今天氣寒沍至日必甚陛下敬天之心必欲力疾承祀即使精誠融液自足忘勞而逺履郊坰衝冒凜烈誠宜保䕶臣等之心實有未安臣等聞孔子曰吾不與祭如不祭則是聖人固有有故不得與祭之時所謂如不祭者指聖人之心歉然以雖祭如未祭也是即陛下今日雖疾猶必欲躬祭同一心也臣等議得疾者聖人所不能免而禮則貴於有權權而得中雖聖人不可易也况至日大報乃陛下克遵先王定典與前代謬禮可以改卜者不同祭可必於是日而行疾豈可必於是日而愈聖人制禮必使可𫝊於後世為法於將來况向來欽定儀注亦有遣官代攝之文臣等敢請陛下以聖躬為天地神人之主不可不重為天地神人加愛今次大祀伏乞聖慈俯從内閣輔臣及臣言連日再三祈請特賜俞允遣官代行即皇天聖祖昭赫在上必能深鑒陛下萬萬不獲巳之誠臣等下情不勝幸甚不勝惓惓緣係欽奉聖諭事理未敢擅便謹題請㫖嘉靖十二年十一月二十四日具題二十六日奉聖㫖朕自不慎以致疾侵大祀不獲與實為不敬但今不能强起比昨較重已有遣代之命覽奏具見愛朕至意欽此一懇乞天恩憐念宗室緣坐已殁延及妻子久禁髙牆等疏儀制清吏司案呈奉本部送准刑部咨該本部題河南清吏司案呈准禮部咨該欽差鳳陽奉侍皇陵兼管皇城及收掌安插庶人内官監太監王徳題伏覩髙牆幽禁得罪庶人皇上憫念潢流一派不過使其改過遷善以去其暴殘之性而已矣於嘉靖三年欽䝉聖恩勅臣守備鳳陽等處地方臣於本年十一月將幽禁髙牆庶人等情具題外臣仰思皇上以孝治天下徳佈萬方覃施溥博之恩未有不及於親親者也臣查得中髙牆緣坐庶人聰灍於正徳十二年二月内押送前來安插彼於嘉靖十一年三月内病故遺下妾子張氏等七名口及東髙牆仕於嘉靖三年七月内押送前來彼於嘉靖四年閏十二月内病故遺下妻子王氏等五名口各該妻子在牆日夜號泣恒思故里臣雖木石亦皆痛心而緣坐已故宗室聰灍仕又非十惡之流殘於囹圄之内妻子尚然幽禁實可哀矜再照中髙牆庶人宸澐原來妻王氏於嘉靖四年正月内病故止遺老母在牆見今病卧著牀不能動履毎遇開門供給攙扶哀告欲自備銀兩買一使女侍奉伊母衰年緣係宗室豈敢擅専伏望皇上憫其母子獨居顛連之苦行令有司給與使女一人俾其侍奉伊母以供炊爨之勞誠聖明推恩宗室之重等因奉聖㫖該部看了來説欽此欽遵抄出送司該禮部看得太監王徳題稱庶人聰灍等犯罪輕重緣由原係法司掌行本部無憑查處合候命下移咨刑部查照原行上請定奪等因題奉聖㫖是欽此欽遵咨部送司案呈到部除將聰灍仕等犯罪緣由本部已經查覆外其奏内宸澐妻死母病乞給使女侍奉於罪無干仍咨禮部徑自查覆等因咨部送司案查先該太監王徳題稱前因已該本部題奉欽依移咨該部查覆去後今該前因案呈到部看得太監王徳題稱髙牆庶人宸澐妻王氏病故遺下老母不能動履乞要行令有司給與使女一人侍奉一節為照髙牆庶人給與使女本部查無事例但宸澐妻死母病一母一子更無一力以代炊爨之勞委的情有可憫所據欲要給與使女一人侍奉伊母相應俯從所請合無候命下𩔖行直𨽻鳳陽府轉行太監王徳㑹同司府官員行令本境地方軍民之家願賣為婢者官給價銀收買一人給與應用庶母子得以保全生命而天恩浩蕩雖囹圄之中亦無不被矣緣係懇乞天恩憐念宗室緣坐已殁延及妻子久禁髙牆事理未敢擅便謹題請㫖嘉靖十二年十二月十六日具題十八日奉聖㫖是欽此一大封冊文疏儀制清吏司案呈奉本部送禮科抄出太子太保本部尚書兼翰林院學士夏言題嘉靖十二年十二月十六日欽遇皇上恭循太祖高皇帝之制臨御紫宸大封同姓甚盛典也除一應冊封禮儀俱經本部題請外是日冊節到部該臣等分給付各使者持捧以行臣言謹將冊寶逐一檢閲看得封徳世子金冊内有恪憞忠孝之文臣竊詳文義憞字同憝字夫憝訓怨訓惡若用此字義屬不通考之文理宜用敦崇之敦為是夫大封同姓朝廷之重典也冊書之文皇上之聖訓也受冊于朝藩國之世寶也若今字書舛訛文理背繆恐非所以重典則而昭文明也伏乞聖明特賜稽查執事者之誤倘䝉改鐫則令該府使臣暫停一二日以俟仍乞勅今後凡冊文鐫畢俱復送内閣官看詳後發則庶幾無失矣伏乞聖裁定奪等因奉聖㫖是憞字著查照内閣批紅掲帖改正書寫差訛的還查叅來説禮部知道欽此欽遵抄出送司除將徳世子冊文内差寫憞字查照内閣批紅掲帖原係敦字行准中書舎人手本開送原寫中書舎人戴倫到司案呈到部叅照中書舎人戴倫典司翰墨叨侍絲綸自宜研究書畫詳考偏傍精一乃心庶為盡職况錫命之文勒之金冊比於常例加重而又有内閣批紅掲帖可以遵據却乃惇憞不辯亥豕成訛萬一布之宗藩豈不有妨聖訓事屬不恪法所當懲合候命下移咨法司徑自行提從重叅詳問擬應得罪名奏請發落庶垂鑒戒而執事之臣知所警矣其冊文訛字除欽遵已行内府銀作局取匠改正旦日給付使者發行外緣係大封冊文及奉欽依是憞字著查照内閣批紅掲帖改正書寫差訛的還查叅來説禮部知道事理未敢擅便謹題請㫖嘉靖十二年十二月十七日具題二十日奉聖㫖戴倫法司提了問欽此一𩔖奏災異疏祠祭清吏司案呈奉本部送内府并禮科抄出嘉靖十二年正月二十九日該巡按直𨽻監察御史李朝綱等題稱懐來隆慶右衛正月十一日地震如雷本年二月十五日該提督撫治鄖陽右僉都御史胡東皋等題稱湖廣鄖縣河南浙川縣嘉靖十一年十二月二十六日雷鳴衛輝府正月初一日星隕如斗聲若雷鳴本年三月初一日該巡按江西監察御史李循義等題稱南昌府九江府嘉靖十一年十二月二十七等日雷鳴本年三月初二日該巡按貴州監察御史周襗等題稱銅仁府嘉靖十一年十一月二十三日雷鳴電掣本年三月十四日該巡撫山東右僉都御史袁宗儒等題稱青州府正月十八日地震聲吼如雷本年四月十九日該巡按山東監察御史方逺宜等題稱平山衛軍餘范寶家二月三十日黄㹀牛生犢頭額豐滿牙齒巉巖前二膝至足并尾俱成鱗甲甲内有毛渾身有紋落地而死本年四月二十日該巡按貴州監察御史周襗等題稱安南衛二月初四日軍人李華妻劉氏生男一身兩頭四手四足良久身死本年五月初二日該鎮守遼東太監王純等題稱長勇堡四月十八日軍餘田伏家火起燒燬官軍房屋軍器數多燒死男女四名口本年五月初三日該巡按雲南監察御史楊東等題稱尋甸軍民府六涼衛正月十九日地震倒塌城牆房屋本年五月初四日該巡撫甘肅右僉都御史趙載等題稱肅州衛三月初八日星落有聲本年五月二十五日該鎮守遼東太監王純等題稱海州衛四月二十四日天雷震死公差人張景和本年五月二十九日該巡按山西監察御史王獻等題稱祁縣五月初五日天鼓如雷火光落地本年六月十五日該鎮守雲南總兵官黔國公沐紹勛等題稱雲南府四月十四日地震本年六月十七日該巡撫寧夏右副都御史楊志學等題稱寧夏等衛四月二十等日地震本年九月初九日該巡撫陜西右副都御史王堯封等題稱隆徳縣六月二十五日地震如雷本年十一月初四日該巡撫遼東右副都御史王潮等題稱廣寧衛十月初七日夜四方星亂飛落本年十一月三十日該巡按福建監察御史方涯等題稱福州府九月十七日地震本年十二月初七日該巡撫寧夏右副都御史楊志學等題稱寧夏衛十月二十一日地震等因俱奉聖㫖該部知道該衙門知道欽此欽遵通抄送司俱經案候外今該前因案呈到部臣等竊惟上天聰明茍無其故變不虚生詩曰畏天之威于時保之言宜恐懼修省則變災為福也陛下敬徳祈天修道凝命其於弭災之道蓋無所不至矣比來雷鳴星隕物異人妖四方奏報殆無虚月𫝊曰天心仁愛人君則數出災異以譴告之伏望皇上體上天仁愛之心勅下羣工同加修省尤望聖明攬威福之權辯忠邪之分開衆正之路杜羣枉之門此實自古為治之常經今日弭災之要道也宗社幸甚蒼生幸甚緣奉欽依該部知道該衙門知道事理未敢擅便謹題請㫖嘉靖十二年十二月十八日具題十九日奉聖㫖知道了欽此一𩔖奏災異疏祠祭清吏司案嘉靖十二年十二月十七日該本部題奉聖㫖知道了欽此巻查嘉靖元年該本部題前事奉聖㫖卿等説的是上天示戒近日京師地震各處地方災異疊見朕心驚惕與爾文武羣臣同加修省以回天意便擇日齋戒遣官祭告天地宗廟社稷山川欽此嘉靖二年該本部題奉聖㫖是上天示戒各處地方災異疊見朕心驚惕事闗朕躬的自有處置内外羣臣宜同加修省以回天意欽此嘉靖三年該本部題奉聖㫖是上天示戒災異頻仍事闗朕躬者自當警懼還行與内外大小臣工著同加修省以回天意欽此嘉靖四年該本部題奉聖㫖是四方災變非常朕心朝夕憂懼事闗治體的自當留意舉行還行與内外大小臣工著同加修省以回天意不得虚應故事欽此嘉靖六年該本部題奉聖㫖上天垂示四方災變頻仍朕覽巳中心恐懼况日前地震京師今冬季將終雪猶未降氣不凝寒推思咎本實在朕躬尚賴卿等中外大小羣工協心匡佐各加勉修乃職思其弭災召和之方為朕言之務期上回天意以消變異副朕至望勿或怠忽其被災地方官員也行文與他著改悟修省務求實效該衙門知道欽此嘉靖七年該本部題奉聖㫖卿等所言忠愛誠懇朕已知悉災異迭見朕心驚惕當與爾文武諸司官員痛加修省務修實徳以回天意勿得徒事彌文凡一切應舉釐革事宜俱要各陳所見以備采擇施行賑恤災傷已有㫖了欽此嘉靖八年該本部題奉聖㫖卿等説的是這各該地方災異委的重大君臣上下所宜一體修省事闗朕躬的知道了内外大小臣工亦宜體國奉公痛加懲艾以盡消弭之道欽此俱經本部通行内外大小衙門一體欽遵修省外今該前因案呈到部竊惟𩔖奏災異雖係累朝舊規然實聖明克謹天戒至意是以節年以來凡本部具奏前事俱奉諄復之㫖申飭内外同加修省非徒循故事飾虚文而已昨該本部𩔖奏仰奉前㫖其於聖徳謙冲似䝉采聴而於内外臣工則似無所施行雖臣等仰知聖明在上應天之實不必以言然大小羣工誰能遍諭將謂陛下以災異為諱以修省為虚恐非所以謹天戒明常憲而昭示天下者也臣等待罪禮官職司聞奏四方災異既有所見不敢不言伏望聖明留神鑒納特播天語嚴飭内外大小臣工今後務宜仰體天心不負君徳惟公惟正去欺去私毋淫朋比毋作好惡以贊成皇上正大光明之治則天意格而人心安矣天下幸甚緣奉欽依知道了事理未敢擅便謹題請㫖嘉靖十二年十二月二十日具題二十二日奉聖㫖覽此奏前批委忽略了天垂眷愛災異羣方本自朕召敢不省懼但内外大小百工均宜各加改悟以弭變沴勿得視為故事便通行文示悉欽此一欽奉勅諭疏儀制清吏司案呈嘉靖十三年正月初八日早欽奉皇帝勅諭禮部朕承天眷嗣祖丕圖坤宫不可無繼主母不可缺人相祀宗祧承歡慈極昨已聞于聖母以徳嬪方氏性資端慎名冠九良允副朕懐未嘗少怠宜立為皇后嬉嬪沈氏稟資淑敏朕所特嘉宜進封為宸妃麗嬪閆氏曽協熊夢宜有加恩兹進封為麗妃便擇日具儀來聞故諭欽此欽遵今將合行禮儀并欽天監擇到大吉日時及頒詔日期開坐謹題請㫖計開一欽天監擇到嘉靖十三年正月十五日午時吉行冊立冊封禮一先期遣官前一日早奏告天地于南北郊告祖考于太廟世廟及社稷並行翰林院撰文一前一日鴻臚寺設節冊寶案于奉天殿内節案居中冊東寶西設節冊寶綵輿于丹墀内教坊司設中和韶樂及大樂是日早錦衣衛設鹵簿駕内官設皇后受冊位于坤寧宫設節冊寶案于受冊位之北設香案于節案前設内贊二人引禮二人設内樂于丹陛上又設宸妃麗妃受冊位于各宫中設節冊案于受冊位之北節案居左冊案居右設香案于節冊案前設内贊各二人引禮各二人至期上御華蓋殿具皮弁服鴻臚寺官奏執事官行禮畢奏請陞殿導駕官導上陞座文武百官具朝服入班行叩頭禮左右侍班正副使入就拜位贊四拜興奏𫝊制俯伏興執事官舉節冊寶案由殿左門出用黄傘遮送至丹墀内置綵輿中𫝊制官由左門出稱有制贊正副使跪制曰嘉靖十三年正月十五日冊徳嬪方氏為皇后嬉嬪沈氏為宸妃麗嬪閆氏為麗妃命卿等持節捧冊寶行禮贊俯伏興四拜禮畢執事舉節冊寶輿由奉天門左門出鴻臚寺官奏禮畢上興大樂迎綵輿至右順門外正副使朝北立内官舉皇后節冊寶輿由正門入内樂迎至皇后宫門外節冊寶未至之前引禮請皇后具禮服候節冊寶將至宫人執扇擁䕶及擎執在後行禮導引皇后出迎于宫門外節冊寶至内官捧由正門入皇后随至拜位内官以節冊寶各置于案内贊贊四拜贊宣冊贊跪宣冊女官取冊立宣于皇后之左訖贊搢圭贊受冊宣冊女官以冊跪授于皇后皇后受訖以冊授女官女官跪受于皇后之右立于西贊宣寶宣寶女官取寶立宣于皇后之左訖贊受寶宣寶女官以寶跪授于皇后皇后受訖以寶授女官女官跪受于皇后之右立于西贊出圭贊興内贊贊四拜禮畢内官持節由正門出皇后送至宫門外又内官舉宸妃麗妃節冊輿各由正門入迎至各宫中節冊未至之前引禮請宸妃麗妃具禮服候節冊將至宫人執扇擁䕶及擎執在後引禮導引宸妃麗妃出迎于宫門外節冊至由正門入宸妃麗妃隨至拜位内官以節冊各置于案内贊贊四拜贊宣冊贊跪宣冊女官取冊立宣于宸妃麗妃之左訖贊受冊贊搢圭宣冊女官以冊授宸妃麗妃宸妃麗妃各受訖各以冊授女官女官跪受于宸妃麗妃之右立于西贊受冊禮訖贊出圭贊興贊四拜禮畢内官持節由正門出宸妃麗妃各送至宫門外内官各齎節出至右順門外以節授正副使報禮畢正副使得報各持節復命一謁告内殿是日皇后受冊畢内官先具謁告儀物翰林院具撰謁告文上具冕服皇后宸妃麗妃各具禮服上率皇后二妃詣奉先殿奉慈殿崇先殿行謁告禮俱如常儀一謁見三宫冊立之次日上具冕服皇后宸妃麗妃各具禮服上率皇后二妃詣昭聖康惠慈壽皇太后前章聖慈仁皇太后前俱行八拜禮莊肅皇后前行四拜禮畢皇后宸妃麗妃于内殿俟上易皮弁服陞座贊引女官引皇后二妃詣上前各就拜位皇后位中妃位左右稍後行八拜謝恩禮畢還宫一皇后受賀儀是日皇后受冊畢内官即于宫中設皇后座南向設儀仗設内樂設内贊二人引禮二人俟皇后謝恩禮畢還宫請皇后服燕居冠帶陞座引禮引二妃詣皇后前贊八拜禮次引在内親屬詣前贊八拜禮次引六尚等女官入班贊八拜禮次各監局内官内使行八拜禮畢還宫一欽天監擇到本月十八日夘時吉頒詔是日上具皮弁服御奉天殿頒詔布告中外行禮如常儀一表賀頒詔之次日文武百官具朝服上表慶賀陳設如常儀是日早上具冕服御華蓋殿執事官行五拜叩頭禮畢鴻臚寺奏請陞殿導駕官導上陞座進表行禮如儀一是日命婦行慶賀禮前期一日女官陳