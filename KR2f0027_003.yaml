body:
  text: 南宫奏稿卷三明夏言撰一為重陵寢以培國脈請聖斷以息羣議疏近該光祿寺厨役王福錦衣衛千戶陳升建言欲要遷改顯陵迎請恭睿淵仁寬穆純聖獻皇帝梓宫入葬天夀山以全大孝一節即與先年革職錦衣衛百户隨全罷間光祿寺録事錢子勳之説相同近又該緣事監生詹啓口山溫州府武舉生杜承美為民兵馬周密湖廣生貟蕭時用致仕僉事寧河相踵具奏即與王福陳升所言如一雖其心之出於公私誠偽固不可知然據其議論皆自謂效忠以贊成聖孝之意已經本部會議題覆至再至三始終未敢輒議奉行者尚書席書固已備論於前今大學士李時又嘗極論於後矣先年工部尚書趙璜嘗有言曰體魄不可輕犯靈秀不可輕泄根本不可輕動其説良是至如引本朝故事太祖不曾遷皇陵太宗不曾遷孝陵此論亦正是皆合文武大臣多官之見要不出此豈忠君愛上之心謀國料事之智乃盡不若隨全錢子勳王福陳升蕭時用輩哉識者當知其不然也臣竊惟遷陵之議意者本出於聖母萬年之情陛下終天之慕凡在臣子豈昧將順所以卒不敢輕議者非謂才識謭薄不能奉行畏難茍安有所欺而不肯也亦非有義理難明之事考求不得有所詭而不可也亦非敢沮抑人言推避國事顧一已利害有所憚而不為也惟是竊念先皇帝衣冠之藏厯歲已久顯陵之役建造經年規制已備恭覩陛下光臨大寶十年於兹百祿駢臻即已然之福而徴諸地理芘蔭之説似乎神靈已安比者屢頒聖製封其山為純德名其府為承天表章丕顯似乎事體已定而一旦議遷老成長慮者多為駭愕蓋以關係國家禍福有動而不可悔之憂首事倡和之人將來有不容誅之罪故也但近日言者假當時安厝梓宫土壤非吉為詞自不能不感動陛下之哀衷上厪聖母之至慮所以節奉欽依重令本部會官從長集議昨該尚書汪鋐具奏又奉旨一併會官詳議了來説欽此臣仰奉嚴旨不勝悚懼夙夜思維祗見事大體重非臣下所能任其咎者又況遷葬之舉治棺制服事同初喪萬一欲改祔梓宫重易衾斂禮必躬親又非臣下所能代攝者是皆不可不預思也議者至謂陛下震位久虛以為咎在顯陵固未必然又謂陛下龍飛江漢以為福緣顯陵亦未必然蓋上天篤生聖人為中興太平之主必能生聖嗣以開萬世之傳非地靈鬼福所能握其機者乃若先皇帝玄宫久閟體魄久安譬如木之根本培植已固而一旦動搖則似非所以求枝葉繁茂之道是則不可不尤加慎重者也故今日之事誠在聖明留神加察淵謀獨斷上同聖母早夜籌慮有以自致其決耳慎勿輕為羣議之所搖惑況近世精通地理之術實鮮其人至於士夫涉獵講論尤多誕謾每見人家惑於風水之説將先世丘壟無故改遷往往自速新凶坐消已福蓋異人罕得道眼難逢地理家書亦有天相神司之説所以可遇而不可求可信而不可盡信者也昔宋儒朱熹嘗論夀皇葬地非吉疏請遷改然猶有取於孫逢吉之言少寬日月别求吉兆為上十字以為至論當時熹明知夀皇所葬不吉以為當改然亦必須從容慎擇如此況今日未有所擇之地知其最吉為必可葬又未知顯陵果非吉地為必當遷而建議之人徒爾紛紛未達事體即使重復會官集議凡有忠愛之實心者恐亦不能復為他説也臣待罪禮官敢不恭承明命廣集衆思但事體重大輒難議擬如蒙聖明采擇臣愚伏乞英斷特罷會議亟賜停寢實為宗社無疆之慶仍乞重降嚴旨禁絶細人自今無得妄議園陵重事傷國大體天下幸甚萬世幸甚嘉靖十年十月初二日進初四日奉聖旨卿所言説的是朕已奉聖母慈訓謂陵寢根本重地不可輕動這各該奏擾人役本都當拏問重治且不究再來奏擾決不輕宥欽此一參酌古今慎處廟制乞賜明斷疏該右春坊右中允廖道南奏臣伏考洪武元年二月朔我太祖高皇帝勑諸儒臣曰自昔聖帝明王之有天下莫嚴於祭祀故當有事內必致其誠敬外必備其儀文所以交神明也朕誕膺天命統一海宇首建郊廟以崇祀事顧草創之初典禮未備其何以交神明致靈貺其各具沿革以進於是輔臣李善長傅瓛等學士陶安等上議曰商書七世之廟可以觀德則知天子七廟自古有之不獨周制為然若太祖百世不遷三昭三穆以世相次此萬世不易之禮也今擬四代各為一廟德祖玄皇帝居中懿祖恆皇帝居東第一廟熙祖裕皇帝居西第一廟仁祖淳皇帝居東第二廟以四時及歲除凡五享惟孟春特祭於高祖廟孟夏孟秋孟冬則各祭於列廟臣惟我聖祖之制斟酌三代垂憲萬世載在國史編諸集禮聖子神孫所當世守以為祈天永命之鴻圖者恭遇我皇上中興大化光紹丕烈遵復四郊以祀天地日月釐正百禮以祭神祗帝王情文胥協顯微攸通無以復加矣而獨於宗廟之制屢形於御札宣於召問有不能以自安焉者誠有以見聖人之大孝天子之大禮有聖人在天子之位如之何其弗可行也朱熹曰天下有二件極大事一是天地合祭一是太祖不特立廟與諸祖同一廟千五六百年無人整理又曰漢承秦弊不能深考古制自是以來更厯魏晉下及隋唐其間非無奉先思孝之君據經守禮之臣而皆不能有所裁正至使太祖之位下同子孫且更僻處於一隅既無以見其為七廟之尊羣廟之神則又上厭祖考而不得為一廟之主以人情論生居九重窮極壯麗而沒祭一室不過尋丈甚或無地以容鼎俎孝子順孫之心宜有所不安矣夫熹之進講此論於經筵在宋偏安之時而況我皇朝輿圖一統我太祖高皇帝崇勳峻業遠邁百王豐澤洪仁光被九域夫有萬世不朽之功者宜享萬世不遷之報而乃今不獲專享特廟以全南面之尊端居宗祧以統列廟之主尊卑長幼並列於一堂而籩豆鼎俎分羅於一隅信有如朱熹之所云者此我皇上至仁大孝之思所以時發由衷而不能以自安焉者也今之議以為弗可行者其説有四一曰地勢窄隘二曰禮節繁難三曰成憲宜遵四曰勞費當惜臣請解其惑焉夫以地勢窄隘為言者臣按周禮匠人營國左祖右社廟門容大扄七箇闈門容小扄三箇鄭玄注云闈門廟中之門大扄牛鼎長三尺小扄膷鼎長二尺以周尺較之周之九廟之制亦甚儉矣臣愚前奏禘義篇云請以今太祖為我太祖萬世不遷之廟太宗以下各建特廟於今兩廡之地制度不必其崇高而務質朴之為貴儀文不必其繁縟而務簡素之為貴有都宫以統廟而不必各為門垣有夾室以藏主而不必更為寢殿法古之意而不失其義酌今之宜而咸得其當庶尊尊有主而太祖之位恆安而不遷親親有倫而列聖之尊各全而無瀆矣夫以禮節繁難為言者臣按周禮外宗掌宗廟之祭祀王后不與則贊宗伯鄭玄注云后有故不與祭宗伯攝其事故王一獻卿大夫以次代獻古禮也陳祥道亦云君子以義處禮則祭不至於數煩以仁處禮則祭不至於疏怠是故禮雖先王未之有亦可以義起也而況古禮有諸乎今若各建列廟特享之時我皇上躬行禮於太祖之廟其餘遣親臣代獻如古諸侯助祭之禮亦未為不可而何必拘泥丘濬十八日行禮之臆説哉夫以成憲宜遵為言者臣按中庸曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也陳注云祖父有欲為之志而未為子孫善繼其志而成就之祖父有已為之事而可法子孫善因其法而遵述之故武王周公稱為達孝而況我皇上善繼太祖之志善述太祖之事以覲耿光以揚大烈正所以遵我太祖之成憲也夫以勞費當惜為言者臣按禮曰君子將營宫室宗廟為先居室為後孟子亦曰君子不以天下儉其親而況今日之尺地寸土皆我祖宗創業垂統之所貽百官萬民皆我祖宗休養生息之所致以祖宗之土地而建祖宗之廟以祖宗之臣民而供祖宗之事如之何其弗可行也臣愚於嘉靖九年二月內陳言郊祀有及宗廟之制仰蒙御札詢及輔臣彼皆不以為然臣覆奏云郊廟一體天人一道未有郊祀宜急而廟祀宜緩者又蒙明命下禮官議已而宸衷獨斷親定圖式舉孟春特享之祭正太祖南面之位各為帷幄以權九廟之制甚盛典也而又肇舉大禘大祫以伸仁孝之思以盡誠敬之極禮曰尊祖故敬宗敬宗故親親我皇上尊尊親親之道其克盡矣臣愚前奏又云各居一幄者一時之權也而各一廟者萬世之經也伏望聖明采於芻蕘不棄葑菲遠法商周之彛典光復聖祖之舊制則億萬世太平之基端在是矣臣於邇者恭覩泰神殿成我皇上恭詣奉安皇天皇祖及諸神位行禮甫畢天應瑞雪及長至之夕我皇上躬行大報禮於圜丘是夕天宇澄霽景緯輝朗兹蓋至誠昭格休徴應響之嘉祥也臣謹撰泰神殿禮成感雪賦一篇圜丘載祀慶成詩九章并録上御札寵及臣名者三條及臣原奏三通裝成二册隨本進呈仰冀宸慈俯垂省覽臣無任戰栗之至等因奉聖旨這所進詩賦奏疏送史館採録宗廟祀典儀制朕嘗有諭輔部大臣禮部便會官議了來説欽此又於禮科抄出禮部尚書兼翰林院學士夏言題為會議宗廟事臣頃者伏蒙皇上於重華殿東室召見大學士李時翟鑾尚書汪鋐臣適後至首蒙聖諭天地百神祀典俱已釐正惟宗廟之制非古臣具對誠如聖諭但古人建廟恐制度卑小今本朝太廟規模𢎞偉若一旦改作恐事體重大陛下亦諭臣曰事體委的重大臣奏曰各立廟本是古禮但他日致祭陛下欲一日遍厯羣廟恐勢不能上曰今日言廟制未論到行禮處即使難行或遣官亦可臣又奏曰古禮恐亦難盡復上曰盡如古禮固難但大體處不可不依據古人各立廟只是各全其尊此等處却當依臣奏曰太廟宜如何處上曰太廟自不當動臣又奏寢殿祧廟如何上又曰寢殿祧廟俱不動臣始仰見聖慮淵微止欲於太廟之外增建羣廟使列聖各專其尊庶於古禮為合於聖心始稱臣乃奏曰三殿不動事又易處須是臣等量度地步廣狹具奏上曰須是如此末後上又諭曰我皇考顧得專享世廟之祀自我文祖以下列聖乃不得專廟以祀朕心未安臣時等俱叩首對揚曰聖諭及此真聖人大孝之心也臣復蒙聖諭卿禮官宜即具奏臣承旨而退終夜以思仰知聖心廣大見道分明鋭志興復古典臣叨列禮官乃得仰佐下風豈不甚幸況禮重郊廟事同一體臣先建議分祀蓋嘗有感於宋儒朱熹之言謂天地間有兩件極大底事其一天地不當合祀於南郊其二本朝不為太祖特立廟此臣少日所聞有志於此久矣詎意遭逢明聖而南郊大典竟得光復若廟制一新則是朱子所謂兩件極大之事皆舉行於當今陛下制作之志可無遺憾議禮之家可無遺論而臣區區仰佐聖明興起禮樂之願亦庶幾其全且畢矣臣方欲具奏間適見大學士時鑾向臣曰昨蒙皇上召見文華西室因時奏建廟之議恐今年天氣寒沍不便興工且少待來春蒙聖諭曰昨所論偶爾議及但地方窄狹勢恐難行且罷臣仰聞密勿之言遂不敢瀆奏昨該中允廖道南奏奉聖旨宗廟祀典儀制朕嘗有諭輔部大臣禮部便會官議了來説欽此臣始惶懼仰惟聖志方欲舉行未有罷議而臣以輔臣之言稽於敷奏以致尚留淵衷未有定議臣實死罪死罪但聞命以來即當踴躍從事既而思慮經營無不曲到所不能如志者惟是地方有限恐於規制不能無窒礙耳且太廟兩傍隙地無幾左則限於世廟右則迫於前朝若欲建立羣廟必須規模宏遠合古宜今有不容茍簡者宗廟重事宜慎謀始臣愚伏乞聖慈特命內閣輔臣司禮監內官監官及尚書汪鋐蔣瑤并臣會同恭詣太廟步量地方審度位勢計畫規制逐一籌算議擬明白停當先行具奏請旨定奪方可會官定議上請庶神謨有定而公議允諧矣等因奉聖旨卿只遵照前旨即便會議了來説欽此欽遵通抄到部臣等會同中軍都督府等衙門太傅兼太子太傅武定侯等官郭勛等吏部左侍郎等官嚴嵩等會議得竊聞古者天子宗廟之制唐虞五廟夏后氏因之殷周之制大抵皆七廟而祭法王制所論與劉歆宗無數之説又各不同宋儒朱熹論古今廟制引王制天子七廟三昭三穆與太祖之廟而七其制皆在中門之左外為都宫內各有廟有寢别有門垣太祖在北左昭右穆以次而南太祖者百世不遷一昭一穆為宗亦百世不遷二昭二穆為四親廟高祖以上親盡則毁而遞遷昭常為昭穆常為穆既而曰三代之制其詳雖不得聞然其大略不過如此漢承秦弊不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆明帝遵儉自抑不復别為寢廟而子孫遂為同堂異室之制嗣是更歷魏晉下及隋唐皆不能有所裁正至論宋事亦以不為太祖特立廟為憾此朱子之言後學相守以為確論者也恭惟我太祖高皇帝受天明命以有天下初為四親各别立廟德祖居中懿祖居東第一廟熙祖居西第一廟仁祖居東第二廟廟皆南向東西兩夾室兩廡三門門設二十四戟外為都宫正門之南别為齋次其西為饌次門東為神厨其一時制度儼合古禮嗣後改建太廟始一遵同堂異室之制夫既遵古制以各立廟矣而一旦襲用漢唐故事是蓋神謨英斷必有所以然議禮者終以為非古之制也恭遇皇上俊德憲天聖學稽古天地百神之祀典皆以釐正制度儀文昭然可述矣獨於宗廟之制未之修復所以形於御札宣於召問謀之輔部大臣者屢矣臣等恭聞聖諭仰見大聖人制禮作樂之志奉先思孝之誠蓋欲追復三代之禮以成一王之制將以垂諸萬世而不刋者也臣等躬逢斯盛仰奉明旨敢不思所以對揚休命乎但臣等廣集衆思愚有一得不敢不為陛下陳之臣等嘗聞廟者所以象生之有朝也寢者所以象生之有寢也建之觀門之內不忍遠其親也位之左不敢死其親也是其營構之制奠兆之所各有定則不可以意為者即今太廟南邊宫牆東邇世廟西阻前朝地勢有限輔臣禮官已奉有聖諭太廟三殿俱不動則是太廟周垣之外左右隙地不盈數十丈耳若依古制三昭三穆之廟在太廟之前以次而南則今太廟都宫之南至承天門墻不甚遼遠即使盡闢其地以建羣廟亦恐勢不能容若欲小其規模不必别為門垣寢廡則又不合古禮況古人七廟九廟制度皆同太廟營構已極宏壯而羣廟隤然卑隘恐非所以稱生前九廟之居也議者欲除太廟兩廡則非特不中典禮而裁損廟制事體尤重且諸王功臣之祀又將置之何所非臣等所敢聞也且臣等聞之廟者貌也所以形貌祖考而禮之明者也寢者寢也所以寢息祖考而妥之幽者也有廟無寢則神將安棲議者欲藏其主於夾室之中夫夾室者側室也所以藏祧廟之主也以親廟未毁之主而藏之夾室恐非禮矣至謂周人廟制約儉宜摹倣而為之是又徒耳熟陳言而未嘗精於心計者也夫周廟門容大扄七箇圍門容小扄三箇則大門實容二丈一尺小門實容六尺其制度之宏且過於今烏在其為儉約也況臣等恭覩世廟之制蓋損於太廟之數多矣今欲建立羣廟其規制高廣又豈可損於世廟乎且太宗功業之盛比隆太祖而憲宗又我獻皇帝父也二廟規制視世廟尤不當有一毫降損而後可不然則聖心於此又有所大不安也今太廟之主自我太宗而下凡七聖兹欲各為立廟將依古制為三昭三穆而止立六廟乎將依商周之制以太宗為百世不遷之宗而加立七廟乎夫規制既不可降損而欲擬諸世廟森然並建七廟於太廟之南豈惟地小不足以容殆恐宸居左偏宫室太盛以隂陽家説未免有偏缺壓制之嫌此就地勢規制而言臣等所未敢輕議者也臣等竊謂即使各廟既成陛下以一人之身冠冕佩玉執圭服衮循紆曲之途而欲於一日之間遍厯羣廟為之興俯拜起升降奠獻雖有強力之容肅敬之心且將薾然疲􅓈非獨筋力有所不逮而日力亦有所不給矣議者乃引周禮宗伯代后獻之文謂羣廟之中可以遣官攝祭是又未嘗深惟禮意者蓋古者宗廟之祭君后迭獻是以后不與祭則宗伯可以代獻謂同在一廟之中而代后之亞獻者言也未聞人臣可以代天子行事而遂主一廟之祭也且古者諸侯助祭多同姓之臣以之代攝猶之為可何也同一祖宗之子孫也今之陪祀執事者可以擬古諸侯之助祭者乎孔子曰吾不與祭如不祭是有故不得與祭而其心猶以為如不祭也況陛下之仁孝誠敬可以於終歲舉祭止對越太祖之廟而不一至羣廟乎且規制必備而成廟門垣堂廡寢室是也儀文必備而成禮陪位樂舞之數是也今欲立為七廟或八廟之制則每廟之中致祭之時皆當有樂舞之數陪祀之位而後可若曰降從簡易而垣寢不備樂舞不陳主祭不親則是本欲尊之而反卑本欲親之而反疏祗見貶損而未見所以為隆重矣先年大學士丘濬謂宜間一日祭一廟厯十四日而遍七廟此蓋無所處而強為之説不自知其言之涉於迂濶此就禮節儀文而言臣等所未敢輕議者也臣等竊聞先儒馬端臨曰後世之失禮者豈獨廟制一事而廟制之説自漢以來諸儒講究非不詳明而卒不能復古制者以昭穆之位太拘故也必欲如古制立廟必繼世而有天下者皆父子相繼而後可若兄弟世及則其序紊矣周孝王以共王之弟懿王之叔繼懿王而立故晦菴廟圖宣王之世則以穆懿夷為昭共孝厲為穆夫穆王於世次昭也共王為穆王之子於世次穆也懿王為穆王之孫則繼穆王而為昭是也孝王為共王之弟而以繼共王為穆雖於世次不紊然以弟而據孫之廟矣至夷王為懿王之子世次當穆而圖反居昭厲王為夷王之子世次當昭而圖反居穆則一孝王立而夷厲之昭穆遂至於易位於是晦菴亦無以處此不過即其繼立之先後以為昭穆而不能自守其初説矣又況宣王之世三昭三穆為六代則所祀合始於昭王今因孝王厠其間而其第六世祖昭王雖未當祧而已在三昭三穆之外則雖名為六廟而所祀止於五世矣然此所言者昭穆祧遷之紊亂不過一代而已前乎周者為商商武丁之時所謂六廟者祖丁南庚陽甲盤庚小辛小乙是也然南庚者祖丁兄子陽甲盤庚小辛小乙又皆祖丁子也姑以祖丁為昭言之則南庚至小乙皆祖丁子屬俱當為穆是一昭五穆而祖丁所祀上不及曾祖未當祧而祧者四世矣後乎周者為唐唐懿宗之時所謂六廟者憲宗穆宗敬宗文宗武宗宣宗是也然穆宗宣宗皆憲宗之子敬宗文宗武宗又皆穆宗之子姑以憲宗為昭言之則穆宣為穆敬文武為昭是四昭二穆而懿宗所祀上不及高祖未當祧而祧者三世矣蓋至此則不特昭穆之位偏枯而祧遷之法亦復紊亂若必欲祀及六世則武丁之時除太祖之外必創十廟懿宗之時除太祖之外必創九廟而後可且繼世嗣位者既不能必其為弟為子而創立宗廟之時亦安能預定後王之入廟者或穆多昭少如殷之時或昭多穆少如唐之時哉若必欲昭穆不紊則立廟之制必須屬乎昭者於太祖廟之左建之屬乎穆者於太祖廟之右建之方為合宜而預立六廟定乎三昭三穆以次遞遷之説不可行矣似反不如東都以來同堂異室共為一廟之混成也此則往哲之論足證今事就昭穆祧遷而言臣等所未敢輕議者也臣等仰惟陛下孝思純至天鑒高明制禮作樂卓越前聖方且退託謙沖下咨廷議但臣等愚昧非不知古禮當復而事理有所難行惟是聖諭以為皇考獻皇帝有世廟以享祀而我文祖太宗以下列聖乃不得專有一廟以全其尊斯言也皇天列祖實鑒臨之天下後世可以仰見陛下純孝至誠大公至正之心矣但臣等愚見則以為列聖同享太廟已極尊崇而皇考專居世廟猶為退遜若廟制大小不倫行祀親攝或異則尊卑厚薄之分反不足以稱陛下孝敬之誠恐又未免有遺憾矣臣等竊見今歲孟春陛下更定特享之儀正太祖南面之位以為太廟之始祖又為列聖各設帷幄祭俱南面各自奠獻讀祝臣等仰服陛下酌古凖今因時制宜儼乎各廟專祀之義雖古人制禮精微之意亦不過如是而已況向來恭聞陛下有諭輔臣御札云祀典宜正廟制難更大哉皇言實萬世之寶訓也今臣等復議得太廟九間同為一堂雖有帷幄而無所間隔嫌於混同未稱專尊之敬請以木為黃屋儼如廟庭之制每廟設一於殿之一間又設帷幄於其中太祖居中盡北太宗而下列聖依昭穆之序以次稍南位置如古建廟之制則太祖列聖各得以專其尊足以申陛下尊尊親親之情而於古禮亦庶幾矣臣等足以作則萬世而未可以為遷就權宜云也彼朱子謂宋太祖僻處一隅與夫設祭一室甚或無地以容鼎俎者事體大有不侔陛下博觀前史固可考而知也但宗廟重事臣等愚昧未敢定擬伏乞聖明特賜裁斷嘉靖十年十一月二十四日具題嘉靖十一年三月二十一日奉聖旨郊廟大禮係國家重典朕於天地百神祀典俱已釐正惟宗廟之禮尚襲同堂異室之制未能復古於心歉然朕嘗稽我聖祖開國之初已曾建立四親廟實有鑒於漢制之非今具載大明集禮存心録祭祀禮儀朕為子孫所當遵行見今太廟前堂後寢俱有定制不必移其昭穆世數廟次你部裏便會同多官相度兩廡地方議處規制停當來説一折浮議以慎廟制疏該中軍都督府經厯趙善鳴備奏建立宗廟及祫禘昭穆規制禮儀等項臣等仰惟陛下懋德憲天崇古圖治上嘉三代下陋百王制作之盛昭然可述乃者數諭輔部大臣考訂宗廟禮制釐正百神祀典聖學精微孝思深遠固已上通皇天格於列祖萬邦臣庶莫不作孚丕應以祗承休德矧訏謨茂制悉出淵衷雖元卿碩輔老師宿儒有不能仰贊萬萬分之一者兹因趙善鳴之奏復命臣等逐一看議臣等仰見陛下謙沖大度不遺邇言但宗廟之制前者中允廖道南建議已經該部議擬具題除伏候明旨外所據趙善鳴世廟問宗廟圖説等項臣等謹遵奉明旨逐一看議伏乞聖裁計開一太廟前自石欄杆外南至承天門東墻約有九十餘丈若建太宗文皇帝廟於三昭之上則左當為四廟恐其地之或淺臣僭計擬不若展拓太廟之東北其東與世廟西墻之鄰北與世廟北墻齊若畫一太廟西邊甃一墻直抵於南轉而之東復轉而之北同為一大都宫太廟并後二寢廟及金門皆巋然不動後一寢廟以藏德懿熙仁四祖中寢廟與太廟則我太祖為始受天命之君功高萬世實聖朝百世不遷之始祖所當居也太廟大門則遷置於承天門東墻之北去墻五丈太宗定鼎金臺又百世之所當宗宜别立廟於太廟之東北世廟為始封之君亦當百世不遷今以自為都宫可謂尊尊親親各得其宜仁之至義之盡者也其三昭三穆則立於太廟之前以次而南各有門垣寢廟是則獨致隆於太祖以為羣廟之主而不下同於子孫羣廟各得致其尊崇而不上壓於祖考庶乎先王報本追遠之禮意得復全於陛下矣惟聖明采擇焉前件按王制曰天子七廟三昭三穆與太祖之廟而七朱子以為其制皆在中門之左外為都宫內各有寢廟别為門垣太祖在北左昭右穆以次而南太祖百世不遷一昭一穆為宗亦百世不遷則二宗廟固在太廟之內商之廟制雖不可考然韋玄成等周廟圖亦以文武世室列太祖之左右故書稱文王曰穆考武王曰昭考此其證也今欲别建太宗廟於太廟之東北不與昭廟之列既與古制不倫況文廟世廟俱在太廟之東參差迤邐偏在一隅似於規制未稱所據前議似難依擬至認祧廟為寢名廟門為金門似亦未諳禮制一太廟街門自門內簷下東至太廟金門外中街之西旁約有三十餘丈西除地五丈作路通輦至南南轉而東東復轉北亦皆除路五丈以達太廟世廟其西南之渠皆覆以石以便鑾輿出入其神宫監之房更轉徙於東一以廣三昭廟之地一以廣達世廟之路其三昭三穆之廟大約每廟深三十丈濶二十八丈每廟除廟前廟後寢庭階門垣各尚有地一十餘丈亦足以容文武羣臣之拜位也前件看得太廟係享祀祖考尊嚴惟五品以上官始得陪祭其餘人等不許擅入律有明條況非奉明旨不敢度量指畫所據前項約計地步丈尺及輒定廟制深廣事屬擅擬臣等不敢依據候奉有成命别議一孔子曰春秋修其祖廟陳其宗器設其裳衣又曰行其禮奏其樂故每廟設後寢以安神主設前廟以迎主致祭設庭階以容樂舞左右設神厨以貯宗器衣冠樂器之屬其旁親之可祔者以其班而祔之各廟之寢焉特祭則祔食於本廟之旁時祫則祔於太廟之西廂如今之制可也前件看得太廟堂寢規模祭祀禮文自有定制無容别議其所言神厨恐非貯宗器衣冠樂器之處一三昭三穆共六廟其後四廟於各大門之外除路街二丈七尺其前二廟於大門之外各除路街三丈以其迫於太廟之南牆故也前件係廟路規制若如所擬似太迫隘俟建廟議成請自聖裁不敢擅擬一世廟之南乃朱雀之方須多植花木四時秀麗其間所纍之石乞移於世廟之後填河丈餘纍為小山多植松柏以護玄武之方前件臣等竊惟宗廟乃尊奉神靈之地祗宜林木蔭翳以致隂氣自古以來未聞可以植花木於前而疊山纍石於後者也況皇城御河方如環璧今議填塞不惟壞裂內庭規制抑亦有礙中外觀瞻事出不經尤難依擬伏乞聖明裁之一四時之祭春特享其夏秋冬皆合於太廟禮有明文矣但特享之禮其日辰行禮之節度臣則有所未考焉獨先朝文莊公丘濬大學衍義補有曰孟春自初一齋戒為始四日祭太祖廟間一日祭一廟厯十四日遍七室然由祭義云祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘又季氏之祭逮暗而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交於户堂事交於階質明而始行事晏朝而退孔子以為知禮又先儒陳祥道云自再祼而至九獻其禮非一舉自致神以至送尸其樂非一作以一日而厯七廟則日固不足而強力者亦莫善其事矣若日享一廟前祭視牲後祭又繹則彌月之間亦莫既其事事矣臣以為若分而祭則動經半月齋戒靡寧鑾輿屢出間而省牲二旬而圍宿臣以祭義孔子諸説推之則先王之禮恐不若是之煩數也臣晝思夜惟先考聖朝特享之禮及今郡縣祭先師儀注并朱文公家禮酌古凖今妄為儀注惟聖明采擇而損益之夫今太廟之特享也天子位於中門內北向奏行初獻禮奏詣太祖位前奠爵奠帛次奏詣太宗位前奠爵奠帛羣主則遣官各詣各神位前代奠爵奠帛而七祝文一齊讀焉此今之制也若郡縣主祭官之祀孔子皆位於兩階之中及家禮四時之祭主人立於阼階主婦立於西階今人家主婦不從事同祭則主人亦宜立於兩階之間又有降神詣盥洗酒尊所之節度又孔子曰禘自既灌而往者禮之􅌊蕭求神於陽祼鬯求神於隂則灌之禮又不可缺矣又有嘏辭禮曰祝以孝告嘏以慈告是謂大祥儀禮嘏辭曰祖考命工祝承致多福於汝孝孫來汝孝孫使汝受命於天宜稼於田眉夀永年勿替引之又祭法曰祝嘏辭説藏於宗祝巫史非禮也則嘏辭亦不可缺者臣妄以為每歲於孟春上旬涓吉特享羣廟設天子位於太廟金門之中文武羣臣承委代祭及陪祭官員皆分列於金門之外天子始至親詣羣廟迎主各就前廟太祝或大臣捧帝主宫闈令捧后主天子仍親閲宗器裳衣祭品之屬以致其敬於是金門之中而踐其位奏其樂行四拜禮以迎羣廟之神乃奏詣盥洗所又奏詣酒尊所又奏詣香案前降神俯伏興再拜平身又奏詣太祖高皇帝前奠爵奠帛詣讀祝位即香案前也奏讀祝讀祝訖天子即位於香案前西向其羣廟遣官奠爵奠帛讀祝凡進退節度一以天子所行為差再獻三獻皆然至奏飲福受胙奏嘏辭則天子出由西階而降復金門之位奏跪奏飲福酒則祝於太廟先捧溫酒一爵及羣廟之祝各執酒一壺同立於左至是皆跪天子飲福酒訖奏受胙則太廟羣廟之祝皆執胙於右齊跪進天子受胙訖乃奏嘏辭乞命禮官考定嘏辭嘏辭訖則羣祝執捧胙從金門左出至沒階以交內侍訖乃奏送神天子與承遣陪祭官貟皆照舊位行四拜禮訖徹饌焚祝帛天子納太廟之主遣官各納羣廟之主夫然則人以誠感神以誠格孝達於冥冥之中神交於羣廟之表庶幾特享之禮周全簡要而一日可行也若世廟則間日而行皆天子親主祭事一如今制至於夏秋冬三時之祫一宗先王時制太祖東向自如羣昭之主皆居北牖而南面羣穆之主皆列南牖而北面太宗特設位於仁廟之西獻皇帝設位於孝宗之東天子從太廟東南之突門而入東立西向其獻灌嘏辭一一如儀其代祭陪祭官員皆立於太廟門外石欄杆之下一如舊儀惟祝文則總歸於一必添減兹祫食之文凡樂舞皆如聖制列於廟外所謂禮交動於上樂交應於下和之至也則時享之禮簡便歸一可以行之悠久而無難矣前件看得古人廟制前堂後室與今制不同故有南牖北牖以列昭穆之主而太祖之主則以東向為尊今屋制既與古殊乃欲泥古東向之文則太祖之主當該於西旁中柱之下又當改易廟門别開南北之牖而後可泥古非今變更制度莫此為甚其欲天子親迎羣廟之主一時出就前廟恐迂回曲折往復出入勢所不能勞亦不勝又欲天子即金門以為拜位捧溫酒一爵及執羣廟酒各一壺一時皆跪以上儀文皆不知出自何典惟聖明裁之一德懿熙仁四廟在太祖之時為高曾祖禰四親廟在今日則為親盡之主正猶宋太祖之立僖順翼宣四廟至高宗紹興二年吏部貟外郎董弅太常丞王普曰藝祖始受天命追宗四廟以致孝享行之當時可也至於今日世逺親盡迭毁之禮古今所同所當尊者藝祖而已自僖祖至於宣祖親盡之廟當祧自太宗至於哲宗昭穆之數已備是宜奉藝祖為第一室永居東南位太祖仁宗南面為昭真宗英宗北向為穆五年之禘則迎宗祖享於太廟而以太祖配之由此則今日之制正當以太祖為始祖三年大祫則四廟但祀之後寢可也五年之禘則宜考文獻通考朱熹所定之圖及宋臣董弅王普之論推之則我朝以仁祖為所自出之帝五年迎祀於太祖之位太祖退居北牖以配食焉可也惟陛下定之前件看得前項祧廟及特享時祫大祫大禘之禮俱經聖明詳定足以垂憲萬世本部節奉敕諭著為成典今趙善鳴輒復妄議非臣等所敢擅擬其曰三年大祫以四廟之主但祀之後寢不知此為何説一室之西南隅曰奧奧為至尊之地故禮曰凡為人子者居不主奧又傳曰奧有常尊且隂道尚右故以西為上而面東又所以受生氣以衍子孫蟄蟄繩繩之祥也西北隅曰漏東北隅曰宧東南隅曰突古之人君升自阼階俱從東南隅出入於廟東立西向即儀禮諸侯遷廟禮云君就東廂西向祝就西廂東向及禮將畢則云君反位祝徹反位説者曰君反位東廂之位也祝反位西廂之位也此非特以奧為尊而昭穆之得名實以羣廟之主入於太廟分列於南北牖下面南面北而取義也況由二世而十世十世而千百世其三年之大祫悉陳已毁之主未毁之主則太廟東西之廣濶亦得以容神位而陳俎豆也伏乞陛下裁之前件看得古人廟制堂之後有室故以奧為尊室有南北牖故因之有昭穆之名當今宗廟宫室之制與古不同所據趙善鳴泛引古義意在毁更非臣等所敢擅擬一郊廟天下之大禮今四郊既成矣天下幸甚萬世幸甚而宗廟之數未備實為聖朝之缺典固宜我皇上屢諭輔部大臣也誠有如今侍讀學士廖道南云未有郊祀宜急而廟祀獨緩者也但制作舉動當以其漸此孔子所以稱公子荆之善居室傳曰禮樂積德百年而後可興又國家常須稍存贏餘以備不虞漢文帝露臺惜百金之費所以海內富庶幾致刑措今連年土木之工興又加以四方之飢饉輒一興工動費十萬又聞南方運來之木或有中虛而不中材用者則動費數百銀兩且木之長大又難於牽運臣妄計擬伏乞陛下每廟委一材幹官貟擇工師巧匠凡所用棟梁榱桷大小長短多寡一一畫定圖本差往江南産木之地大府分二府共修廟一座小府分三府共修一座皆於近水搭厰修造而各府以在庫無礙官銀幫修斫成粗胚小而短者以舟運大而長者以筏運其出甎瓦石之處亦往彼處燒鑿既成乃陸續運來仍乞寬其限期使京師軍民得休息外郡之民不告勞而陛下亦得以靜制動以逸待勞惟陛下裁之前件看得前議以為建立九廟恐致京師勞費欲要差官往就江南分派各府造立廟座搬運來京臣等竊惟朝廷設立工部內官監等衙門職掌營建凡營造大工必有大臣提督科道監巡驅役軍夫動以數萬猶且經厯歲年乃能底績況百凡規制出自內府時稟聖裁今欲以一二匠役付之繩墨逺赴江南使偏方下郡奉朝廷咫尺之書驅素不習事之民罷農釋賈以供朝廷莫大之役自古及今未聞有此所據前議似為不知事體迂曲難行一臣聞為椽杉木出自福建地方而買辦運解乃在江西郡縣徽州等處販木射利商人索價太高殊為江西買運者之苦可敕工部移文於福建布政使司責令出杉郡縣親送至修廟府分交割用度庶彼此勞逸得均前件看得前項椽杉雖所出地方不等而運送上納實係沿路官夫今既欲責令民間出木又欲府縣親送前來地逺民貧豈堪重纍所據前議皆屬厲民難以準行一樂舞生須廣收多蓄以備特享各廟之用仍許其讀書庶不自棄於無用也前件看得樂舞生係道士選充祖宗成法因其出家清淨故用之專習樂舞以事郊廟神靈今神樂觀道士不為不多即使廟成足備供用不必廣收至於讀書科舉自有民間俊秀何用求之於此所據前議亦為浮泛一周令四時必薦新於寢廟蓋事死如事生不敢以人之餘奉神此時祭之外行薦禮也先哲方懿以為以人道事之故有寢以神道事之故有廟今之奉先殿進薦品物即其制也又禮云君子有終身之喪忌日之謂也而宣德年間有馮善著家禮集説有生忌之文云存既有慶沒寧敢忘臣妄意以為四時之新必薦於各廟之寢及各廟之諱辰生忌皆天子親行以致專隆之孝思但今鑾輿之出必致圍宿恐太煩也其或遣官代祭則天子率聖后焚香點茶拜於奉先殿如此則禮意周備而孝思無遺矣惟聖明定之前件看係薦新之祭祖宗列聖及我皇上行之自有定禮成法不敢輕議一世廟問有序洪惟我聖天子登極之四年乙酉建世廟於太廟之東所以迎祀恭穆獻皇帝也臣作世廟問或問曰世廟何為而作也臣曰孝思之至情之不能已仁禮之極也曰情也每慮拂乎性何謂仁禮之極也曰聖人制禮緣於人情情之正即性也奚其拂性有禮義禮起以義義亦禮也制禮本於人情故曰仁禮之極也曰何謂也曰孟氏有言士有遊於楚則託其妻子於其友然則無所托則聿來胥宇我聖天子入紹大統匪直楚逰而已士之嫡子入仕則載其應祀之神主以隨聖天子為嫡子入紹大統又無皇太弟之可託也而罔極之恩奚啻妻子豈友生可託也且奉慈后入內以天下養旦夕瞻覲母子之樂泄泄焉母后既來而獨留獻皇帝孑然厠於安陸之廟萬里閴寂仁者忍為之乎故曰事死如事生事亡如事存孝之至也曰然則世廟之主以祔祫於太廟乎曰祫而祔食可也廟而祔數不可也曰何謂也曰天子之廟七世也世廟不可以與焉則僭天子下祭及王殤者五旁親之無後者以其班祔況堂堂世廟天子之父也是宜與夫祫食也不祫則離曰世廟本藩王也而祔祫太廟或者不可乎曰古有之矣曰何徴曰昔季厯倫序本季也古公以季厯生子昌有聖德故傳其位以及昌是以季厯生則為諸侯沒則入昭廟是父以子貴而不嫌於奪嫡也及武王既事則行追王之禮是故季厯昔為五廟之侯後為七廟之王昔五世而祧後至七世而祧是又祖以孫尊而王季不嫌於七廟矣故世廟之祔祫也奚其僭曰然則世廟之祔也位當何居也曰於今四時之祫宜列於孝宗皇帝之下異時武宗當祧四時之祫則宜列於太宗皇帝之下是既不失其所尊而又不失其所親尊尊親親各得其宜矣曰世廟至於七廟亦當祧乎曰否曰何謂也曰諸侯别子尚百世不遷況獻皇帝以曠世之明王樂善篤學受天子之封在本國為百世不遷之始祖非但諸侯之别子而已且生我皇上亶聰明足以有臨武宗皇帝奉天之命遵祖之訓而傳以大統焉登極之後愛親尊祖敬天勤民制禮作樂丕闡先王之典則一新天下之耳目於文武周公尤其光焉設使當武宗彌留之頃獻皇帝尚存之日縱獻皇帝非傳統之次若武宗有古公之見猶宜傳位於獻皇帝以及我皇上況倫序之所宜乎是季厯無獻皇帝之所有獻皇帝有季厯之所無是則世廟祔祫於太廟宜矣其誰曰不可乎故臣嘗曰明倫大典有云孝宗當祧之日世廟之主亦合遷藏但歲暮出主一祭臣以謂即當削正也曰既立世廟則四時特祭可也何以祔為曰宗廟以祫祔為榮禮文以合一為貴祫祔則尊享為極至合一則易簡而有常有常則百世聖子神孫舉行猶一日也故禮大傳春犆礿禘祫嘗祫蒸祫正謂是也曰法施於民則祀之以勞定國則祀之太祖受天之命為開國百世不遷之始祖太宗定鼎金臺又百世之所當宗理固然矣然則武宗以上羣廟之主亦有時而祧乎曰五世而緦六世親屬竭矣故親盡則當祧也曰世廟乃獨不祧可乎曰禮有明文王者始受命與諸侯始封之君皆為太祖皆百世不遷故世廟不得而祧也曰世廟太廟皆百世不祧得無有二大之嫌乎曰世廟别為都宫不與七廟之數但春則特享而夏秋冬三時皆祔祫於太廟而時享焉是則上得以尊其所尊下得以親其所親何二大之嫌乎曰昔武王以周公有大勳勞賜魯重祭孔子曰魯之郊禘非禮也今日世廟不祧無乃冒非禮之誚乎曰不同也夫郊則配天禘則配所自出之帝禮曰不王不禘非周公侯國而僭也況周公之子伯禽也諸侯也世廟聖子我皇也天子也是又周公無世廟之所有而世廟有周公之所無且世廟又無配天配祖之失但遵始封百世不遷之典以伸我皇上千百年孝思之至情耳又何非禮之冒乎是故不拂乎性之謂和不戾乎禮之謂通不僭之謂義不離之謂仁是故世廟立而衆善備矣臣故曰孝思之至情之不能巳也仁禮之極也詩曰永言孝思孝思維則其斯之謂歟或者曰傳云非天子不議禮不制度不考文吾乃今見之矣前件雜引禮經諸説牽托文議無所取衷但所議世廟當百世不遷禮不當議祧此論甚正前此議者有欲與孝宗當祧之日亦合遷藏斯為不通已經聖明裁正但又欲祔祫於太廟則又非所以隆專廟之祀矣所據祔祫太廟臣等未敢輕議一宗廟説天子七廟商書王制周禮孔子家語及公羊傳皆有明文謂始祖之廟與左三昭右三穆共為七廟共為一大都宫而各有門垣寢室也始祖有二焉一為王者始受命一為諸侯始封之君其昭穆前四廟前為高曾祖禰四親廟後二廟為二祧廟以祀高祖之父與高祖之祖所以致隆於天子而别於諸侯之五廟也天子有祫有禘諸侯有祫而無禘故曰不王不禘除始祖百世不祧其下六廟至七室即遞祧之祧主藏於太廟之夾室若有功德不可祧則於七廟之外别立廟以祀之若商之祖甲太戊高宗周之文武世室是也故天子七廟常數也其外非常數也商書曰七世之廟可以觀德其此之謂歟若王者始受命其上世無有始封之君未見有功於民未嘗以勞定國則宜虛始祖之位但事其六世而已至於親盡則祧之故我聖祖不立始祖與二祧者但祀德懿熙仁四親廟而已得無洞見於此邪且聖祖嘗曰漢高創業之君禮樂之事固所未講豈我祖於定國之初亦未遑備舉也邪夫自始祖以下皆父昭子穆二世昭而三世穆四世昭而五世穆六世昭而七世穆廟皆南向主皆東向廟以左右為昭穆而不以昭穆為尊卑故在本廟則左為昭而右為穆若祫於太廟則北為昭而南為穆昭常為昭穆常為穆昭者祧而穆主不動穆者祧而昭主不移故文王在穆而武王不嫌於居昭也宗廟以時致思故孟春則特祈於各廟所以致吾祖考得以享獨尊之榮其夏秋冬登各廟見在之主於太廟而合食焉謂之四時小祫若陳其已毁夾室之主并登其未毁在廟之主各序昭穆而列於太廟南北之牖下而合食焉是謂三年之大祫蓋祫者合也若五年推迎始祖之父居於始祖東向之位始祖退居北牖之下而面南以配食焉則謂之禘是為王者之大祭也若商周契稷皆帝嚳所生并受堯之封故契稷為二代之始祖而以帝嚳為所自出之帝也夫未有祧主之小祫及有祧主三年之大祫其父昭子穆倫序皆不易矣但第二世既祧之後四時之祫又不陳毁廟之主則三穆皆父三昭皆子即所謂父昭子穆或子昭父穆也其序坐之次禮有未考宋儒朱熹之意以為右祧廟之主其上無昭而設其位於高祖之西新附廟之主其下無穆而特設其位於曾祖之東則倫序各得其宜矣仰惟聖朝若先見在七廟則太祖居北為百世不遷之始祖太宗文皇帝當居二世為昭仁宗昭皇帝當居三世為穆宣宗章皇帝居四世為昭英宗睿皇帝居五世為穆憲宗純皇帝居六世為昭孝宗敬皇帝居七世為穆武宗毅皇帝賓天入廟則文廟之主當建别廟以祀之宣廟憲廟當以次遞遷於上武宗宜入於憲宗之故廟即儀禮所謂以其班祔檀弓所謂祔於祖父者也但七廟始創於今日文廟定鼎金臺又為百世之所當宗既宜别立廟於三昭之上宜凖商之三廟周之世室若以仁宗居三世之穆則宣宗為子反居二世之廟似於鼎新之禮未得其宜不若據今新立之廟即以仁宗居昭之二世而與宣偶英與憲偶孝與武偶其大祫小祫之禮只特設太宗之位於仁宗之西其世廟則自為都宫為始封百世不遷之祖若入祫於太廟則設位於孝宗之東異時武宗當祧之日則獻皇帝之位又設於太宗之東如此則尊尊親親各得宜為省便耳不知博古通今者以為何如謹為之説以獻惟聖明采擇一二復乞詔薦紳之臣假以祕閣之書俾之參考以求至當歸一之論以舉千百年之墜緒以成聖代之制作以全陛下之孝思無俾後之悲今猶今之悲前代也天下幸甚萬世幸甚前件謹按宗廟之制夏商之前雖不可考今見於商書有天子七廟之文則七廟自古已然禮曰天子立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟有祧有二祧朱子七廟説一昭一穆為宗二昭二穆為四親廟則七廟似兼二宗祧廟在中然考之劉歆廟圖則文武世室在昭穆之外蓋以七廟乃廟之正法而宗則無常不可預設朱子深以其言為然陳氏禮書亦曰鄭康成之徒謂周制七廟文武為二祧親廟四而已此是臆説夫周公制禮之時文武尚為近廟宗之之意起於後代若果宗在七廟內則繼世有功德不異文武者復以為宗而親廟又益殺矣此説明白可據況以廟圖考之雖議論不同而昭穆廟俱在太廟前之左右今趙善鳴謂天子七廟廟之正數似矣至謂四親廟在太廟前而二祧廟以祀高祖之父祖在太廟後不知何據又禮文逺廟為祧蓋后代謂文武世逺在應祧之列特為功德而留故曰二祧非建廟之時即謂之祧廟而不謂之昭穆亦非以高祖之父祖為二祧也至於始祖之廟則祀王者上世受封之始如周后稷建邦於邰實為周家王業之所由起故以為始祖若後世王者既無受封之始則宜就世系可知耳目所記方可祀之宗廟以致其尊尊親親之情如高皇帝立四親廟亦以上世本無可推故耳然考之集禮則德祖居中三祖廟在左右蓋既立宗廟必以第一祖廟居中尊於羣廟以為之統今趙善鳴乃謂后世王者止事六世而虛始祖之位又不知何據夫禘祭之所以可為虛位者以必有始祖必有所自出之帝因不可考故虛位盡誠以祈感格若既立一廟則有一主又非可以虛位而居虛廟也此尤於古不通又按朱子曰宗廟之序昭嘗為昭穆嘗為穆祔昭則羣昭皆動而穆不動祔穆則羣穆皆動而昭不移昭穆本以廟之居東居西主之向南向北而得名初不為父子之號也昭穆之分自始封以下入廟之時便有定次故成王之世文王為昭而不害其為尊於武武王為穆而不害其卑於文則古之昭穆固有定序今宗廟之制既以高皇帝為始祖則文皇為昭仁皇為穆以次而下其序有不可紊者今既欲以仁宗居二世之昭而大祫之祭文皇反居右方之穆誠恐位次不倫古制有礙至於禘祫之義臣等已議之左方統惟聖明裁定嘉靖十一年三月十二日題二十一日奉聖旨廟議朝廷自有定論趙善鳴所言多有未諳典禮難以準行以後再不許率意奏擾欽此一計度廟制以重謀始疏該臣等遵奉欽依會同內閣輔臣張聰李時翟鑾司禮監太監張佐黃偉鮑忠韋霦張欽內官監太監高忠太傅兼太子太傅武定侯郭勛等太子太保吏部尚書王瓊等恭詣太廟遍厯兩廡地方繚垣前後左右周旋締視逐一議擬恭惟我太祖高皇帝龍飛淮右囊括四海席卷天下功隆治懋與天無極陛下大孝尊祖既奉為太廟始祖特正南面之位其於天人之望允愜惟我太宗文皇帝定鼎北都建子孫萬世長業功治與我高皇帝比隆重光兹欲稽古建廟宜極追崇當别立一廟於太廟之東百世不遷擬之周文世室不在三昭三穆之數其昭穆六廟臣等初議以為自古宗廟必有前堂後寢周垣門廡方稱禮制隨該督令官匠丈量得太廟門牆內進深八十一丈二尺東西牆內原空東西各廣一十四丈四尺先議因廟門內進深太淺欲將廟門往南展移十丈五尺因東西牆內橫過太狹欲各展十丈一尺昨日陪祭之後該內閣輔臣會同諸臣復議不必展動東西大牆止以牆內一十四丈四尺除二丈九尺為御路以一十一丈五尺為廟之廣以二十二丈五尺為廟之深每廟止建正殿一座五間以其後半為藏主之所不用寢殿以太宗世室直就北與太廟後牆等齊廟門牆止展南八丈八尺蓋因廟門迫近廟街欲更少縮近北以存林木用護周垣是皆委曲議處遷就地勢以事營構期於仰承德意光復古典但臣等竊惟宗廟國家重事況陛下上嘉隆古聿懷永圖將以流慶萬年垂憲罔極雖其儀文細節可以因時而制度大規必須合禮且事體崇重謀始貴臧務使備制盡文將來無纎毫遺憾乃為盡善今以地勢不足乃於廟制展轉裁損竊恐成事之後聖心少有未稱則臣等茍簡之罪萬死莫贖矣臣等祗奉明命正宜竭心殫力以仰承陛下奉先思孝之誠直為地勢所限不得盡如臣等據經考禮之志所據會議規制伏乞聖明裁定再照廟門東西各亭一區近牆東西有神庫神厨俱各妨礙必須湮塞移改似無隙地可容合候再議其昭穆世次與夫祭祀行禮之節候廟制奉有定命本部逐一議上謹先畫圖貼説隨本上進倘蒙允可候命下之日行移欽天監選擇日期工部會計物料及未備事宜一併奏請緣節奉欽依便會同相看計處停當來説事理未敢擅便謹題請旨嘉靖十一年四月初二日會題初二日奉聖旨且罷欽此南宫奏稿卷三
