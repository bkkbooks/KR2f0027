body:
  text: 南宫奏稿詔令奏議類二奏議之屬提要臣等謹案南宫奏稿五卷明夏言撰言字公謹貴溪人正德丁丑進士授兵科給事中厯官禮部尚書武英殿大學士為嚴嵩所搆坐與曽銑交關棄市隆慶初追復原官諡文愍事蹟具明史本𫝊言初以才器開敏受知世宗而柄用之後志驕氣溢傲愎自専卒以致敗其立身本末殊無可稱特學問淹博一切儀文度數皆夙所留意又值世宗鋭意講貫之時故其於朝廷制作斟酌損益頗為合於典要如南北郊分祀更定文廟祀典及大禘禮儀立先蠶壇之類悉言所贊成逮帝擢掌禮部益力舉其職前後奏牘亦多有可採此本為御史王廷瞻所刋行即其官尚書時所上疏議自郊廟大典以致封爵貢舉無不賅具議論明達洵可謂能折衷於古者録而存之庶不沒言之所長且俾讀明史者得與禮志相參考於討論沿革要不為無助焉乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀南宫奏稿序序曰古昔聖君賢臣經緯人文鋪張帝業莫不著之話言施之憲章然後浹於人心人心安以樂流於教化教化厚以深夫隘於思則才滯而靡發窘於事則氣鬱而弗宣辭之不達聽之不聰言之不文行之不逺豈不病王猷盩大化哉聖天子中興啓運赫張雄圖兼盡制倫寤寐良弼少保尚書兼學士桂洲夏先生超起諫垣深契大議特隆眷注爰作秩宗時有急宣多關密畫諸所上疏每付折衷典謨作制於邦家書奏便蕃於曹省運思泉涌搖筆雲飛揮灑立成文同宿構倉卒填委用無滯神動中𤣥機允符淵度集成五卷題曰南宫奏稿成一家識度之言昭千載明良之會爰托侍御王君廷瞻刻之寄示幽鄙且命為敘豫見其婉者不屈焉微者不晦焉直者不肆焉激者不訐焉逺者不遺焉邇者不侵焉古者不迂焉通者不流焉軌物者齊昭倫者正決疑者晢闡幽者舒飾行者彰表德者懋綏猷者定署事者詳宣氣者同協道者一杼軸乎天人之際組織乎性命之元諄復乎帝王心學之𫝊昭感乎鬼神功效之著磅礴於勳賢久大之業周流於親愛情理之間論郊禮也祇而肅論廟祭也順而備論大雩也美而章論太學也隆而重論節文也密而審論古樂也平而中論宗藩也惇而睦論農桑也憂而勤論昭穆也辨而理論陵寢也剴而直答瑞應者其心畏警天戒者其言恐却夷貢者其防峻斥異端者其令嚴宥言責者其詞懇正文變者其體醇崇節義者其念深惜人才者其意厚是故分禋而明察位矣特享而仁孝孚矣皇舞而神貺臻矣臨雍而文教洽矣别嫌而至禮行矣觀成而元聲見矣錫類而維城固矣重本而王業昌矣合蒸而尊尊隆矣萃和而親親至矣持盈以戒苞桑也保威以徴仁愛也慎微以尊中國也崇正以清城社也通言以達下情也立準以滌浮習也録貞以振頽風也憫遺以養中才也渾厚之化成則奮迅之鋒斂矣寬大之體立則發揚之機晦矣夫天運於上凡日月星辰之森布皆天文也地位於下凡山川草木之附麗皆地文也人君建極於中凡章奏書記之流𫝊皆人文也夫索賾𤣥微存乎學道揚隱伏存乎才出入光大存乎位經濟利用存乎時昌言祇承于舜禹而成都俞之休訓戒翼戴于夏殷而奏篤棐之續不其偉乎三代以還以叔向子産蘧伯玉季札之賢不得少效於王官去而為列國之名卿才大夫賈董不遇徒托空言房杜無文未免慚德開物致君成務命世惟諸葛武侯陸宣公李衛公李忠定公表奏猶存風節可想然皆隨世就功周旋於散微偏安之末又不能無萎而不振之患先生迅發純英滋漸名訓可不謂學乎髙厲遐清深資閎閟可不謂才乎一人當陽委任腹心可不謂時乎二公𢎞化寅亮天地可不謂位乎崇山出雲觸石而彌六合𤣥圃積玉徹夜而騰清光全才與勳力相宣逸氣與英華同耀嫓美姬姒匹休伊周刻之金石無愧詞藏諸載籍為惇史此之謂不朽則兹編也特出其緒餘焉巳耳謹書以冠于篇端嘉靖十三年秋七月既望崇陽汪文盛希周甫撰南宫奏稿序
