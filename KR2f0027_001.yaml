body:
  text: 南宫奏稿卷一明夏言撰一斟酌臨雍舊典乞賜宸斷疏儀制清吏司案呈先該本部題為議幸學以興教化以全文治事奉聖旨先師祀典既正朕當躬謁依擬於嘉靖十二年三月內幸學一應事宜都準行臨期你部裏具儀來看欽此欽遵續該本部擬題照得駕幸太學例該先期擇日伏乞聖裁特勑欽天監預先擇定吉日其一應事宜候命下之日次第舉行等因奉聖旨是欽此欽遵行該欽天監擇於嘉靖十二年三月十三日大吉所據合行禮儀查得成化元年該本部題為禮儀事節奉憲宗皇帝聖旨著欽天監擇日爾禮部會同翰林院具儀來看欽此欽遵今照合行禮儀亦合照例本部會同翰林院議擬奏請等因具題奉聖旨是欽此欽遵又查得𢎞治元年三月初九日駕幸太學該太子太保吏部尚書王恕奏要乞增幣及分獻官行拜禮等因該本部議擬覆題奉孝宗皇帝聖旨分獻官拜禮準行其餘只照舊欽此欽遵續又該太子太保吏部尚書王恕又奏要乞增幣等因該本部會官議得合無於聖駕幸學之前致齋一日至期加帛一假餘仍其舊等因覆題節奉孝宗皇帝聖旨是尊先師當以禮既成化初年有所舉行只孔子前加幣用太牢改分獻為分奠其餘儀物俱照永樂年例行欽此欽遵今該前因案呈到部臣等會同太子太保吏部尚書兼武英殿大學士李時太子太保吏部尚書兼武英殿大學士方獻夫禮部尚書兼武英殿大學士翟鑾議擬仰惟皇上運撫中興治臻文盛執中建極紹千聖之心傳禮備樂和敷萬方之聲教神人胥慶述作兼隆乃者發自淵衷釐正祀典重厪帝衮祇謁先師當一紀化成之時躬萬乘臨雍之禮右儒重道崇德報功創昭代之上儀示百王之偉範天臨泮水春瞻奎璧之祥雲擁橋門晝聽絲綸之諭君師道重德教風行式開文運之昌允弼皇圖之固歡均率土慶溢儒紳所據儀文宜遵條貫今將一應合行儀注臣等謹斟酌舊典議擬繕寫一通隨本進呈御覽伏乞聖裁嘉靖十二年正月二十二日題二十五日奉聖旨都依擬行宴罷欽此一紀録重幸太學以昭文明疏竊惟古者臨視太學釋奠先師所以展禮樂宣德化教導天下之人使歸於善也是故厯代帝王莫不以是為首務我太祖髙皇帝肇造洪業始立學金陵乘輿時賜臨幸列聖相承每於踐祚一舉著為彛典前此幸學禮成俱該國子監纂緝聖駕臨雍録用紀一時儀文之盛恭惟皇上懋昭帝德丕闡聖謨制禮作樂崇道右文凡郊廟神祇之祀無不稽訂又釐正先師祀典尊禮極至嚴奉有加兹者乃涓令辰躬屈萬乘端辨秉圭祇謁文廟禮稱樂合雍雍彬彬旋幸學宫天臨黼座元僚侍席儒臣談經既乃聖制播宣金聲玉振橋門觀聽雲擁星陳蓋於龍飛一紀之餘為纍朝僅見之舉踵迹皇祖克紹前休誠昭代之偉儀明王之盛典也茍無紀述嗣世將何觀焉臣等列在禮官獲與侍從之末恭遇非常之典竊願有所纂緝以揚厲我皇上之盛德𢎞業俾光昭於無窮而一時大小臣工亦得以自託於不朽豈非國家文明之盛事哉且近日給事中沈謐有言意不殊此臣等謹以本部題請聖旨一應舉行移文奏牘及奉宣制詞勑諭并講官所進經義稱賀表文以日月先後次第繕録成編恭名曰聖駕重幸太學録刋刻成書隨本上呈仰塵御覽候命下之日各以一帙頒布南京禮部并南北直𨽻府分浙江等十三布政司令依本翻刻遍發所在學校使天下之士皆知皇上隆師重道之盛心實為斯文幸甚臣等干冒威嚴無任戰栗懇悃之至嘉靖十二年四月二十五日題二十八日奉聖旨是依擬行欽此一改便科舉以順人情疏該遼東都指揮使司遼東都司等衛儒學優次等生員徐潮等奏惟照嘉靖十年例該鄉試臣等俱蒙巡按遼東謝御史考送山東布政司鄉試隨於六月內起程閏六月入關時值天雨連綿平地皆水冒暑衝泥延至七月終方才到省中間觸犯暑濕太半感疾多不終場臣等勉強全場而志昏力倦僅能成文以致本學中式止生員韓瑋一人而臣等俱被黜落委屬文理荒繆豈敢妄有怨尤但念臣等由遼東以至山東往返六千餘里跋涉四箇月餘辛苦萬千難以盡訴已於嘉靖七年九月內備將苦情及將遼東比照潼關等處科舉事例奏行該部轉行遼東巡按王御史勘處取具議擬供結及合費供給銀兩又經覆奏一向拱候明旨至今未蒙準行臣等竊惟潼關一衛本屬直𨽻而科舉乃在陜西以其近於陜西又如宣府一鎮其守巡官員俱係山西而其科舉則在順天以其近於順天今遼東之地比之潼關其去順天逺近最為相等而其所設守巡亦係山東官員又與宣府相同獨科舉一節乃使越過順天逺越山東揆之事體似有不均議者或謂此其舊規殊不知遼東先年學校之名雖設而科舉之途未開至正統丁卯地方撫臣始選都司等學軍生張升金統律二人起送應試彼時遼東山東原有海道之便却將升等咨送山東既而中式以後科舉遂以升等為例實因襲之弊非舊規也況今海道不通巳四十餘年臣等何由以乘其便向使遼東先年既有科舉跋涉果如今日之逺廟堂之議必酌量地里逺近附之順天無疑又況遼東學校見屬巡按管理與直𨽻提學事體相同而科舉乃屬之山東竊恐法制不如是也如蒙伏望皇上憫念下情乞勑禮部查照臣等先年奏行本詞及該年巡按王御史勘處緣由容令遼東各學生儒得赴順天府應試庶勞逸適均事體便益臣等圖報亦有日矣干冒天顔下情無任戰栗之至等因奉聖旨禮部知道欽此欽遵臣等看得遼東都司等衛儒學生員徐潮等奏稱正統年間撫臣始選軍生應試原有海道之便咨送山東科舉況今多年海道不通乃使越過順天而逺赴山東往返六千餘里辛苦不便乞要比照潼關宣府事例附近順天府科舉一節為照遼東都司衛學應試生員先附山東委緣海道之便今海道既塞陸路遼逺往返至有六千餘里貧生寒士褁糧挾策奔走長途動經數月委於人情不便今欲改附順天府應試又與潼關之附陜西宣府之附順天事體相同況節該衛學生員徐潮等并曹福等陳奏頻煩情詞如一似應俯從但係奏改就近科舉地方既巳更屬解額未免有拘臣等查得近該直𨽻提學御史胡明善題稱德州等衛提調教官皆屬山東惟生員乃為提學御史所轄乞要建學起貢等因該本部覆題奉聖旨是依擬行欽此巳經行令欽遵去後今照遼東衛學逺去山東三千餘里乃使越過順天而附於山東科舉德州左等衛學本是山東地方而科舉乃反附於順天事體人情通屬未便相應議處臣等合候命下行移山東布政司及移咨都察院轉行直𨽻提學并遼東巡按御史知會今後德州左等衛儒學聽山東提學官管轄就山東布政司應試遼東科舉生儒聽遼東巡按御史考送順天府鄉試其德州等衛建學起貢事宜本部移咨都察院改行山東巡按御史查照先奉欽依事理施行則不惟解額無拘而人情事體兩得其便矣嘉靖十年十月十六日具題十九日奉聖旨是依擬行欽此一請復嵗貢舊法以通利人才疏該都察院右僉都御史史道奏云云奉聖旨這所奏禮部看議了來説欽此欽遵查得嘉靖十年九月內該巡按直𨽻御史胡明善題為申明學正事內一件處嵗貢該本部復議得嵗貢一途本古鄉舉里選之遺意近年以來踵弊成風但自僥幸食糧之後便謂嵗貢可望挨次輪年相因巳久雖有陪貢之例亦不過虛應故事而巳是以起貢到部者年力衰邁學問荒疏在得之戒往往犯之乃復姑息收用以充國學之選不惟無益而反有害求賢審官之道當不如此所以近奉明詔本部議處題準通行天下提學官會同巡按御史并二司官以今年為始起貢生員將槩學廩膳通考如廩膳無人遞考增附無非釐革時弊期得真才以副我皇上三途並用之意但宣德正統年間事例以在學生員四十以上年力將衰而學問荒疏者將來必至於無用是以公同會考黜陟如都御史李賔所奏數十年間此例暫一行之今欲每嵗考貢提學官必待會同巡按二司然後考校則地方有逺近巡厯有先後彼此相持終嵗耽待迄無所就不惟委任欠専抑且事體不便其應貢者祖宗舊規本以食糧年深兹欲下及增附則廩膳之名似為虛器今該御史胡明善所奏合行酌處臣等候命下通行天下提學官除前通學考校事例巳行外其有未行并以後考貢者著為定例每處提學官徑自考送不必會同巡按二司官其起送應貢者每於嵗考之時即行詳定如廪膳考居一等之內不拘名次仍查食糧年深者起送一人如無人才去處一等無人方許於二等內十名以前照前起送則不必下及增附而時弊可革矣其餘廩膳生員亦不拘食糧淺深但遇嵗考如一次考居三等者量加責治二次三等者停廪肄業三次三等者黜退為民增附亦如之但考居在四等者不分廪增附學通行黜退如此則凡嵗貢者無僥幸挨年之弊而沙汰之法亦寓乎其中矣然此特救弊之術耳至於本源之論惟在提學官得其人而巳提學得人則公以持巳明以取人其始既不輕以進人其中考校又不輕以授廩其終起貢也又加詳定起送如前之法如此夫何人才之不得哉等因奉聖旨這嵗貢生員既兩京國學缺人數多各衙門撥用不敷準照例開貢二年還行與各處提學官員嚴加考選不許冒濫其餘準擬欽此欽遵巳經通行去後今奏前因通查到部臣等看得嵗貢之法祖宗以來例以食糧年深者起貢蓋提學官嵗考通學生員舊規以增廣考居優等者以次補廪附學考居優等者以次補增間有提學官不拘增附挨次幫補止以考案之居優者補之則凡得補廪食糧者巳極一學之選矣至於三年一開科鄉試則提學官小考不拘廪增附生皆得入試考試官取士不拘廪增附生皆得中式則凡英敏出衆之才固於科目中網羅之矣其間屢舉不第者則以食糧之年深者充嵗貢焉故廪膳之在府學者額數四十人而每嵗貢一人州學額數三十人而三嵗貢二人縣學額數二十人而二嵗貢一人其學業荒疏文理疵繆甚至不成材者則於提學官嵗考之時固多黜退或停廩作曠所以得充貢者必其食糧年深屢考不黜之士但不偶於科目而亦非盡可棄之才也應貢到京者考送國學則有坐班厯事之勞至就大選不過補州縣一佐二小吏願就教職者不過授以教諭訓導等官此嵗貢生員入仕之格如此朝廷立法亦可謂盡善矣近日建議之人往往病其年齒衰謝文詞不工又無所驗據而逆探其行檢不修將到部嵗貢生員痛加汰黜致使流落失所甚至困窮無聊畢命於溝瀆者已非一人其與先王極治之世使聾瞽侏儒皆得以其材見食於有司者似不如此及與我祖宗以來立學育才大以成大小以成小之意大不類矣至於將通學生員精選一人以充嵗貢而不拘其食糧之淺深此則又為變法之大者蓋嵗貢之設本以待屢舉不偶之士況在食糧之數亦係先年考居優等之人且國家用人取材科目為重今以少儶之人據其文字一日之長而遂令充貢是沮其終身科目之望而見在食糧年深之人永無出身之途矣此法一行必將盡廢科目而後可今該僉都御史史道所奏其言通達事體曲盡人情殊為有見本部先因提學御史胡明善所奏本部定擬考居一等二等三等四等之説似為立例太繁原非成憲而中間考校之法又多提學官之事亦非事體合候命下通行天下提學官一遵祖宗舊規今後每年嵗貢止以廪膳生員食糧年深者充貢每遇該貢之年有司起送止許正貢一人陪貢一人提學官處考定一人起送赴部不必如近年事例加添四人五人送考徒滋凌奪奔競之弊虛費道路奔走之勞其考貢不中願告衣巾終身者聽於提學道應貢到京願告冠帶榮身者聽於本部俱照例準行庶成法不致紛更而人才亦無失所之患矣嘉靖十年十二月十二日題本月十五日奉聖旨這嵗貢生員事例你部裏既議處停當都只著照舊行便行文與天下知道再不許紛更奏擾欽此一涵育人才以恢𢎞治道疏該山東道監察御史楊宜題云云等因奉聖旨這本説的是禮部看了來説欽此欽遵臣等看得人才者乃國家致治之具而學校者乃人才所自出之地蓋將取用於異日者務擇其精必預養於平時者不厭其廣近日當事建議之臣甄别太嚴號稱沙汰而各處提學官奉行過當立意摧傷以致所在學校生員年少者以文詞不工見黜稍長者以齒貌近邁不容甚則浪據毁譽橫加擯棄沮父兄教子弟之念驅衣冠為田野之傭其於聖朝育才之意先王教人之法實大相背戾且史册所載聞有增廣生員增置學舍者矣有沙汰天下僧尼者矣未聞有沙汰生員之名也今該御史楊宜所奏公平正大誠為確論不惟有補於朝廷養士之法制抑實有見於先王教道之本原所據開陳相應依擬合候命下移咨都察院轉行南北直𨽻提學御史本部通行天下提學官今後務要體聖人循循善誘之旨遵虞書敬敷在寬之訓究周禮觥其不敬而撻其怠慢之義優遊涵濡以養其心振翼提撕以作其氣毋徒以黜退為功芟夷為能如御史楊宜之所論者乃為稱職臣等再看得約束生員之法自有祖宗朝卧碑提學官教士之方備載朝廷勑諭茍能遵行足為善政近年以來提學官多據一巳私見適足以壞一方人才初至即創立條約刋刻成書多尚繁苛使士子曠時廢學難於遵守至於考校命題則又截碎經文試以隱僻使士子於經書大義廢而不講而用功於所不當讀之書學為鈎棘怪僻之文而卒莫通於理道此則比來教化之弊此人才之所以不振而政事之所以不舉也合無行令天下提學官自今日為始將見奉勑諭欽發各該學校刋刻木榜於明倫堂懸挂使生徒永為遵守再不須更以巳意别立教條言人人殊無所歸一其巡厯考校務要以經書大章大旨命題不許破裂經文巧立主意取其義理純正文辭典雅者列為優等其支離怪僻悖經叛理之言雖甚藻麗亦在不取而抑置于後照舊以三等簿考其德行若有放僻邪侈行檢不修甚不率教或有干倫理者考畢之時聽有司提調官及本學教官通學生員公同呈稟提學官即當按實明正其罪使不齒於鄉閭不許泛濫訪察以開奔競賄賂之門曖昧黜退以滋赴訴搆訟之擾庶士心知所趨向感奮可以成材可以善俗法令明一而學校之政修矣嘉靖十年十二月二十二日題本月二十四日奉聖旨是依擬行欽此一正文體重程式簡考官以收真才疏仰惟祖宗舊典凡三年一開科取士惟兹嘉靖十一年二月例該會試天下舉人臣等承乏南宫叨知貢舉除科場一應合行事宜無不仰承德意題奉欽依次第舉行外但臣等偶有一得條為三事敢為陛下陳之一曰變文體以正士習竊惟國家建學校聮師儒以教養天下之學者既乃設科目較文藝以網羅天下之成材自祖宗以來百六十年于兹造士求才之法可謂盡善極美是以經術日明文運日昌蓋至於成化𢎞治間科舉之文號稱極盛凡會試及兩京鄉試所刻文字深醇典正蔚然炳然誠所謂治世之文矣近年以來士大夫學為文章日趨卑陋往往剽剟摹擬左傳國語戰國策等書蹈襲衰世亂世之文爭相崇尚以自矜眩究其歸不過以艱深之詞飾淺近之説用竒僻之字蓋庸拙之文如古人所謂減字換字之法云耳純正博雅之體優柔昌大之氣蕩然無有蓋自正德末年而此風始熾伏自皇上登極以來聖學格天帝文煥日且屢發德音黜浮崇雅宜乎文章之盛駸駸乎與三代同風乃昨嵗天下進呈鄉試程文類皆猥鄙不經氣格卑弱背盩經旨決裂程式其或刻意以為髙者則浮誕詼詭而不協于中騁詞以為辨者則支離磔裂而不根于理文體大壞比昔尤甚乃知俗學流弊振起為難有識者蓋深憂之兹聖明在上若不大振頽風力救斯文之弊則將來道術日微人才日壞欲得真才以輔成治理蓋益難矣此事關係甚大又臣等以人事君之義莫重於此伏乞聖明采納勑考試官今次會試較士務取醇正典雅明白通暢溫柔敦厚之文凡一切駕虛翼偽鈎棘軋茁之習痛加黜落庶幾士子知所趨向而文體可變而正矣二曰責主司以定程式臣等切見本朝科舉文字體格甚好初場試以七篇皆以五經四書大義求其旨趣不失而詞理俱到者巳為難得於中場試以論表判語末場試以五策求其隨扣即應而博洽貫通者尤為難得所以應試之士於風簷寸晷之餘欲實録其文可為後學矜式者蓋巳絶無間有之是取什一於千百也所以試録文字多出主司之手而謂之程文將以為學者程式也且自來諸省鄉試録文字不及兩京而會試録文字每冠天下蓋兩京主考用翰林官二人而會試則用館閣儒碩及諌垣郎署之素有文名者充之所以試録程文成于多賢之手足為海內矜式庶幾學者有以循據近年題奉欽依欲録士子本文不必考官自作所以各處試録文理紕繆體裁龎雜殆不可觀以致初學之士不辨臧否方且爭效所為至於平日善為文者亦不能守其故步反遷就其非繆以希合一時則文之弊也將來可勝救哉臣等伏乞勑下考試官今次會試所命三場題目俱要冠冕正大有關理道足資治體於經書則摘取大章大旨於策論則試以大經大法不許截裂牽掇徒事帖括及困以隱僻有如覆射每題於士子可録之文仍令考試官重加裁正以示模範於天下使學者有所矜式但議者以為考試官留心改文有妨閲卷臣等請以今次放榜日期寬展至三月初五日以前則閲卷刻文各有餘力而真才之得程文之體當有可觀者矣其三曰簡考官以重文衡臣等查得會試例用考試官二員該本部題請簡命儒臣詹事府翰林院學士等官以充用同考試官十七員該內閣推舉講讀修撰編修等官一十一員及六科給事中三員六部司屬官三員以充為照先年翰林史館及各坊局儲材甚衆五經各有剩員每遇會試鄉試主考同考俱得於羣彥之中遴選以充人不可必得士子不能必知考官為某是以關節難通人鮮猜議況至於開科年分凡翰林院官俱預先杜門謝客以逺嫌疑近年以來事體稍異今查得本院除學士五員外自侍講以下通得十一人則當盡數入場始足供事然中間或有臨時妨礙則五經房考官必不能備難免悮事乞勑內閣今次於六科部屬查照舊規六員之外再加訪推三四員以補翰林不足之數庶文衡得人而取士之效可幾矣再照會試之期伊邇天下舉人方爾雲集所宜預行曉諭示以嚮方合候俞允命下本部出給榜文於本部及科場門首張挂使多士知所遵守仍行考試官一體欽遵知會施行嘉靖十一年正月二十一日題本月二十三日奉聖旨是文運有關國運所係不細近來士子經義詭異艱深大壞文體誠為害治你部裏便出榜曉諭今次會試文卷務要醇正典雅明白通暢的方許中式如有仍前鈎棘竒僻痛加黜落甚則令主考官指名具奏處治揭曉日期照舊其餘依擬行欽此一𢎞文教憫遺才以光聖治疏看得通政使司右參議兼吏科都給事中李鳯來等題稱近來提學官遵奉新例沙汰生員奉行過刻乞要𢎞文教以憫遺才及江西提學副使張時徹行事乖方欲將改調别官以責後效一節除更調官員係𨽻吏部掌行其應否徑自查覆外臣等竊惟教化者治世之首務而學校者人才之所出也求之必廣而養之以豫故上有隨才成就之仁而下無甘于自棄之患古之治朝所以或增廣太學諸生或增置學官弟子員書之史册俱為一時盛事皇上聖德中興鋭情教化而建議之臣乃創為沙汰生員之例其提學官承望風旨奉行太過將所該管府衛州縣學生員或有未經考校輒據一時風聞訪察及點名不到等項名目將在學生員不分年少可進及文行無玷之人一槩盡行降黜毁譽失真賢否莫辨良材竟遺于寸朽斬伐先逮于萌芽堙塞化原阻喪士氣深為可惜今據給事中李鳳來等所陳實係振舉文教愛惜人才至意相應酌擬合候命下移咨都察院轉行天下撫按衙門行令各府衛州縣學除經提學官嵗考以文理不通黜退過生員照例罷黜外其奉例以沙汰之名及一時點名訪察遽爾遞降黜退者盡行收録造成清册一本候新任提學官至日通行起送查明復學肄業候嵗考之時與在學諸生一體嚴加考試如果年力衰邁文詞紕繆方行黜退其文學平通年資可進者一體作養毋事苛刻以傷風教庶朝廷之教化大行天下之賢才思奮學政修舉而聖治益光矣嘉靖十一年十月十八日題本月二十日奉聖旨是依擬行欽此一議處嵗貢事宜以惜人才疏該大學士張孚敬李時翟鑾題該禮部奏準天下嵗貢生員行移翰林院考試臣等欽遵出題彌封考試過上等五十卷上中四十五卷中等六百四十一卷俱堪作養下等五十九卷文理紕繆例該發回原學肄業仍令該部將各該提學官照例取招問罪以警將來未敢擅便謹將各卷通行封進伏乞御覽定奪嘉靖十一年五月二十六日奉聖旨是該部知道欽此欽遵抄出送司查得見今廷試不中生員五十九名其嘉靖八九年分湖廣嵗貢生員史潛等二名係原任提學副使許宗魯考送廣東嵗貢生員孫達係原任提學僉事林希元考送陜西嵗貢生員胡鉞係原任提學僉事敖英考送江西嵗貢生員陳恔係原任帶管提學僉事陳璧考送山西嵗貢生員潘鋐等二名係原任帶管提學僉事宋欽考送嘉靖十年北直𨽻嵗貢生員髙第等三名係見任提學御史胡明善考送嘉靖十一年陕西嵗貢生員左經等十名係見任提學僉事王邦瑞考送河南嵗貢生員趙守光等一十二名係見任提學副使敖英考送湖廣嵗貢生員林文器等八名係原任提學副使崔桐考送四川嵗貢生員趙伯遇等十名係原任提學副使張鯤考送山東嵗貢生員劉溫等三名係見任提學副使陸釴考送浙江嵗貢生員袁麟係見任提學副使汪文盛考送江西嵗貢生員李直係見任提學副使張時徹考送南直𨽻嵗貢生員朱思聰係原任提學御史丘養浩考送遼東嵗貢生員張鈺等二名係見任巡按御史李庸考送又查得嘉靖十年正月內節該本部題為遵奉詔書議處生徒以充國學以備不次擢用事內開自今嵗為始廷試有不中式生員其提學官一名以上聽本部參究提問五名以上降級改用等因節奉聖旨今後嵗貢生員務著該府州縣提調官選舉行檢無礙學識優長的方許送巡按御史會同提學官并布按二司官從公考核其嵗貢到京廷試再有衰老無學及行檢不修的經該貢舉等官依擬一體治罪不饒欽此巳經通行欽遵去後今該前因通查案呈到部為照前項會考嵗貢生員係嘉靖十年正月內舉行在外提學官員奉行前項自當以嘉靖十一年為始見今黜退生員有原應嘉靖八年九年十年分嵗貢者其考送官員如許宗魯林希元俱各升遷去任況在事例未舉之前似難照例究問其應十一年分嵗貢者一名以上提學官例該提問五名以上提學官例該降級但中間係奉行會考者則有御史布按二司官會同考試似當分任其咎今提問降級之罰若獨坐提學官一人揆之事體似屬偏礙但查原係本部初議巳經題奉欽依臣等未敢徑自遵照合當分别申請伏乞命下之日本部備查見今黜退生員名數及各該貢舉提學官員職名移咨都察院及各處巡按御史除嘉靖十年分以前者提學官徑免追究外其應十一年分嵗貢者查照名數多寡通將各省提學及會考官員量從罰治以後年分聽臣等從長更議處分惟復照例止將提學官提問降級等因奉聖旨這嵗貢廷試不中五名以上的各該提學官俱照見行事例降一級别用其餘并未盡事宜你部裏還議處來説欽此欽遵抄出送司案呈到部為照會考嵗貢生員事例既屬巡按御史會同布按二司及提學官公同舉行則貢舉非人自當均受其罰況一名以上提問五名以上降級似乎立例太嚴提學官緣此畏罪其弊必至於有不敢起貢之處竊恐偏方下邑遂至無人應貢則學校之政益致廢墜教化之源由此湮塞所以本部具題欲别議處分殊慮及此昨奉欽依止摘考退五名以上降級之例獨坐提學官而一名以上例該提問者未奉明示但二例俱屬見行相應遵照先前明旨一體施行除將各省提學官例該降級者咨送吏部降級别用外其各省黜退生員一名以上者各該提學副使僉事等官仍從本部開查職名參送都察院轉行各該巡按御史照例行提取招問罪發落但南北直𨽻提督學官係監察御史所據犯該提問者合無從兩京都察院行提問罪惟復止令本處巡按御史提問俱伏乞聖裁再照前項嵗貢事例既以考送之罰獨坐提學官則考貢一事亦宜獨責成於提學官方為情法允當臣等愚見合無今後令提學官止是遵守欽奉勑諭內事理各處嵗貢生員照例止將食糧年深者嚴加考試不必會官如果年深者不堪充貢就便照例黜罷却將以次者考充務要通曉文理方許起送赴部布政司按察司及巡按御史不許侵越提督者職事如此庶使責任専重可以自效即被譴罰當亦無辭矣其見今犯該提問降級者合無俯從本部議擬將嘉靖十一年分者如例提問降級其係嘉靖十年以前者免究惟復不拘年分與事例有無先後一槩施行再照先次題準在外考貢不中生員願告衣巾終身者聽於提學道應貢到京廷考不中者願告冠帶榮身聽於本部俱照例準行合無今次廷考不中有願告冠帶榮身者準給冠帶以塞平生願仕之志以慰其末路無聊之情庶於朝廷作養之恩始終優厚而無一人不獲其所矣其邊逺地方學校生員朝廷作興事例原與中土不同是以有免考送監之例有從便舉貢之例有選取身材不限文字之例每每寬其條格以開其進取之路今若一例發回原學肄業則道路遙逺資費艱難況多有攜挈妻子來京進退往返委的窮蹙難處合無將雲南貴州四川兩廣及西北邊方不分有司衛學凡廷考不中者準令在京聽候下次覆考一次庶不失祖宗曲成人材之遺法矣巳上俱係未盡事宜相應議處況欽奉聖旨臣等不敢不盡其愚嘉靖十一年六月十六日題本月十八日奉聖旨嵗貢會選事宜俱係祖宗舊例巳都有旨了巡按及二司官雖係會同考選但提學官職專提調近來曠職日甚以致貢非其人責實難辭五名以上的降級照前旨行三名以上的提問俱自十一年為始南北直𨽻提學并遼東帶考御史著兩京都察院提問考退生員原無秋考事例不準願告冠帶并衣巾終身的依擬欽此一議處寄學以省勞費疏看得工科右給事中葉洪題稱德州在兩京水陸之衝賦役浩繁連嵗災傷難以興建衛學及學校未建教官未設反使諸生曠時失業乞要不必另建衛學裁設教官只令生員照舊寄住州學教官分領管教仍行山東提學官管轄查照欽依考定優等次等生員各三十名照例挨次起貢一節具見本官體國惜民通達事體相應依擬合候命下一咨吏部將德州學官不必裁設更改一咨都察院轉行山東巡按御史即將原議衛學不必另建二衛生員照舊寄於州學教官分領管教仍令山東提學官管轄查照先次題奉欽依考定優等次等生員各三十名照例挨次起貢則勞費既省而人才亦得均沾聖化矣嘉靖十二年正月三十日題二月初二日奉聖旨依擬欽此一明封爵以懲挾詐以杜紛擾疏該瀋府宿遷王詮鎀奏有臣先考瀋莊王配妣夫人胡氏生兄靈川王并臣二人兄生子勛潪襲封次勛澻勛徹封鎮國將軍後勛潪生胤栘係臣姪孫嘉靖九年九月初六日有臣長兄瀋恭王詮鉦嫡長孫胤榿命卒故絶豈被胤栘明知伊係逺隔三輩犯堂從姪惡孫霸謀襲封瀋王爵位密謀宗室賄囑承奉長史等官遇夜踵門跪托福山恭和王妃郤氏外戚姦豪兄儀賔郤賢等邀買府親人衆架揑倫序相應仁孝昭著朦蔽具奏胤栘主喪行禮不候命下伊先專權亂政遷入瀋府安住未承天旨竊弄政柄就於承運殿丹陛尊居中道僣位當尊朝賀出位進殿致辭諸王將軍昭穆排序班次列伊兩傍有伊刋頒圖式存照比有胤栘朋黨郤賢等假以喪禮為名先同儀賔牛麟等妄行揑臣一父三王親支叔祖保本一封暗差伊府軍餘王資瞞衆暗齎揑是臣府差委校尉李卿齎奏彼蒙天恩欽準胤栘主喪有伊寫本軍餘陳清鄭堂單儒漏言活口為證方知姦弊若不預為改正切思胤栘上欺天恩濫叨王爵下毁祖父不孝本生親母閻氏拋棄在伊原府奉養有缺忘哀作樂強占樂婦在府犯姦交同外戚毆臣幾死臣與胤栘祖父一脈同血支𣲖姪孫今具保本未曽會臣一語巧揑寫臣等三王姓名在上似此胤栘上欺朝廷下侮臣等此罪惡非細豈可入繼瀋府表率宗室臣僚原於嘉靖九年九月十三日被胤栘郤賢等毆傷垂命卧床豈有十月初二日臣同定陶王詮鑨雲和王詮連名具本保伊之理況聖朝勑諭容胤栘主喪行禮管理府事並未準令胤栘與郤氏一宫居住此情不過郤賢主謀擅奪宗室權柄歸伊一手任其舞弄欺滅瀋府非止臣等之不幸於聖朝清明之治實有戾也如蒙伏望聖恩憐憫臣下乞勑禮部參詳合將郤氏胤栘暫且停止册封服爵候臣與伊弔取瀋府原保胤栘奏本姓名查對要見定陶王雲和王曽否同臣連名舉保胤栘查明此情回奏之日奉命施行庶為萬便不致牽害臣與胤栘等前各具奏巳經刑部轉行都察院類行山西撫按官員見今行勘未結即日郤賢等揚言廣用財賄上下流通不怕車載船裝本狀管定各部不行等語臣恐日後查出前項伊揑保本未經改正臨期罪責難辭伏望聖朝暫且停止胤栘册封待行勘伊等違法重情如有涉虛臣甘萬死如果是實乞將胤栘明正國法别選倫序當立賢德宗支入繼瀋府庶可以服人心也臣螻蟻草野冒犯天威不勝戰栗等因奉聖旨禮部看了來説欽此又該瀋府定陶王詮鑨奏為乞明保奏事先於嘉靖九年九月初六日有臣大兄瀋恭王嫡長孫今封諡瀋懷王胤榿病故無嗣宗妃郤氏并闔府宗室陵川等王詮等鎮國等將軍詮銅等長史承奉知州等官韓宗孔等各有奏本保舉倫序相應恭王長弟二支靈川榮懿王詮鉌嫡長孫靈川王胤栘今奏準襲封瀋王先行管理府事掌行喪祭已蒙禮部題準頒賜天勑到府遵行外比時臣四兄宿遷王詮鏅兩次奏保次本委實與臣弟雲和王詮一同連名保奏後宿遷王與瀋府因有私隙具奏又行奏稱未曽奏保等情況郡王印信實封孰敢偽為而教授印信批文亦不易給臣恐聖明雷霆之下豈可虛誑至期難以分辨理合預為明奏伏望皇上察臣情辭乞勑禮部明臣等所奏保是實庶免詿誣便益臣下情不勝恐懼之至等因又該瀋靖王妃郤氏奏為乞恩早賜册封以一宗室以遏紛更奏擾事先於嘉靖九年九月初六日有臣妾子瀋懷王胤榿病故無嗣巳經臣妾舉奏并闔府宗室陵川等王詮等鎮國將軍詮銅等長史承奉知州等官周昊等保奏倫序相應瀋恭王長弟二支靈川榮懿王詮鉌嫡長孫靈川王胤栘查照玉牒遵奉祖訓兄終弟及例該承繼宗祀襲封王爵巳蒙禮部查準宗人府回報與奏相同題蒙聖皇欽賜勑旨到府命靈川王胤栘先行主喪行禮管理府事外嘉靖十年四月初七日又蒙禮部題準靈川王胤栘襲封瀋王妃苗氏進封王妃臣妾同子靈川王胤栘感戴天恩仰候遣官册封近有本府宿遷郡王詮鏅不遵國憲攘奪府財毆傷親嫂靈川王胤栘因管理府事參奏伊聽信撥置等情詮鎀因而挾讎揑詞阻抑況詮鏅先巳同各王兩次奏保靈川王胤栘倫序相應襲封王爵今却又妄奏虛誑廷闕詐稱伊不曽奏保且郡王各有印信教授各有批文豈容詐偽彼時闔府郡王宗室俱有奏請今事已定而宿遷王屢屢紛更奏擾以致宗室不一深為未便伏覩頒賜大明會典內一欵凡朝覲聽選給由等項人員及解送軍匠物料聽奏儀賔會試舉人嵗貢生員人等到京若在京及原籍來京一應親戚間雜人等設謀奏告欺詐嚇取財物者問罪發落原詞立案不行欽此而官員儀賔人等被其奏告者尚蒙加罪原詞立案況親王已蒙題準册封豈容郡府挾讎阻抑臣妾忝在宗妃不宜緘默伏望皇上眷念宗親乞勑禮部早賜遣官册封庶使宗室各安其分不致紛更奏擾便益臣妾下情不勝感戴天恩之至等因俱奉聖旨禮部知道欽此欽遵查得嘉靖九年十月內該本部題為懇乞天恩推倫序以承宗祀乞明降以主喪禮事該瀋府福山恭和王妃郤氏奏臣妾夫勛止生胤榿病故乏人奉祀喪祭續據唐山等王勛澄等以倫序相當推得臣妾夫考瀋恭王長弟次支靈川榮懿王詮鉌所生嫡長孫靈川王胤栘仁孝素著相應攝主喪事承繼宗祀襲封王爵侍養宫闈等因又該瀋府陵川等王詮等鎮輔國等將軍詮銅等奏為乞恩查照玉牒早賜明降推倫序以襲王爵奉宗祀以安宗室事有臣堂弟瀋恭王所遺嫡長孫胤榿病故今一支巳盡二支靈川王胤栘倫序相當堪以承祀等因又該瀋府長史司左長史韓宗孔等奏為乞天恩推倫序管理府事繼承王爵事議得瀋恭王長弟靈川榮懿王嫡長孫靈川王胤移倫序相當仁孝素著相應攝理府事繼承王爵等因又該瀋府宜山王詮鏋奏為明倫序續國脈懇乞聖斷以存宗祀事臣乃瀋恭王一父之弟較諸倫理親而近者也雖有靈川王胤栘疏而且逺或該愚臣承襲臣雖駑下亦須強加鞭策以付皇上重托若該胤栘亦乞早封等因又該瀋府吳江王勛淯奏為懇乞天恩早定嫡親支派承襲伯爵以繼宗祧事臣姪胤榿病故倫序嫡𣲖該臣襲伯爵位等因俱奉聖旨禮部知道欽此欽遵行準祠祭清吏司手本查報瀋恭王嫡長孫胤榿病故及行準宗人府經厯司手本查報瀋莊王幼㙾所生七子庶第一子詮鉦襲封瀋王故生庶第一子勛封福山王故生嫡第一子未名故嫡第二子胤榿襲封瀋王故庶第二子詮鉌封靈川王故生嫡第一子勛潪襲封靈川王故生嫡第一子胤栘襲封靈川王庶第三子詮鏋封宜山王庶第四子詮鎀封宿遷王庶第五子詮鏗封吳江王故生嫡長子嫡第二子嫡第四子俱未名故庶第三子勛沽封鎮國將軍嫡第五子勛淯襲封吳江王庶第六子詮鑨封定陶王庶第七子詮封雲和王等因各回報到司臣等隨查據宗人府及本部玉牒文册照得瀋莊王嫡妃趙氏無出惟有庶子七位恭王係庶第一支今傳至胤榿故絶以倫序推之應該庶第二支承襲所據王妃郤氏奏辭及合府陵川等王左長史韓宗孔等奏推靈川王胤移攝理府事委係倫序相應别無可議合候命下之日照例請勑一道令其主喪行禮管理府事再照襲封王爵自有一定倫序不容少紊吳江王勛淯假追封之次妃揑稱嫡母以五支之庶派妄干國封遂致庶第三支宜山王詮鏋亦以兄終弟及為辭宗室不和釁孽交搆實由於此伏望聖明量加切責以杜非望之請以安宗藩之心等因覆題奉聖旨是勛淯詮鏋揑詞奏擾交搆不和本當查究且饒這遭欽此又查得嘉靖十年四月內該本部題為乞恩請封事該瀋府福山恭和王妃郤氏奏臣嫡男胤榿病故以倫序推及靈川王胤栘相應承繼緣胤栘例該襲封王爵理宜奏請將臣妾男胤榿先次奏請行造册服等件轉移胤栘襲封為瀋王及妃苗氏進封為瀋王妃等因奉聖旨禮部知道欽此欽遵該本部議得靈川王胤栘攝理府事委係倫序相應照例請勑一道令其主喪行禮管理府事等因節奉聖旨是欽此巳行欽遵去後今該前因看得瀋府福山恭和王妃郤氏奏稱要將胤榿先次行造册服等件轉移胤栘襲封為瀋王及妃苗氏進封為瀋王妃一節既查瀋恭王傳至胤榿故絶以倫序推及次支靈川王胤栘相應承繼又先奉明旨勑令管理府事合無將靈川王胤栘襲封為瀋王妃苗氏進封為瀋王妃除金寶儀仗相傳應用不造外各該金册冠服册文等件通行各該衙門撰造完備候各王府册封之日通行關領遣官前去册封行禮所據胤榿先次行造金册冠服等件應否移與胤栘惟復另行撰造亦行各衙門徑自定奪施行等因覆題奉聖旨是先次行造金册冠服等項準移與不必再行撰造欽此俱經通行欽遵去後今各奏前因通查看得瀋府宿遷王奏稱不曽保奏靈川王乞要暫且停止册封候臣與伊弔取原保奏本姓名查對要見定陶王雲和王曽否同臣連名舉保查明之日奉命施行及瀋府定陶王奏稱靈川王比時臣兄宿遷王兩次委實與臣并弟雲和王一同連名保奏後宿遷王與瀋府因有私隙奏稱未曽奏保況郡王印信實封孰敢偽為并瀋靖王妃郤氏奏稱宿遷王兩次奏保靈川王倫序相應襲封王爵今又妄奏不曽奏保且各郡王印信豈容詐偽乞要將靈川王早賜遣官册封庶使宗室各安其分不致紛更奏擾各一節為照瀋懷王故絶而次支靈川王既先該本部并宗人府查據玉牒册內倫序相應例該襲封瀋王節經本部查明覆題奉有前項欽依候遣官册封外今宿遷王定陶王并王妃郤氏各奏前情參照宿遷王先與諸王連名奏保靈川王後因私隙却稱不曽同保要得暫且停封故為待勘之言顯肆脅制之術且靈川王縱有别項情弊原與倫序無干巳經題奉欽依似宜即行册封況定陶王係宿遷王親弟又行奏辨前項同保真情則宿遷王之挾私不問可知又況靈川王之應襲王爵本於倫序不專係於宿遷王之曽保與否今若遽爾停封似中宿遷王挾詐之計但靈川王先曽被宿遷王奏訐原經法司行勘未結所據靈川王册封應否暫且停止惟復遵奉欽依即行遣官册封臣等擅難定擬伏乞聖裁嘉靖十年十月初八日具題初十日奉聖旨靈川王胤栘既倫序當立照前旨册封訐奏事情著行勘明白具奏定奪欽此一議處違法宗室以絶厲階疏先該刑部題稱慶庶人台浤事情已經各官會勘明白伏候勑旨處斷其定封代理府事一應事宜合咨禮部從長議處等因奉聖旨台浤遷發并鼒櫍册封一應事情禮部會官從長計議奏請定奪欽此欽遵咨部送司查得代府應立長子革爵武邑王聰􅞜先為違法變亂謀􅊣人命等事該刑部具題節該奉孝宗皇帝聖旨是聰􅞜先因為非革爵今又稔惡不悛居喪酗酒荒淫好生不遵祖訓難居藩府寫勑降做庶人還差內官去般宫眷於太原府城內著劉政每撥與房屋居住令人看守柴米照例供給欽此續該代惠王夫人王氏并棗強王等各奏乞聰􅞜長子俊枤代理府事緣由節奉孝宗皇帝欽依俊枤準封長子寫勑與他著管理府事欽此及查𢎞治十二年十月內該本部題準俊枤進封代王通查案呈到部本年十一月初五日該臣等會同太傅兼太子太傅武定侯臣郭勛等太子太保吏部尚書臣汪鋐等會議得欽差司禮監左監丞宋興巡撫寧夏等處地方都察院右副都御史楊志學巡按陕西監察御史毛鳳韶等各題稱慶庶人台浤怙終稔惡無復改過殘虐冢子衆叛親離及稱寧夏為極邊要鎮往因台浤之變深貽西顧之憂今諸王搆忿妄生事端以致驚疑人心乞要將伊遷發用絶厲階及台浤長子鼒櫍年已長成倫序當及乞要册封管理府事及遷調官員等項事情臣等切惟册封王爵乃國家極重之典本朝凡親王薨故必待世子服制已終方行遣官册立所以尊體統别嫌微也照得庶人台浤雖經革爵迄今見存若預將伊子鼒櫍册立為王考之典禮既屬無稽揆之名分亦有未順似難遽議但稱台浤自革爵之後稔惡不悛謀􅊣冢子及寧夏係極邊重鎮乞要將伊遷發以絶厲階無非思患預防保安宗室至慮及臣等查有代府庶人聰􅞜事例相同似應依擬伏望皇上俯從各該勘官所請查照先今會議事理比照代府聰􅞜事例特賜選差內官一員前往慶府將台浤及所愛宫眷量帶一二十人遷至陕西省城會同鎮巡等官查照聰􅞜事例給與房屋柴米務要以禮防範不致别起事端待台浤身終之日宫眷仍令回府就養所據長子鼒櫍既該撫按等官節次會保前來倫序當及合無議照代府長子俊枤事例準令封為世子先行寫勑一道令其管理本府一應事務鈐束一應官員旗校人等更望天語丁寧嚴加訓戒務令恪守宗藩禮法以蓋伊父前愆不得假以退避為由妄行辭遜奏擾仍勑司禮監選委老成端重內官數員銓注伊府承奉典寶典膳典服門正等官吏部選取賢能官員及應選人等選調本府長史教授等官舊日本府撥置生事見在內外官員合候命下容本部及移咨吏部盡行查出奏請取回改調别府以絶從諛引誘之漸則庶幾名正言順體統不乖杜漸防微地方無虞禍變消而宗藩安矣嘉靖十一年十一月初八日會題初十日奉聖旨這該府事情你每既會議停當台浤著司禮監差官照例遷置陜西省城居住鼒櫍準封世子還寫勑與他著管理本府一應事務務要恪守禮法用蓋父愆其餘都依擬行欽此一懲抗違以彰國法疏看得慶懷王妃王氏奏稱乞將庶人台浤免其遷發又該台浤庶長子鼒櫍奏稱懇乞垂念人倫至情以全父子乞將伊父台浤暫免遷發各一節參照台浤先因謀為不軌荷蒙朝廷優容止革王爵及又怙終稔惡衆叛親離已該多官會議題奉欽依巳經降勑差官前去遷置省城居住用絶厲階伊長子鼒櫍準封世子先行寫勑管理府事去後今照世子鼒櫍并慶懷王妃王氏自合遵奉明命勉循禮法却乃聽信撥置之人妄行奏擾不能仰體朝廷保全之意復起台浤他日覬覦之心該科所參深為有見訪得該府撥置人員潛住京師厚齎金帛賄賂夤緣意欲抗沮國法必遂私圖若不重加究治無以杜絶後來合候命下移咨都察院先將今次齎本之人拿問坐以撥置之罪從重發遣仍轉行撫按官員會同欽差司禮監右監丞李淮作速將台浤起發前去毋令延緩仍諭世子鼒櫍務要遵照前項欽依恪守宗藩禮度不得辭遜煩瀆重速罪戾再行戒諭該府新設輔導官員不許似前容留小人在府出入交搆撥置再行奏擾如違聽撫按官參奏從重究治庶國法嚴明而姦人知所畏矣嘉靖十二年正月二十四日題二十六日奉聖旨是台浤已有勑旨遷置鼒櫍并王氏聽人撥置妄行奏擾本都當查究姑從寬著都察院將齎本人役拿問從重擬罪還行撫按官會同李淮作速遷發不許延緩其餘依擬欽此一定親王繼封併行查勘疏該滎澤王表檈奏稱晉王知煬薨逝無嗣該取切近宗枝倫序相應之人承繼承奉等官不由奏請輒將新化端和王長子新腆擅喚府內欲承王嗣況端和王所生尚有次子新墧乞要將新腆令襲端和王之爵以承繼伊父新墧當襲晉王之爵以繼晉王之嗣及晉王繼妃王氏奏稱夫王薨逝絶嗣乞要將端和王知㸅妾尚氏庶生長子新腆襲封晉王爵位及據長史司申稱滎澤王教授申奉本王欲要將親枝郡王暫理府事各一節為照親王無嗣俱以倫序應及之人襲封王爵係是定制查得唐成王薨逝無嗣其弟文城恭靖王彌鉗生五子以長子文城王宇溫襲封唐王次子宇潛等俱封鎮國將軍不得襲封王爵瀋恭王嫡長孫胤榿病故絶嗣以恭王長弟次枝靈川榮懿王詮鉌所生嫡長孫恭裕王勛潪所生長子靈川王胤栘承繼瀋王其弟胤榳今封鎮國將軍不得襲封王爵蓋纍朝舊例凡親王絶嗣例得繼封若郡王入繼親王封爵其本枝郡王不得復請繼封其次子亦止封鎮國將軍蓋重繼統不言繼嗣也故國朝以來並無舍長立次之例及查得晉靖王所生六子嫡第一子表榮今傳知煬薨絶其嫡第二子表槏生新化王知㸅已故庶生二子新腆新墧其長子新腆倫序相應及查得新腆見年一十七嵗近該晉王知煬類奏請封為新化王本部已經行準宗人府查報去後未經題請今該晉王薨故例該新腆襲封合無先將新腆以新化王長子請勑一道令其主喪管理晉王府事待服滿之日本府另行奏請遣官册封為晉王庶于統緒相應典制盡合再照滎澤王表檈先稱新腆等年幼欲以郡王管理府事及又推保新墧前來是欲以新腆仍襲封新化王爵以新墧襲繼晉王封爵實與朝廷典禮不合查無以郡王次子繼封親王事例難以準從但查得本部收貯該府造報玉牒册內開稱新化端和王知㸅𢎞治十年五月二十八日毋妃蘇氏嫡生及查妾媵册內開稱端和王位下妾尚氏先於𢎞治十五年二月十七日娶到太原府陽曲縣民人尚賢長女入府正德十三年正月十一日庶生第一子請名新腆今據册開新化端和王所娶新腆母尚氏入府年月扣算彼時知㸅年方六嵗不應便立妾媵事屬未明相應查勘及滎澤王又稱晉府承奉等官不由奏請輒將新腆擅喚府內以承王嗣若果是實則專擅之罪法亦難容合候命下通行撫按官查勘務見新腆生母尚氏入府來厯的係何年月日見今數嵗若干其奏報册籍有無差悮逐一開具明白取具該府宗室人等結狀回報前來以憑本部覆請定奪施行其該府內外輔導長史等官如有擅權縱肆撥亂生事者一併參奏仍行長史司及輔導內外等官欽遵明命暫聽長子新腆約束但新腆父知㸅娶妾尚氏年月未經勘明伏請聖裁惟復别有定奪嘉靖十二年二月十九日題二十二日奉聖旨新腆暫著掌管府事尚氏還著撫按官查他入府年月明白來説其餘依擬欽此一請勑內官會勘宗室隱情以正欺罔疏該滎澤王奏稱新腆生母尚氏係色目人所生新腆故祖恭裕王表槏買入府內收用為妾後子端和王知㸅將尚氏蒸淫生子新腆造入玉牒尚氏揑作陽曲縣民人尚賢之女查娶尚氏之時知㸅年方五嵗尚氏年巳一十九嵗等因為照晉王薨逝無嗣先該晉王繼妃王氏奏以新腆倫序當及相應承繼夫爵該本部查照玉牒支𣲖明白新腆委係倫序應及但又查得伊母入府之時知㸅年方六嵗不應便立妾媵係是生母來厯未明題奉欽依通行撫按官查勘前項事情及暫令新腆主喪管理府事去後今該滎澤王又奏前因若果是實則新腆不但不可襲封親王其應得名封於法俱當查革該府官僚扶同欺罔干犯憲典罪難輕貸但先次奏請名封之時逮今巳十餘年滎澤王不行舉正止因近日議襲王爵又因本部奏行查勘方將前事指奏及又添出蒸淫之事與先二次奏詞不一其間必有别故況干係宗室重情又涉宫闈隱迹事體重大合無簡命司禮監官一員請勑一道前往晉府會同彼處撫按官及該府宗室具啓晉王繼妃會集年老宫眷及內使人等審勘尚氏委係何處何人之女何年月日入府是否色目人所生曽否經侍恭裕王知㸅收為宫人長史等官有無節次扶同隱匿情弊及先次行勘事情一併會勘明白具奏上請定奪如係滎澤王造誣搆釁敢於陷害宗親干犯國法及另有宗室人等隂肆謀奪撥置奏擾亦要從公指實參奏請自宸斷施行嘉靖十二年四月初二日題初五日奉聖旨是這該府事情依擬寫勑差司禮監官一員前去會同撫按官及該府宗室人等從公審勘明白來説欽此一優處婺婦以仁宗室疏該巡按山西監察御史王獻題稱慶成王府已故奉國將軍表桹先年不候保勘擅娶任氏為妻及娶禇氏為妾所生長次二女俱未請封後表桹及妾禇氏相繼病故止遺妻任氏所生長女并禇氏所生次女俱照民間聘嫁訖緣任氏未經保勘成婚有礙請封但曽經撫養二女發殯三喪情似可憫乞要將任氏收入宫妾數內量給口糧以贍終身一節為照巳故奉國將軍表桹先年全無保勘私娶妻妾於例有違其所生二女已照民間之女自行聘娶但表桹禇氏相繼病故及查任氏孀居經今二十餘年撫養二女發殯三喪守禮無違原情可憫且民間節婦尚蒙朝廷旌表況于派出天潢遵崇禮法雖表桹違例擅婚不應授封而任氏嫁女舉喪巳全婦道養贍之典誠不可缺況該御史王獻勘實具奏前來及查宗室將軍成婚有結無奏者節該本部題請聖恩優容多授封號所據任氏女具奏前因既經回勘亦應酌處合無候命下之日類行山西布政司轉行該府教授啓王知會將任氏收入表桹位下宫眷名目仍咨戶部查照各王府宫妾事例量行優處按月給與衣糧養贍終身惟復請自聖裁别有優典嘉靖十二年正月二十四日題二十六日奉聖旨任氏依擬優養欽此一警除道肅朝儀以申舊規疏該羽林前衛指揮使劉永昌奏稱東西長安門外新築御路近日皇上行方澤朝日夕月壇禮翠華經行今文武大小官員乃在前項御路之上擡轎騎馬而行為臣僣君路恬無悚畏況兼近來申明禁約入朝私揖等事官員多不遵守各一節照得長安東西兩街原係京城通衢大道臣民所共往來車馬必由之地原無禁例不許人行近因聖駕出東西郊躬祀朝日夕月二壇該工部題準用工修築馳道恭候車駕經臨此即禮記所載泛掃反道之儀蓋謂天子郊祭之日六卿之人於乘輿經過之路則灑水而後掃之謂之泛掃剗道路之土反之令新者在上謂之反道今南郊正陽門外直路每遇郊祀則有司率地方人先期灑掃剗治嵗以為常實古人泛掃反道之禮也況正陽門外正路乃係祖宗以來御輦經行原無禁例所據長安東西大街恐未可擬名御道若一槩禁止人行則新築之道延袤甚逺中間低窪積水之處未免褰裳或逢狹隘則車馬不惟難容往來易致擁塞梗阻而市賈交易亦各有妨通屬未便但近來填修道路工力浩繁惟是駕使騾牛等項車輛往來其上易致傾頽不免常年重費修築相應酌處合無候命下今後長安東西兩街并正陽門外大道凡遇大祀車駕出郊有司除道之日先期旬日之內官員人等俱令委曲回避不許擡轎騎馬徑行中道禮成駕回之後照常行走仍咨工部都察院行五城御史兵馬司嚴加禁約不許於新填道上行使大小車輛如有阻礙去處許開橫道徑過則法制有常事體稱便而尊君敬上之禮亦甚嚴矣再照官員人等入朝私揖先經本部題奉欽依出榜禁約一向遵行外近來大小官員或仍蹈舊習於大庭御道之間交相揖者亦復有之查得舊規凡衣朝衣公服秉笏鳴珮乃見君之禮不當輒相私揖近年以來衣朝衣公服而相揖者亦復比比此則尤為棄禮合再通行申明候命下之日本部移文各該衙門一體知悉今後再不許怠忽違犯自取譏議嘉靖十一年正月初八日具題初十日奉聖旨是這各郊經行大路凡遇祭期先十日除道不許官員人等往來行走事畢照舊還行各該衙門常川嚴加禁約不許大小車輛於道上行使違了的就便拿問其餘依擬行欽此一明職掌以杜侵越疏先該鴻臚寺卿王道中等題為申舊例請宸斷以便遵守事奉聖旨禮部看了來説欽此隨該通政使司通政使陳經等題為申明舊例以便遵守事奉聖旨既查例明白依擬著通行遵守敢有違犯的照例究治不饒欽此又該陳經等題為明職掌以正體統事奉聖旨該部一併看了來説欽此又該王道中等題為再申舊例併賜查勘以便遵守等因奉聖旨該部一併看了來説欽此欽遵通抄到部查得大明會典開載通政司職掌一欵本司官職専出納帝命通達下情關防諸司出入公文奏報四方臣民實封建言陳情伸訴及軍情聲息災異等事又一欵凡天下臣民實封入遞或人齎到司須於公廳眼同開拆仔細檢看事干軍情機密調撥軍馬及外夷來降進貢方物急缺官員提問軍職有司官員并請旨定奪事務即於底薄內謄寫略節緣由當將原來實封御前陳奏畢就於奏本後批寫旨意送該科給事中收轉令該衙門抄出施行其進繳稅糧文册勘合通關起解軍囚等項附簿明白止送該科收不須入奏又一欵凡在京大小衙門但係奏出不分公事私事并在外鎮守等項內陳情已事巡撫都御史巡按等項御史總兵副參及分守守備備倭等項武職宣慰宣撫招討等司及府州縣等衙門一應錢糧軍馬刑名乞恩認罪繳勑等項本册俱赴本司投進又查得鴻臚寺職掌一欵凡謝恩見辭官員人等先於本寺報名該面見辭及領勑繳勑或賜酒飯者預先具白本題知次日早俱於午門外行禮畢本寺官仍引赴御前叩頭又一欵凡公差及給由官吏先將文册投下明日引入又一欵凡王府并鎮守守備備倭等官外蕃宣慰宣撫招討等司進貢齎本人員天下諸司朝覲給由官員并奏繳軍職文憑稽考公文完銷勘合及總兵等官會奏聲息等項本册俱赴本寺引奏又一欵凡在外總兵等官奏報捷音本寺官引差來人於御前宣奏又一欵凡復命朝見人員繳勑進題本及四夷朝貢人員進番字文書俱本寺官接至西陛授內官捧進及查得嘉靖十一年正月內該鴻臚寺卿王道中等題為朝儀事仰惟聖體違和暫免朝參數日即今早臻勿藥獲遂康寧真宗社無疆之福臣民莫大之慶也但聖明視朝之初誠恐面見面辭官員旬日所積會於一旦未免起數太多纍動綸音久勞聖體臣等犬馬之心殊有不能自安者合無以後凡遇免朝之日一應面見面辭官員午門外行禮畢應該領勑者乞命司禮監照例於左順門給領應該繳勑者本寺官員引領進繳其復命堂引等項人員各令具本奏知庶幾聖明視朝之初起數減少不至於過勞臣等無任惓惓仰望之至等因奉聖旨是欽此欽遵臣等看得我朝分建百司以釐庶務而於章奏之復逆案牒之往來又設通政司以總之紀其時日而考其出入名為喉舌之司以防壅隔之弊也至於鴻臚寺之職止於整肅朝儀傳宣制命引領進奏人員於各衙門文案奏疏全不相干其各處王府及在外大小衙門差來進貢齎本人員及朝覲給由官吏并在京在外復命謝恩赴任等項人員例該面進見辭者先期赴本寺報名本寺即將朝見緣由具本題知次日皇上御朝之時本寺官次第引見其間或有繳勑領勑封進圖本及外夷番字文書者俱從本寺官當御前引奏接遞進呈非如通政司之實封可以開拆公文必須編號也其職掌之詳載在會典條目甚明但近來在外官員人等多有不明司寺職掌徑將實封本册赴該寺投遞該寺亦或間與封進相承日久因以為例非舊制也合無今後除在京衙門題本係有印信及官吏連名僉署者俱遵照舊規於左順門徑自投進外其餘一應職行奏本并在外衙門題奏等本俱從通政司投遞類封進覽其面辭面見人員應該繳勑領勑投遞圖本文書者俱從該寺先期題知臨朝引人面奏進呈不得擅將本册收受封進仍將前項司寺職掌通行天下王府及大小衙門知會以便遵守庶職掌詳明法守歸一可以免侵越爭辨之失矣再照得鴻臚寺先因聖體違和視朝之時誠恐起數太多有勞宣命題稱今後凡遇免朝一應面見面辭官員應該領勑繳勑者俱於左順門領繳復命等項人員俱從本寺具本奏知此蓋一時權宜之策耳今遂沿以為例凡遇免朝即謂不須陛見徑將勑書領繳非祖宗之制也況今皇上厲精圖治視朝臨政鮮有暇日正宜延見中外羣臣以宣德意其領勑在外公幹事完回還人員正宜面奉天顔親進奏疏以通下情所據前事相應遵復照常舉行合無今後應該面見面辭及領繳勑命復命等項人員雖遇皇上暫時免朝仍候視朝之日於奉天門奏見庶使中外臣工皆知尊君之禮而於祖宗立法防範壅隔之意益嚴矣嘉靖十一年七月二十八日題九月初一日奉聖旨免朝日期領繳勑等項不係重大事情照該寺題準事例行其餘依擬欽此一乞審定綸音以防壅蔽疏昨因鴻臚寺題為申舊例請宸斷以便遵守事及與通政使司彼此辨爭前後肆奏節奉聖旨禮部看了來説該部一併看了來説欽此本部仰遵聖諭備查典章俱經議擬明白末復查得於今年正月間因聖體違和暫免朝參該寺題稱免朝日久一應領勑繳勑辭見人員若俱候御前面奏恐聖體於視朝之初起數太多未免煩勞欲要暫於左順門領繳等因奉聖旨是欽此本部看得該寺原題止是一時權宜未嘗擬為定例近日以來一應領勑繳勑并例該面辭面見人員但偶遇隂雨免朝之日該寺即令赴左順門繳進此則甚非祖宗舊制況非該寺原題本意本部因覆奏前事因就題請今後領勑繳勑例該面辭面見等項雖遇免朝仍候視朝之日面奏所以重體統而防壅隔其所關係未為輕小適間奉旨免朝日期領勑繳勑等項不係重大事情照該寺題準事例行欽此臣伏讀綸音不勝疑駭竊意本部題覆之章因司寺互相搆論言語煩多恐未經聖覽前項旨意恐出閣臣一時票擬未曽注意臣竊謂朝廷差官降勑未有不係重大事情且頒勑必於御前所以重帝命可以防詐傳旁出之姦繳勑必於御前所以達下情可以防遲留隱匿之弊至於禮該面辭面見人員即遇免朝日期豈不能少待而遽然廢上下之禮殆非臣子之心所敢安者以此為不係重大事情則御前進奏之事無復有重大於此者也且御前與勑上勤天語陛下慎重絲綸特令翰林學士捧下今乃以為不係重大事情恐非所以仰承聖謨矣臣實愚昧不通逺猷廟堂批答必有深意但在廷臣工本部僚佐議與臣合非臣一人私見伏乞聖明於該科取本部原題特加省覽仍賜問閣臣所以票擬之意萬一臣所見於朝廷大體不為無補伏望聖裁重降御批改回前命則宗社幸甚嘉靖十一年八月初一日具題奉聖旨卿説的是勑書領繳見辭官員都照舊例行如遇雪雨風寒暫三五日免視朝都著候待若朝廷小有不豫免視朝日多準今春該寺奏準事例行著為令欽此一條陳事宜以重修省疏照得先該本部題稱災異修省通行九卿衙門六科十三道各條列時政得失以聞等因節奉聖旨依擬務要思忠論實不許挾持泛引假公報私欽此欽遵臣等愚不省其於治體所在無足周知況政務之大者陛下方以次裁斷於上而諸司臣僚方以次敷陳於下臣等未敢他有論列謹將本部合行事宜逐一議擬凡九事伏望聖明採擇可否賜之施行其於罅隙或亦小有補塞緣係修省陳言事理未敢擅便開坐謹題請旨計開一議請封查得見行事例凡宗室將軍中尉一應子女俱候十五嵗選婚其有年嵗不同或庶出生母入府來厯不明通行駁勘所據前例遵行巳久但近來各府長史司多有不遵法守任意遷延或有使用不敷營求未及則子女年嵗過例方與類請乞恩其奏內來文又多年月不同母氏錯誤至於應婚夫人姓氏或本到無結或結至無本互相背馳延緩以致查駁之間動經年嵗遂使聖明渥澤鬱而不流宗室至親怨曠失所感傷和氣關係匪輕合候命下行令各王府長史司啓王今後將軍中尉子女凡年嵗已及即與具奏請婚若奏內來文或年嵗少差母氏未的本部一面駁行查勘一面聽令選擇應婚子女一併開具奏報若過期不行奏請夫人奏結不齊候至三月以上者俱聽本部查考得出奏將該府長史等官究問則法令嚴明文移簡便而婚配亦不失時矣一禁姦弊訪得各王府差來內使儀賔官校人等俱是積年光棍熟知誆騙關節一蒙王府差遣乞恩等項即便設計誆受金帛數多任意花銷使用或又收置土産往來買賣填實表文箱扛分外需索人夫接運以致纍損驛傳及至到京先投積年窩戶窺探進止然後報名朝見或又私自潛住京師動經年月往往用計營求打點各王府不知本部凡遇合行事理自有公道一應公務自有事例期限非吏書人等所能預力合候命下移咨都察院行各處撫按衙門轉行各王府長史司啓王知會今後但遇有公事奏理不得聽信差來人役多齎金帛指稱來京使用打點亦不許本役私帶銀兩貨物其批文務要定限月日逺近銷繳到京之日徑報入會同館安歇事完即回但有潛住日久并在京各色人役容令安歇通同作弊者許厰衛緝事衙門及五城兵馬司訪拿俱各指實參送法司問以誆騙打點相應罪名仍行都察院出榜禁約則形迹無疑而弊源可息矣一便關領照得各王府將軍以下應得冠服等件巳該本部議處題準嘉靖六年正月以後授封者行令各該布政司給錢造辦外嘉靖五年十二月以前授封未曽關給者其器物非一監局所造關領非一時可齊是以各府往返差人勞費日甚差來人役守候日久有將關領出金銀綵假等項恣意花費無從查考遂使朝廷有成造之費而該府無受惠之實相應議處合候命下本部將見在各王府差來人役責限回還仍行各該布政司轉行長史教授啓王知會逐一備查自嘉靖五年以前授封該府將軍中尉夫人等及郡縣鄉君儀賔一應宗室除已關領外其餘未領并先年遺下寄關物件逐一開具名位應得冠服等項件數造册印鈐限嘉靖十二年春季類奏之時齎送赴部赴內府盡數查會明白陸續造完待本年各府册封之日將前項物件領出給與副使順帶該府其不係册封府分應該關領者責令該府所差聖節冬至慶賀人員順齎前去該府俱各逐一交割仍令各該長史教授啓王將領過錢糧數目給散過名位造册奏繳以憑查考但節年工部行造物件係是內府各監局造辦本部無憑查催仍乞勑各監局查照該部原行一一造辦給領如有延緩查出一體參究則各府無守候之難而恩惠實沾矣一杜請乞照得王府孝行等事舊例止應請勑獎勵𢎞治十八年十二月內該魯府奏鎮國將軍陽銖陽孝行可嘉欲自備工料各建坊門乞賜坊名荷蒙特恩賜允自此始開旌表之端而親郡王將軍妃與夫人遂往往援引前例請乞不已切惟朝廷于民庶之家凡有節孝等行賜之旌表所以表其宅里以致特異于齊民之意至於天下王府則皆朱垣戟戶有不俟于旌表而後異者況朝廷降勑獎勵蓋以親親之懿特形天語之褒非宗室孰克當此故纍朝以來宗藩善行止是寫勑獎勵不立坊牌所以崇重宗室辨别貴賤立法最有意義且天潢之裔孰非懿德若使有所表異分别既殊則淑慝互見亦非敦睦大同之道也況今宗藩日衍樂善無窮若不斷之於今切恐將來無有紀極合無通行議處除巳往外今後各王府如有節孝等事及卓異行迹親郡王或撫按官查奏前事本部俱照舊例請勑獎諭仍通行天下王府今後不許奏請建立坊牌則體統正而風教同矣一定條例查得𢎞治十三年三月初二日以前多官奉詔會議定王府條例十七條及本部節年題準事例不一俱遵行已久但見行條例載在刑書節年條例藏於案牘雖經屢次申明不過就事論事以故各宗支不能周知事例惟務營求本部事例日煩難於檢閲殊為未便合候命下容臣等將王府見行條例及節年題準事例編成書帙請下廷臣集議如或可行具奏刋刻成書本部遵照施行仍乞遍賜各王府宗室使皆便於誦閲有所遵守其本部别項條例可行事件亦容臣等逐一抄謄編纂一體刋刻遵奉則朝廷貞明之法恪慎不移有司畫一之規奉行惟謹法守易循而姦弊不作矣一議王諡臣等看得各王府親郡王薨故必有諡號以表其行舊制俱於乞恩祭葬之時即賜以諡𢎞治年間唐王奏準凡親王薨逝行巡撫巡按分巡等官郡王病故行本府親王及承奉長史等官各核勘善惡事迹至日度其賢否方賜以諡至今通行遵守但各王乞恩祭葬到部方與行文各該衙門核勘事迹回報至日題請諡號填寫銘旌前去始得安葬且如四川蜀府廣西靖江王府俱路途窵逺文移往返動經逾年差去掌行喪葬禮儀行人在彼守候葬畢方得回還以致往往乞恩寬限且有司供應之繁本差耽延之久未免耗費財力多生嗟怨矧各王府親郡王棺木暴露動經嵗年亦足以上干和氣深為不便合無今後但遇各王府親郡王薨故本府一面乞討祭葬一面行移各該衙門核勘平生行實不必候本部行文徑自具結呈部以憑題請庶宗室體魄早獲妥安而事體簡便久逺可行矣一懷逺人照得我朝輿圖一統四夷咸賔厚往薄來各有定制頃自正德年間以來貪官猾胥緣此為市所收假匹布絹稀鬆紕薄不堪服用逺人往往投遞番文鳴號不平輒稱先朝賞賜甚厚今日賞賜太薄雖節經本部題請行移工部并該監局衙門查處去後但所賞者仍舊不堪無以厭服夷心尊重國體所係甚大合無勑令工部再照前勑申明轉行各該織造地方巡按衙門應解假匹時節行委的當官員看驗務要經緯堅緻堪以進用者方許起解若各處解到者仍復稀鬆紕薄即行退回經該官匠定行提問收納之際經該衙門不許勒掯常例貽􅊣小民凡遇各蕃到館奉旨給賞關領該監毋得推調淹滯以致逺人久住致生怨嗟務使厚賞速歸庶足以感興四夷嚮服之情而悖戾之心消矣一處貢馬照得天下各王府凡遇聖旦冬至正旦并謝恩慶賀例該有馬進貢本部先準御馬監奏為進貢馬匹不堪廄牧預畫以省虛費國計事奉欽依務要到部辨看毛齒堪中方行送監驗收巳經遵行三四年矣但各王府享上之誠雖同而其逺近貧富不一加以差來人役多係積年或領價到京旋買或領馬中途變易事完回府又稱雜費若干百計侵尅間有不堪驗退者未免行移責備該府是利歸姦人罪坐宗親甚非事體合無行移各王府長史司啓王知會今後應進貢馬匹須用印烙鈐記仍將毛齒嵗尺寸備造青册一本長史司印封送部以憑比對看驗即與轉送該監收受毋得留難勒掯十分求全以拂朝廷親親之情如或馬匹毛齒參差與原造青册不同即是差來人員作弊定行究治如此庶國體全而宗藩仰德矣一蘇民困切見全陜纍嵗災傷加以師旅民不聊生而嵗𣲖牲口之數必有所不能辦者查得光祿寺遞年節省所剩銀兩積貯頗多合無將陜西兵荒地方嘉靖十二年分牲口暫行蠲免一年就將前項餘銀補用則上既不缺該寺備物之用下亦可少寬一方民力矣嘉靖十一年九月二十二日題二十四日奉聖旨覽奏具見卿等忠誠體國謀慮周悉都依擬行欽此一議處節孝以彰風化疏該儀制清吏司案呈查得本部節年稿簿內開凡民間孝子順孫義夫節婦等項見行事例先據有司具奏到部仍行有司覆勘回文至日復行彼處風憲衙門核實取具結狀到部案候類奏旌表文移往返之間以地方逺近計之多者三五年少者亦不下一年有餘況閭閻節孝之人多有出於貧乏之家有司結勘里胥因緣為姦假藉保覆橫肆需索是以有力者或足以應其求而貧難者遂不得其覆勘甚至勘合雖行而終於湮沒不報者往往有之又況有司具奏節婦等項中間多有六七十嵗以上者年已衰暮而文移勘覆動經數年寵光未沐巳先朝露蓋有抱節操行終身不獲表異之榮者比比合無今後孝子順孫義夫節婦等項但係有司勘實奏請者免行有司復勘止行風憲官核實若係風憲官核實奏請者免其再核通候季終類奏旌表則不惟有司文移減省里胥不得為姦抑且使行義足徴速獲為善之報寵光所被真足以激勵世俗矣伏乞轉達等因案呈到部臣等看得該司呈稱乞要將孝子順孫義夫節婦有司勘實具奏者免其復勘徑行風憲官核實若係風憲官核實具奏者免其再核通候季終類奏旌表以便人情以杜弊端一節為照前項旌表節孝事例實為朝廷激勵風俗之盛典所以必行再三核勘者恐有偽為無非欲考其實耳然至於文移展轉動淹嵗月吏緣為姦恩不下究亦不可不為之所也今據該司所呈實便事體足弭弊端況風化所關相應依擬臣等合候命下著為定例通行今後凡民間孝子順孫義夫節婦等項但係有司勘實具奏者免其復勘徑行風憲官核實若風憲官核實具奏者免其再核通候每季終類奏旌表一次如此則人情便而弊端革矣嘉靖十年十月十三日具題十五日奉聖旨是欽此南宫奏稿卷一
